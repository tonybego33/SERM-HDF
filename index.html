<style>
:root {
  --font-sans: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-display: "Manrope", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --red: #C8102E;
  --red-dark: #9E0B24;
  --red-soft: #E8475B;
  --red-tint: #FBEAEC;
  --ink: #1A1A1A;
  --ink-soft: #3D3D3D;
  --paper: #F5F2EB;
  --paper-light: #FAF8F3;
  --paper-deep: #EDE8DD;
  --paper-shade: #E6E0CF;
  --taupe: #8B8680;
  --taupe-light: #BFB9AC;
  --border: #D9D3C4;
  --border-soft: #E8E2D2;
  --green: #1D5E3A;
  --green-soft: #4A8F66;
  --amber: #C77800;
  --amber-tint: #FAEFD9;
  --bureau: #2B3A4A;
  --bureau-bg: #EEF1F4;
  --white: #FFFFFF;
  --shadow-lg: 0 8px 32px rgba(26,26,26,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--paper-light); overscroll-behavior-y: contain; }
body {
  font-family: var(--font-sans); color: var(--ink);
  font-size: 15px; line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01";
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
h1, h2, h3 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }
.tabular { font-variant-numeric: tabular-nums; }
.kicker { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; }

/* APP SHELL — mobile first, max-width sur desktop */
html, body { height: 100%; overflow: hidden; }
#root {
  max-width: 560px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh; /* mobile moderne : exclut la barre d'URL pour stabilité */
  background: var(--paper-light);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
@media (min-width: 600px) {
  body { background: #1f1f1d; }
  #root {
    margin: 0 auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
}
@media (max-width: 599px) {
  #root { padding-top: env(safe-area-inset-top); }
}

/* ============================================================
   NETWORK MAP — animations + finitions
   ============================================================ */
.network-map svg { display: block; }

/* Le cercle unifié de chaque gare */
.network-map circle.nm-uni {
  vector-effect: non-scaling-stroke;
}

/* WIP — pulsation rouge */
@keyframes nmWipPulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.45; }
}
.network-map .nm-gare-wip circle.nm-uni {
  animation: nmWipPulse 1.6s ease-in-out infinite;
  filter: drop-shadow(0 0 3px rgba(200,16,46,0.55));
}

/* DONE — bloom vert subtil */
.network-map .nm-gare-done circle.nm-uni {
  filter: drop-shadow(0 0 2px rgba(29,94,58,0.45));
}

/* Halo radar autour des WIP — second cercle invisible avec ring qui s'agrandit */
@keyframes nmRadar {
  0%   { r: 14; opacity: 0.45; }
  100% { r: 38; opacity: 0;    }
}
.network-map circle.nm-radar {
  fill: none;
  stroke: #C8102E;
  stroke-width: 1.5;
  animation: nmRadar 2s ease-out infinite;
  pointer-events: none;
}

/* Sweep diagonal subtle sur la carte — désactivé (trop bruyant) */
.network-map::after { content: none; }

/* Belgique (fond derrière) — silhouette à peine présente */
.network-map #Belgique { opacity: 0.35; }

/* Lignes ferroviaires : transitions douces */
.network-map [id^="sg-lignes-ferroviaires"] path {
  transition: stroke .3s ease;
}
</style>

/* ============================================================
   INDEXEDDB — stockage persistant des photos en attente d'upload
   ============================================================
   But : si l'utilisateur prend une photo offline et FERME l'app
   avant le retour réseau, le blob est préservé dans IndexedDB
   (au lieu de localStorage qui est limité à 5 Mo).
   Au redémarrage, on retente l'upload Supabase automatiquement.
   ============================================================ */
const PHOTO_DB_NAME = 'serm_photo_store';
const PHOTO_DB_VERSION = 1;
const PHOTO_STORE = 'pending_photos';
let _photoDB = null;

function isIndexedDBAvailable() {
  try { return typeof indexedDB !== 'undefined' && indexedDB !== null; } catch (e) { return false; }
}

async function openPhotoDB() {
  if (_photoDB) return _photoDB;
  if (!isIndexedDBAvailable()) throw new Error('IndexedDB not supported');
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(PHOTO_DB_NAME, PHOTO_DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(PHOTO_STORE)) {
        db.createObjectStore(PHOTO_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => { _photoDB = req.result; resolve(req.result); };
    req.onerror = () => reject(req.error);
  });
}

async function savePhotoBlob(id, blob, meta) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).put({ id, blob, meta: meta || {}, createdAt: Date.now() });
    tx.oncomplete = () => resolve(id);
    tx.onerror = () => reject(tx.error);
  });
}

async function getPhotoBlob(id) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deletePhotoBlob(id) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function listAllPhotoBlobs() {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

      updated_at: new Date().toISOString()

/* Pull tous les responses + visite_meta, reconstruit la structure `all` */
async function pullAllFromSupa() {
  if (!supa) return null;
  try {
    const [respRes, metaRes] = await Promise.all([
      supa.from('responses').select('*'),
      supa.from('visite_meta').select('*')
    ]);
    if (respRes.error) { console.warn('Pull responses:', respRes.error); return null; }
    if (metaRes.error) console.warn('Pull meta:', metaRes.error);

    const all = {};
    // Reconstituer les visites depuis les responses (1 row = 1 critère)
    (respRes.data || []).forEach(row => {
      if (!all[row.gare]) {
        all[row.gare] = { gare: row.gare, data: {}, updated: 0, auteur: 'Anonyme' };
      }
      // value peut être null (= critère existait mais a été nettoyé)
      if (row.value !== null && row.value !== undefined) {
        all[row.gare].data[row.critere_id] = row.value;
      }
      // Le timestamp de la visite = max des timestamps de ses critères
      const ts = new Date(row.updated_at).getTime();
      if (ts > all[row.gare].updated) all[row.gare].updated = ts;
    });
    // Compléter avec la meta visite
    (metaRes.data || []).forEach(row => {
      if (!all[row.gare]) {
        all[row.gare] = { gare: row.gare, data: {}, updated: 0, auteur: 'Anonyme' };
      }
      all[row.gare].auteur = row.auteurs || all[row.gare].auteur;
    });

    saveAll(all);
    return all;
  } catch (e) { console.warn('Pull failed:', e); return null; }
}

/* Real-time sync : refresh app state when teammates change data
   On écoute les 2 tables (responses pour les réponses, visite_meta pour les auteurs) */
function setupRealtimeSync(onChange) {
  if (!supa) return () => {};
  try {
    let pullTimeout = null;
    const schedulePull = () => {
      // Debounce le pull : si plusieurs events arrivent en rafale (typique en
      // mode multi-user), on attend que ça se calme avant de re-fetch.
      if (pullTimeout) clearTimeout(pullTimeout);
      pullTimeout = setTimeout(async () => {
        const fresh = await pullAllFromSupa();
        if (fresh) onChange(fresh);
      }, 400);
    };
    const channel = supa.channel('responses_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'responses' }, schedulePull)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'visite_meta' }, schedulePull)
      .subscribe();
    return () => { try { supa.removeChannel(channel); } catch (e) {} };
  } catch (e) { console.warn('Realtime setup failed:', e); return () => {}; }
}

/* ============================================================
   PHOTOS — compression auto + upload
   ============================================================
   Par défaut on compresse (2000px max, JPEG 85%) → divise le poids
   par 5-10. Si opts.hd=true, on upload tel quel (archive originale).
   ============================================================ */

// Compresse une image côté navigateur (Canvas API, pas de dépendance).
// Compresse TOUJOURS (pas de skip taille) pour garantir un poids prévisible.
async function compressImage(file, opts = {}) {
  const maxDim = opts.maxDim || 1600;     // 1600px largement suffisant pour analyse terrain
  const quality = opts.quality || 0.80;   // JPEG 80% — bon équilibre qualité/poids

  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const ratio = Math.min(1, maxDim / Math.max(width, height));
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => {
        URL.revokeObjectURL(img.src);
        if (!blob) { resolve(file); return; }
        const baseName = file.name.replace(/\.\w+$/, '');
        const compressed = new File([blob], `${baseName}.jpg`, { type: 'image/jpeg' });
        const ratioPct = Math.round((1 - compressed.size / file.size) * 100);
        console.log(`📷 Compression: ${(file.size/1024).toFixed(0)} KB → ${(compressed.size/1024).toFixed(0)} KB (-${ratioPct}%)`);
        resolve(compressed);
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('Image load failed')); };
    img.src = URL.createObjectURL(file);
  });
}

async function uploadPhoto(gareName, critId, file, opts = {}) {
  // Compresser par défaut, sauf si opts.hd === true
  const originalSize = file.size;
  let toUpload = file;
  try {
    if (!opts.hd) toUpload = await compressImage(file);
  } catch (e) { console.warn('Compression failed, uploading original:', e); }

  // ── Fallback offline : on stocke le BLOB dans IndexedDB (préservé même à la fermeture)
  // Avec fallback ultime en data URL si IndexedDB indisponible.
  const goOffline = async () => {
    // Essai 1 : IndexedDB (préféré, capacité 50-500 MB)
    if (isIndexedDBAvailable()) {
      try {
        const blobId = `${gareName}__${critId}__${Date.now()}__${Math.random().toString(36).slice(2,8)}`
          .replace(/[^a-zA-Z0-9_-]/g, '_');
        await savePhotoBlob(blobId, toUpload, {
          critId, gareName, hd: !!opts.hd, name: toUpload.name
        });
        return {
          blobId,                                  // ← référence IndexedDB persistante
          url: URL.createObjectURL(toUpload),       // ← URL object pour preview immédiate
          name: toUpload.name, local: true,
          pending: !!supa, hd: !!opts.hd,
          size: toUpload.size, originalSize,
          critId, gareName
        };
      } catch (e) {
        console.warn('IndexedDB save failed, fallback to data URL:', e);
      }
    }
    // Essai 2 : data URL en localStorage (ancien comportement, limite ~5 MB total)
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve({
        url: r.result, name: toUpload.name, local: true,
        pending: !!supa, hd: !!opts.hd,
        size: toUpload.size, originalSize,
        critId, gareName
      });
      r.onerror = reject;
      r.readAsDataURL(toUpload);
    });
  };

  // Si pas de Supabase ou pas de réseau → fallback direct
  if (!supa || (typeof navigator !== 'undefined' && navigator.onLine === false)) {
    return goOffline();
  }

  // Sinon on tente l'upload normal, avec fallback en cas d'erreur réseau
  try {
    const ts = Date.now();
    const safe = toUpload.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(-40);
    const slug = gareName.replace(/[^a-zA-Z0-9]/g, '_');
    const hdTag = opts.hd ? '_HD' : '';
    const path = `${slug}/${critId}${hdTag}_${ts}_${safe}`;
    const { error } = await supa.storage.from('photos').upload(path, toUpload, {
      contentType: toUpload.type, upsert: false
    });
    if (error) throw error;
    const { data } = supa.storage.from('photos').getPublicUrl(path);
    return {
      url: data.publicUrl, path, name: toUpload.name,
      hd: !!opts.hd, size: toUpload.size, originalSize
    };
  } catch (e) {
    console.warn('Upload failed, falling back offline:', e);
    return goOffline();
  }
}

// Retry des photos pending — parcourt all et tente l'upload des photos
// stockées localement (soit en IndexedDB via blobId, soit legacy en data: URL)
async function retryPendingPhotos(all, onProgress) {
  if (!supa || (typeof navigator !== 'undefined' && navigator.onLine === false)) return all;
  let changed = false;
  const next = { ...all };
  let totalPending = 0;
  let totalDone = 0;
  // Compter total pour le progress (blobId OU data: URL)
  Object.values(all).forEach(v => {
    if (!v?.data) return;
    Object.values(v.data).forEach(d => {
      if (d && typeof d === 'object' && Array.isArray(d.photos)) {
        d.photos.forEach(p => {
          if (p?.pending && (p?.blobId || (p?.url && p.url.startsWith('data:')))) totalPending++;
        });
      }
    });
  });
  if (totalPending === 0) return all;
  if (onProgress) onProgress(0, totalPending);

  for (const [gareName, visite] of Object.entries(next)) {
    if (!visite?.data) continue;
    let visiteChanged = false;
    const newData = { ...visite.data };
    for (const [critId, value] of Object.entries(visite.data)) {
      if (!value || typeof value !== 'object' || !Array.isArray(value.photos)) continue;
      const newPhotos = [];
      for (const p of value.photos) {
        if (!p?.pending) { newPhotos.push(p); continue; }

        let file = null;
        try {
          if (p.blobId && isIndexedDBAvailable()) {
            // ── Cas 1 : photo stockée dans IndexedDB
            const entry = await getPhotoBlob(p.blobId);
            if (entry && entry.blob) {
              file = new File([entry.blob], p.name || 'photo.jpg', { type: entry.blob.type });
            }
          } else if (p.url && p.url.startsWith('data:')) {
            // ── Cas 2 : photo legacy en data URL
            const resp = await fetch(p.url);
            const blob = await resp.blob();
            file = new File([blob], p.name || 'photo.jpg', { type: blob.type });
          }

          if (!file) {
            // Blob introuvable (IndexedDB vidée, etc.) — on garde la photo telle quelle
            newPhotos.push(p);
            continue;
          }

          const uploaded = await uploadPhoto(gareName, critId, file, { hd: p.hd });
          if (uploaded.pending) {
            // Toujours offline → on garde
            newPhotos.push(p);
          } else {
            // Upload réussi → nettoyage IndexedDB + révoque blob URL si présente
            if (p.blobId) {
              try { await deletePhotoBlob(p.blobId); } catch (e) {}
            }
            if (p.url && p.url.startsWith('blob:')) {
              try { URL.revokeObjectURL(p.url); } catch (e) {}
            }
            newPhotos.push(uploaded);
            visiteChanged = true;
            totalDone++;
            if (onProgress) onProgress(totalDone, totalPending);
          }
        } catch (e) {
          console.warn('Retry failed for', p.name, e);
          newPhotos.push(p);
        }
      }
      if (visiteChanged) newData[critId] = { ...value, photos: newPhotos };
    }
    if (visiteChanged) {
      next[gareName] = { ...visite, data: newData, updated: Date.now() };
      changed = true;
    }
  }
  return changed ? next : all;
}

async function deletePhoto(photo) {
  if (photo?.path && supa) {
    try { await supa.storage.from('photos').remove([photo.path]); } catch (e) { console.warn(e); }
  }
  // Nettoyer IndexedDB si la photo y est encore stockée (cas pending)
  if (photo?.blobId && isIndexedDBAvailable()) {
    try { await deletePhotoBlob(photo.blobId); } catch (e) {}
  }
  // Révoquer l'URL object si présente (libère la mémoire)
  if (photo?.url && photo.url.startsWith('blob:')) {
    try { URL.revokeObjectURL(photo.url); } catch (e) {}
  }
}

/* ============================================================
   GRILLE CONFIG — chargement et persistance de la grille
   ============================================================
   Architecture :
   - SECTIONS (let) = source de vérité courante (modifiée à chaud)
   - DEFAULT_SECTIONS = snapshot des sections initiales en dur (fallback)
   - SYSTEM_SKIPIF = map id -> skipIf function (les fonctions ne sont
     pas sérialisables en JSON, donc on les rétablit au pull)
   - grille_config table Supabase : 1 row id='active', sections JSONB
   ============================================================ */

// Snapshot des sections initiales — fallback si Supabase indispo
const DEFAULT_SECTIONS = SECTIONS.map(s => ({...s, criteria: [...(s.criteria||[])]}));

// Map des skipIf indexée par id — pour réhydrater au pull
const SYSTEM_SKIPIF = {};
DEFAULT_SECTIONS.forEach(s => { if (s.skipIf) SYSTEM_SKIPIF[s.id] = s.skipIf; });

// Sérialiser : retirer les fonctions skipIf avant push (JSON ne les gère pas)
function serializeSections(secs) {
  return secs.map(s => {
    const clean = {...s};
    delete clean.skipIf;
    return clean;
  });
}

// Désérialiser : rétablir skipIf pour les sections système
function hydrateSections(secs) {
  return secs.map(s => {
    if (SYSTEM_SKIPIF[s.id]) return {...s, skipIf: SYSTEM_SKIPIF[s.id]};
    return s;
  });
}

// ⚠ Version de la grille codée en dur.
// À INCRÉMENTER à chaque modification structurelle (ajout/suppression de critère,
// déplacement entre sections, etc.) pour forcer la mise à jour automatique
// de la grille Supabase chez tous les utilisateurs au prochain chargement.
const GRID_VERSION = '2026-05-18-v62-pmr-sdap';

// Push la grille courante vers Supabase
async function pushGrilleToSupa(by) {
  if (!supa) return;
  try {
    const { error } = await supa.from('grille_config').upsert({
      id: 'active',
      sections: serializeSections(SECTIONS),
      updated_at: new Date().toISOString(),
      updated_by: by || 'Anonyme',
      version: GRID_VERSION
    });
    if (error) console.warn('Grille push:', error);
  } catch (e) { console.warn('Grille push failed:', e); }
}

// Pull la grille depuis Supabase. Si vide, on push la grille du code (init seulement).
// ⚠ La grille Supabase est désormais la SOURCE DE VÉRITÉ (depuis que Maram édite)
// → on ne force PLUS la migration vers la version code, sinon ses modifs sont écrasées.
// Le code reste juste un fallback initial si la table grille_config est vide.
async function pullGrilleFromSupa() {
  if (!supa) return null;
  try {
    const { data, error } = await supa.from('grille_config').select('*').eq('id', 'active').maybeSingle();
    if (error) { console.warn('Grille pull:', error); return null; }
    if (!data || !data.sections) {
      // Première fois : on initialise la table avec la grille par défaut du code
      await pushGrilleToSupa('init');
      return null;
    }
    // On affiche un avertissement console si la version Supabase diffère du code
    // (utile pour le dev, mais on NE force PLUS le push)
    if (data.version && data.version !== GRID_VERSION) {
      console.info(`Grille Supabase (${data.version}) ≠ grille code (${GRID_VERSION}) — utilise Supabase comme source de vérité`);
    }
    SECTIONS = hydrateSections(data.sections);
    return SECTIONS;
  } catch (e) { console.warn('Grille pull failed:', e); return null; }
}

// Realtime sync — quand quelqu'un d'autre modifie la grille
function setupGrilleRealtime(onChange) {
  if (!supa) return () => {};
  try {
    const channel = supa.channel('grille_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'grille_config' }, async () => {
        const fresh = await pullGrilleFromSupa();
        if (fresh) onChange(fresh);
      })
      .subscribe();
    return () => { try { supa.removeChannel(channel); } catch (e) {} };
  } catch (e) { console.warn('Grille realtime failed:', e); return () => {}; }
}

/* === Manipulation de la grille — utilitaires CRUD === */

// Génère un ID unique pour un nouveau critère ou onglet
function genId(prefix) {
  const slug = prefix.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 20);
  return `custom_${slug}_${Date.now().toString(36)}`;
}

// Ajouter un critère à la fin d'une section
function gridAddCriterion(sectionId, criterion, by) {
  const idx = SECTIONS.findIndex(s => s.id === sectionId);
  if (idx < 0) return false;
  const newCrit = {
    ...criterion,
    id: criterion.id || genId(criterion.label || 'crit'),
    createdBy: by || 'Anonyme',
    updatedBy: by || 'Anonyme',
    updatedAt: Date.now()
  };
  SECTIONS[idx] = { ...SECTIONS[idx], criteria: [...(SECTIONS[idx].criteria || []), newCrit] };
  return newCrit.id;
}

// Modifier un critère existant (libellé, help, options/labels) — pas l'ID, pas le type
function gridUpdateCriterion(sectionId, critId, updates, by) {
  const idx = SECTIONS.findIndex(s => s.id === sectionId);
  if (idx < 0) return false;
  const crits = (SECTIONS[idx].criteria || []).map(c =>
    c.id === critId ? {
      ...c, ...updates,
      id: c.id, type: c.type, // protégés
      createdBy: c.createdBy, // pas écrasé
      updatedBy: by || 'Anonyme',
      updatedAt: Date.now()
    } : c
  );
  SECTIONS[idx] = { ...SECTIONS[idx], criteria: crits };
  return true;
}

// Supprimer un critère (soft : on le retire de la grille, mais les
// réponses déjà saisies restent dans visites.data, récupérables si
// on remet la question avec le même ID)
function gridDeleteCriterion(sectionId, critId) {
  const idx = SECTIONS.findIndex(s => s.id === sectionId);
  if (idx < 0) return false;
  const crits = (SECTIONS[idx].criteria || []).filter(c => c.id !== critId);
  SECTIONS[idx] = { ...SECTIONS[idx], criteria: crits };
  return true;
}

// Ajouter un nouvel onglet (non-system)
function gridAddSection(section, by) {
  const newSec = {
    system: false,
    id: section.id || genId(section.title || section.short || 'onglet'),
    n: section.n != null ? section.n : (SECTIONS.length),
    title: section.title || 'Nouvel onglet',
    short: section.short || (section.title || 'Onglet').slice(0, 8),
    icon: section.icon || '•',
    subtitle: section.subtitle || '',
    criteria: section.criteria || [],
    createdBy: by || 'Anonyme',
    updatedBy: by || 'Anonyme',
    updatedAt: Date.now()
  };
  SECTIONS = [...SECTIONS, newSec];
  return newSec.id;
}

// Modifier le header d'un onglet (titre, short, icon, subtitle)
function gridUpdateSection(sectionId, updates, by) {
  const idx = SECTIONS.findIndex(s => s.id === sectionId);
  if (idx < 0) return false;
  const allowed = {};
  ['title', 'short', 'icon', 'subtitle'].forEach(k => { if (updates[k] !== undefined) allowed[k] = updates[k]; });
  SECTIONS[idx] = {
    ...SECTIONS[idx], ...allowed,
    updatedBy: by || 'Anonyme',
    updatedAt: Date.now()
  };
  return true;
}

// Supprimer un onglet (interdit pour les sections system)
function gridDeleteSection(sectionId) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec || sec.system) return false;
  SECTIONS = SECTIONS.filter(s => s.id !== sectionId);
  return true;
}

// Restaurer la grille par défaut (panic button)
function gridRestoreDefault() {
  SECTIONS = DEFAULT_SECTIONS.map(s => ({...s, criteria: [...(s.criteria||[])]}));
}

/* ============================================================
   EXPORT GRILLE — génère un fichier .js prêt à intégrer dans le HTML
   Permet à Tony de récupérer les modifications faites par Maram dans
   l'éditeur visuel et de les replier dans le code source final.
   ============================================================ */
function exportSectionsAsJS(auteur) {
  // Sérialise une section en gardant les props pertinentes (skipIf est une
  // fonction non-sérialisable → on la convertit en commentaire TODO)
  const serializeSection = (s) => {
    const keys = ['system', 'id', 'n', 'title', 'short', 'icon', 'subtitle',
                  'bureau', 'fluxLocked', 'carac', 'synth'];
    const out = {};
    keys.forEach(k => { if (s[k] !== undefined) out[k] = s[k]; });
    if (typeof s.skipIf === 'function') {
      out._WARN_skipIf = '⚠ Cette section a une fonction skipIf à recopier manuellement depuis le code source';
    }
    out.criteria = (s.criteria || []).map(c => {
      const cOut = {};
      ['id', 'label', 'help', 'type', 'scale', 'choices', 'labels', '_subhead',
       'createdBy', 'createdAt', 'updatedBy', 'updatedAt'].forEach(k => {
        if (c[k] !== undefined) cOut[k] = c[k];
      });
      return cOut;
    });
    return out;
  };

  const data = SECTIONS.map(serializeSection);
  const now = new Date();
  const ts = now.toISOString();
  const dateStr = now.toLocaleString('fr-FR');

  let code = `// ============================================================\n`;
  code += `// SECTIONS — Export depuis l'app SERM HDF\n`;
  code += `// Date         : ${dateStr}\n`;
  code += `// Exporté par  : ${auteur || 'Anonyme'}\n`;
  code += `// Source       : grille_config Supabase (live)\n`;
  code += `//\n`;
  code += `// MODE D'EMPLOI :\n`;
  code += `// 1. Ouvrir le HTML source dans un éditeur\n`;
  code += `// 2. Rechercher "let SECTIONS = ["\n`;
  code += `// 3. Remplacer ce bloc par le code ci-dessous\n`;
  code += `// 4. ⚠ Vérifier les sections marquées "_WARN_skipIf" et\n`;
  code += `//    recopier manuellement les fonctions skipIf depuis l'ancien code\n`;
  code += `// 5. Pusher le HTML, et incrémenter GRID_VERSION si besoin\n`;
  code += `// ============================================================\n\n`;
  code += `let SECTIONS = ${JSON.stringify(data, null, 2)};\n`;

  const blob = new Blob([code], { type: 'text/javascript;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `SECTIONS_grille_${ts.slice(0, 10)}_${ts.slice(11, 16).replace(':','h')}.js`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

   HELPERS
   ============================================================ */
/* fillableCriteria — exclut text + subhead (séparateurs visuels) */
const fillableCriteria = (s) => (s.criteria || []).filter((c) => c.type !== 'text' && c.type !== 'subhead');
/* Get the actual "val" of a criterion, handling 4 shapes:
   - primitive : data[id] = 'yes' | 0.5 | 12 | 'Quai haut'
   - array (multi-select) : data[id] = ['choix_a', 'choix_b']
   - composite pn/pne : data[id] = { presence, nb, etat, note?, photos? }
   - wrapper avec extras : data[id] = { val: <primitive|array>, note, photos } */
const getVal = (raw) => {
  if (raw == null) return undefined;
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'object') {
    // Composite pn/pne : retourne l'objet entier
    if ('presence' in raw) return raw;
    // Wrapper avec val
    if ('val' in raw) return raw.val;
    // Objet inconnu
    return raw;
  }
  return raw;
};
const getNote = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw.note || '') : '';
const getPhotos = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw.photos || []) : [];
// Tracking par critère : qui a modifié en dernier, à quel moment
const getEditor = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw._by || '') : '';
const getEditedAt = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw._at || null) : null;

const isFilled = (c, raw) => {
  // Cas spécial : N/A (non applicable / ne sait pas) compte comme rempli
  if (raw && typeof raw === 'object' && raw.na === true) return true;
  const v = getVal(raw);
  if (v === undefined || v === null || v === '') return false;
  // Multi-select : rempli si ≥ 1 élément
  if (Array.isArray(v)) return v.length > 0;
  // Composite pn/pne : rempli si presence est posée
  if (typeof v === 'object' && v !== null) {
    if ('presence' in v) return v.presence === 'yes' || v.presence === 'no';
    if ('val' in v) return v.val !== undefined && v.val !== null && v.val !== '';
  }
  return true;
};
const sectionStats = (s, data) => {
  const items = fillableCriteria(s);
  const filled = items.filter((c) => isFilled(c, data?.[c.id])).length;
  return { filled, total: items.length };
};
const visiteStats = (gare, data) => {
  let f = 0,t = 0;
  SECTIONS.forEach((s) => {
    if (s.skipIf && s.skipIf(gare, data)) return;
    const st = sectionStats(s, data);
    f += st.filled;t += st.total;
  });
  return { filled: f, total: t, pct: t === 0 ? 0 : Math.round(f / t * 100) };
};
const fmtAgo = (ts) => {
  if (ts == null) return '';
  // Accepte timestamp number OU string ISO ("2026-05-20T...")
  const tsNum = typeof ts === 'number' ? ts : new Date(ts).getTime();
  if (!tsNum || isNaN(tsNum)) return '';
  const m = Math.floor((Date.now() - tsNum) / 60000);
  if (isNaN(m) || m < 0) return '';
  if (m < 1) return 'à l\'instant';
  if (m < 60) return `il y a ${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h / 24)} j`;
};

function ProgressRing({ pct, size = 44, stroke = 4, color = 'var(--red)' }) {

  return (
    <div style={{ width: size, height: size, position: 'relative', flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C * (1 - pct / 100)}
        style={{ transition: 'stroke-dashoffset 0.4s ease' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size > 50 ? 13 : 10, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>
        {pct}%
      </div>
    </div>);

}

/* ============================================================
   NETWORK MAP — carte SVG du réseau SERM HDF
   Le SVG est inliné dans le HTML via <template id="hdf-map-svg">
   → plus de fichier externe, plus de NOT_FOUND
   ============================================================ */
let _networkSvgPromise = null;
function loadNetworkSvg() {
  if (!_networkSvgPromise) {
    _networkSvgPromise = new Promise((resolve) => {
      const tpl = document.getElementById('hdf-map-svg');
      resolve(tpl ? tpl.innerHTML.trim() : '');
    });
  }
  return _networkSvgPromise;
}

/* Slug helper : "Lille Flandres" → "gare-lille-flandres"  */
function gareSlug(nom) {
  return 'gare-' + nom
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/œ/g, 'oe')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '');
}

function NetworkMap({ statuses = {}, style = {} }) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);

  // Charge le SVG une seule fois et l'injecte tel quel (zéro modification)
  useEffect(() => {
    let off = false;
    loadNetworkSvg().then(svg => {
      if (off || !ref.current) return;
      ref.current.innerHTML = svg;
      const root = ref.current.querySelector('svg');
      if (root) {
        root.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        root.style.width = '100%';
        root.style.height = '100%';
        root.style.display = 'block';
      }
      setLoaded(true);
    });
    return () => { off = true; };
  }, []);

  // Au changement de statuses : on ajoute juste une classe sur le <g id="gare-xxx"> correspondant.
  // Le CSS .nm-wip / .nm-done injecté ci-dessous fait toute la coloration + l'animation.
  useEffect(() => {
    if (!loaded || !ref.current) return;
    const svg = ref.current.querySelector('svg');
    if (!svg) return;
    svg.querySelectorAll('[id^="gare-"]').forEach(g => {
      const id = g.getAttribute('id');
      const baseId = id.replace(/[0-9]+$/, ''); // gare-armentieres1 → gare-armentieres
      const status = statuses[id] || statuses[baseId];
      g.classList.remove('nm-wip', 'nm-done');
      if (status === 'wip') g.classList.add('nm-wip');
      else if (status === 'done') g.classList.add('nm-done');
    });
  }, [loaded, JSON.stringify(statuses)]);

  return (
    <div ref={ref} className="network-map" style={{
      width: '100%', height: '100%', position: 'relative', ...style
    }} />
  );
}

/* CSS pour la coloration des gares visitées — injecté une fois au chargement.
   Animation rouge clignotant pour wip, vert plein pour done. */
if (typeof document !== 'undefined' && !document.getElementById('nm-styles')) {
  const s = document.createElement('style');
  s.id = 'nm-styles';
  s.textContent = `
    .network-map .nm-wip path, .network-map .nm-wip circle {
      fill: #C8102E !important;
      stroke: #C8102E !important;
      animation: nmBlink 1.4s ease-in-out infinite;
    }
    .network-map .nm-done path, .network-map .nm-done circle {
      fill: #1D5E3A !important;
      stroke: #1D5E3A !important;
    }
    @keyframes nmBlink {
      0%, 100% { opacity: 1; }

    }
  `;

}


/* ============================================================
   HERO ACCUEIL — carte plein-bleed (piste C)
   ============================================================ */
function FriendlyHero({ all, auteur, visites, fullyDone, inProgress, visited, totalGares, onPick, onOpen, onExportAll }) {
  const mine = visites.filter(v => v.auteur === auteur);
  const lastMine = mine[0];
  const mineOpen = mine.filter(v => {
    const g = GARES.find(x => x.nom === v.gare);
    return g && visiteStats(g, v.data).pct < 100;
  }).length;

  /* Statuts par gare pour la carte */
  const mapStatuses = useMemo(() => {
    const out = {};
    Object.values(all).forEach(v => {
      const g = GARES.find(x => x.nom === v.gare);
      if (!g) return;
      const pct = visiteStats(g, v.data).pct;
      out[gareSlug(v.gare)] = pct === 100 ? 'done' : pct > 0 ? 'wip' : 'todo';
    });
    return out;
  }, [all]);



  const ribbon = GARES.map((g) => {
    const v = all[g.nom];
    if (!v) return 'todo';
    const pct = visiteStats(g, v.data).pct;
    return pct === 100 ? 'done' : 'wip';
  });

  return (
    <div style={{ position: 'relative', overflow: 'hidden', background: 'var(--paper-light)' }}>

              clusterLille: true, lignesHorsZone: true, numerosLignes: false,
              contour: true, belgique: true }}
            theme={{
              network: '#7A7570',
              contour: '#2E2E2E',
              zoneOpacity: 0.30,
              zoneStrokeOpacity: 0.55,
              gareDone: '#1D5E3A',
              gareWip: '#C8102E',
              gareTodo: '#FFFFFF',
              gareTodoStroke: '#1A1A1A',
              gareStrokeW: 1,

            }}

        </div>

        {/* Vignette douce en bas du cadre carte — adéquation papier */}

          <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
            <div style={{ fontSize: 9.5, letterSpacing: '0.14em',
              textTransform: 'uppercase', fontWeight: 700, color: 'var(--taupe)' }}>Réseau</div>
            <div className="tabular" style={{ fontSize: 11, fontWeight: 600 }}>

/* ============================================================
   GRID EDIT MODAL — modale unifiée pour éditer la grille
   Gère 4 cas selon modal.type :
     - 'edit-crit'    : modifier un critère existant (label, help, options)
     - 'add-crit'     : ajouter un critère (avec sélection de type)
     - 'edit-section' : modifier le header d'un onglet
     - 'add-section'  : créer un nouvel onglet
   ============================================================ */
function GridEditModal({ modal, onClose, apply, gridRev, auteur }) {
  if (!modal) return null;
  const { type, sectionId, critId, current } = modal;

  // États du formulaire — initialisés selon le type d'action
  const isCrit = type === 'edit-crit' || type === 'add-crit';
  const isSection = type === 'edit-section' || type === 'add-section';

  const [label, setLabel] = useState(current?.label || '');
  const [help, setHelp] = useState(current?.help || '');
  const [critType, setCritType] = useState(current?.type || 'presence');
  // Pour rating
  const [ratingLabels, setRatingLabels] = useState(
    Array.isArray(current?.labels) ? current.labels.join('\n') : 'Absent\nInsuffisant\nCorrect\nQualitatif'
  );
  // Pour choice / multi
  const [choicesText, setChoicesText] = useState(
    Array.isArray(current?.choices) ? current.choices.join('\n') : ''
  );
  // Pour section
  const [sTitle, setSTitle] = useState(current?.title || '');
  const [sShort, setSShort] = useState(current?.short || '');
  const [sIcon, setSIcon] = useState(current?.icon || '•');
  const [sSubtitle, setSSubtitle] = useState(current?.subtitle || '');

  const isSystem = current?.system === true;
  const canEditType = type === 'add-crit'; // type modifiable seulement à la création

  const submit = () => {
    if (isCrit) {
      const labels = ratingLabels.split('\n').map(s => s.trim()).filter(Boolean);
      const choices = choicesText.split('\n').map(s => s.trim()).filter(Boolean);
      const payload = { label: label.trim(), help: help.trim() || undefined };
      // Ajoute les champs spécifiques selon le type
      const tt = type === 'add-crit' ? critType : current.type;
      if (tt === 'rating') {
        payload.scale = labels.length || 4;
        payload.labels = labels.length ? labels : ['Absent','Insuffisant','Correct','Qualitatif'];
      }
      if (tt === 'choice' || tt === 'multi') {
        if (!choices.length) { alert('Renseigne au moins une option (une par ligne)'); return; }
        payload.choices = choices;
      }
      if (!payload.label) { alert('Le libellé est obligatoire'); return; }

      if (type === 'add-crit') {
        payload.type = critType;
        apply(() => { gridAddCriterion(sectionId, payload, auteur); return true; }, 'Question ajoutée');
      } else {
        apply(() => gridUpdateCriterion(sectionId, critId, payload, auteur), 'Question modifiée');
      }
    } else if (isSection) {
      const payload = {
        title: sTitle.trim(),
        short: sShort.trim() || sTitle.trim().slice(0, 8),
        icon: sIcon.trim() || '•',
        subtitle: sSubtitle.trim()
      };
      if (!payload.title) { alert('Le titre de l\'onglet est obligatoire'); return; }
      if (type === 'add-section') {
        apply(() => { gridAddSection(payload, auteur); return true; }, 'Onglet créé');
      } else {
        apply(() => gridUpdateSection(sectionId, payload, auteur), 'Onglet modifié');
      }
    }
    onClose();
  };

  const titleByType = {
    'edit-crit': 'Modifier la question',
    'add-crit': 'Ajouter une question',
    'edit-section': 'Modifier l\'onglet',
    'add-section': 'Nouvel onglet'
  };

  // Type options pour le selecteur
  const TYPE_OPTIONS = [
    { value: 'presence', label: 'Présence (Présent / Absent)' },
    { value: 'pn', label: 'Présence + Nombre' },
    { value: 'pne', label: 'Présence + Nombre + État' },
    { value: 'count', label: 'Compteur (entier)' },
    { value: 'number', label: 'Nombre libre' },
    { value: 'date', label: 'Date' },
    { value: 'rating', label: 'Note (4 niveaux avec labels custom)' },
    { value: 'choice', label: 'Choix unique (liste)' },
    { value: 'multi', label: 'Choix multiple (cases à cocher)' },
    { value: 'text', label: 'Texte libre' },
    { value: 'subhead', label: 'Sous-titre (séparateur visuel)' }
  ];

  const tt = type === 'add-crit' ? critType : current?.type;

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 2000,
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center', padding: 0
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: 'var(--paper-light)', width: '100%', maxWidth: 560,
        maxHeight: '92vh', overflowY: 'auto',
        borderTopLeftRadius: 12, borderTopRightRadius: 12,
        padding: '20px 18px 24px', boxShadow: 'var(--shadow-lg)'
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <h2 style={{ fontSize: 18 }}>{titleByType[type]}</h2>
          <button onClick={onClose} style={{ fontSize: 22, color: 'var(--taupe)', padding: '4px 8px' }}>×</button>
        </div>

        {/* Critère */}
        {isCrit && <>
          <Field label="Libellé de la question *">
            <input value={label} onChange={e => setLabel(e.target.value)}
              placeholder="Ex: Présence d'une borne d'appel" style={inputStyle} autoFocus />
          </Field>

          <Field label="Aide (optionnel)">
            <textarea value={help} onChange={e => setHelp(e.target.value)}
              placeholder="Texte court qui apparaît sous le libellé"
              rows={2} style={{ ...inputStyle, resize: 'vertical' }} />
          </Field>

          <Field label={`Type de question ${canEditType ? '*' : '(non modifiable)'}`}>
            <select value={critType} disabled={!canEditType}
              onChange={e => setCritType(e.target.value)} style={inputStyle}>
              {TYPE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
            {!canEditType && <p style={hintStyle}>
              Pour changer de type, supprime cette question et crée-en une nouvelle.
            </p>}
          </Field>

          {tt === 'rating' && (
            <Field label="Labels des 4 niveaux (un par ligne, du plus bas au plus haut)">
              <textarea value={ratingLabels} onChange={e => setRatingLabels(e.target.value)}
                rows={4} style={{ ...inputStyle, resize: 'vertical', fontFamily: 'var(--font-mono)', fontSize: 13 }} />
            </Field>
          )}

          {(tt === 'choice' || tt === 'multi') && (
            <Field label="Options (une par ligne) *">
              <textarea value={choicesText} onChange={e => setChoicesText(e.target.value)}
                rows={5} style={{ ...inputStyle, resize: 'vertical', fontFamily: 'var(--font-mono)', fontSize: 13 }}
                placeholder={"Option 1\nOption 2\nOption 3"} />
            </Field>
          )}
        </>}

        {/* Section */}
        {isSection && <>
          {isSystem && type === 'edit-section' && <div style={{
            background: 'var(--amber-tint)', padding: '8px 12px', fontSize: 12,
            color: 'var(--amber)', marginBottom: 12, borderRadius: 4
          }}>
            ⚠ Onglet système — tu peux modifier son titre/sous-titre mais pas le supprimer.
          </div>}
          <Field label="Titre complet *">
            <input value={sTitle} onChange={e => setSTitle(e.target.value)}
              placeholder="Ex: Information voyageurs" style={inputStyle} autoFocus />
          </Field>
          <Field label="Nom court (affiché dans la barre du bas)">
            <input value={sShort} onChange={e => setSShort(e.target.value)}
              placeholder="Ex: Info" maxLength={12} style={inputStyle} />
          </Field>
          <Field label="Sous-titre (optionnel)">
            <input value={sSubtitle} onChange={e => setSSubtitle(e.target.value)}
              placeholder="Description courte de l'onglet" style={inputStyle} />
          </Field>
        </>}

        <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
          <button onClick={onClose} style={{
            flex: 1, padding: '12px 16px', border: '1px solid var(--border)',
            background: 'var(--paper-light)', fontWeight: 500, borderRadius: 4
          }}>Annuler</button>
          <button onClick={submit} style={{
            flex: 2, padding: '12px 16px', background: 'var(--red)',
            color: 'white', fontWeight: 600, borderRadius: 4
          }}>{type.startsWith('add') ? 'Créer' : 'Enregistrer'}</button>
        </div>
      </div>
    </div>
  );
}

      }}>
        <span>👁</span><span>Mode consultation — modifications désactivées</span>

        {/* ── EN COURS LIST ── */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '30px 0 12px' }}>
          <div className="kicker" style={{ color: 'var(--ink)', fontSize: 10 }}>Sur le terrain</div>
          <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
          <span className="tabular" style={{ fontSize: 10.5, color: 'var(--ink-soft)', fontWeight: 600, letterSpacing: '0.06em' }}>
            {String(visites.length).padStart(2, '0')} {visites.length > 1 ? 'visites' : 'visite'}

        {visites.length === 0 ?
        <div style={{
          border: '1px dashed var(--border)', padding: '20px 16px', textAlign: 'center',
          background: 'var(--paper)', color: 'var(--taupe)', fontSize: 12, fontStyle: 'italic'
        }}>
            Aucune visite enregistrée.<br />
            <span style={{ fontStyle: 'normal', fontSize: 11 }}>Commence par taper « Nouvelle visite » ↑</span>
          </div> :

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {visites.map((v, i) => {
            const g = GARES.find((x) => x.nom === v.gare);
            if (!g) return null;
            const stats = visiteStats(g, v.data);
            const isMine = v.auteur === auteur;
            const done = stats.pct === 100;
            return (
              <button key={v.gare} onClick={() => onOpen(v.gare)} style={{
                background: 'var(--white)', border: '1px solid var(--border)',
                borderLeft: `3px solid ${done ? 'var(--green)' : stats.pct > 0 ? 'var(--red)' : 'var(--border)'}`,
                padding: '12px 14px 11px', textAlign: 'left',
                display: 'flex', alignItems: 'center', gap: 13, position: 'relative'
              }}>
                  <span className="tabular" style={{
                  fontSize: 11, fontWeight: 700, color: 'var(--taupe-light)',
                  fontFamily: 'var(--font-display)', flexShrink: 0, alignSelf: 'flex-start',
                  marginTop: 2, letterSpacing: '0.04em'

                  <ProgressRing pct={stats.pct} size={42} stroke={3} color={done ? 'var(--green)' : 'var(--red)'} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                      <h4 style={{ fontSize: 14.5, fontWeight: 600, fontFamily: 'var(--font-display)', letterSpacing: '-0.01em' }}>{v.gare}</h4>
                      <span style={{
                      fontSize: 8.5, fontWeight: 700, padding: '1.5px 5px', borderRadius: 8,
                      background: isMine ? 'var(--red)' : 'transparent',
                      color: isMine ? 'var(--paper-light)' : 'var(--taupe)',
                      border: `1px solid ${isMine ? 'var(--red)' : 'var(--border)'}`,
                      letterSpacing: '0.08em', textTransform: 'uppercase'
                    }}>{v.auteur}</span>
                      {done &&
                    <span style={{
                      fontSize: 8.5, fontWeight: 700, padding: '1.5px 5px', borderRadius: 1,
                      background: 'var(--green)', color: 'var(--paper-light)',
                      letterSpacing: '0.1em', textTransform: 'uppercase'
                    }}>Validé</span>
                    }
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--taupe)', letterSpacing: '0.06em',
                    textTransform: 'uppercase', marginTop: 5, display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                      <span>{g.cat_pro?.split('-')[0]?.trim()}</span>
                      <span style={{ color: 'var(--taupe-light)' }}>·</span>
                      <span>{g.ligne_flux}</span>
                      <span style={{ color: 'var(--taupe-light)' }}>·</span>
                      <span style={{ textTransform: 'lowercase', fontStyle: 'italic' }}>{fmtAgo(v.updated)}</span>
                    </div>
                  </div>
                  <span style={{ color: 'var(--taupe)', fontSize: 14, alignSelf: 'center' }}>›</span>
                </button>);

          })}
          </div>
        }

        {/* (footer retiré — épurer encore plus) */}
        </div>
      </div>
    </div>);

}

/* ============================================================
   FORM SCREEN — plan-first hybrid
   ============================================================ */

function FormScreen({ gare, visite, onUpdate, onBack, onOverview, onToast,
                      editMode, onToggleEdit, onEditCrit, onAddCrit, onDeleteCrit,
                      onEditSection, onAddSection, onDeleteSection, readOnly, gridRev }) {
  const sections = useMemo(
    () => SECTIONS.filter((s) => !s.skipIf || !s.skipIf(gare, visite.data)),
    // gridRev force le recalcul quand la grille est modifiée
    [gare, visite.data, gridRev]
  );
  const [activeId, setActiveId] = useState(sections[0].id);
  // ID du critère actif (déplié). Les autres critères répondus sont repliés.
  const [activeCritId, setActiveCritId] = useState(null);
  // Reset l'actif quand on change d'onglet
  useEffect(() => { setActiveCritId(null); }, [activeId]);
  // If the active section becomes hidden (e.g. user marked BV as Absent), fall back to first
  useEffect(() => {
    if (!sections.find((s) => s.id === activeId)) {
      setActiveId(sections[0]?.id);
    }
  }, [sections, activeId]);
  const stats = visiteStats(gare, visite.data);
  const activeSection = sections.find((s) => s.id === activeId) || sections[0];
  const activeIdx = sections.findIndex((s) => s.id === (activeSection?.id));
  const sStats = activeSection ? sectionStats(activeSection, visite.data) : { filled: 0, total: 0 };

  /* Update val while preserving note/photos if present.
     val peut être : primitive (string/number/boolean), array (multi-select), objet composite (pn/pne) */
  // Helper : ajoute _by (auteur actuel) et _at (timestamp now) à la valeur stockée.
  // Convertit val en objet si nécessaire pour pouvoir y mettre les meta.
  const stampMeta = (val) => {
    const me = localStorage.getItem('serm-auteur') || 'Anonyme';
    const at = Date.now();
    // Composite (pn/pne) avec presence → on enrobe quand même
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      return { ...val, _by: me, _at: at };
    }
    // Primitive ou array : wrapping
    return { val, _by: me, _at: at };
  };

  const setVal = (cid, val) => {
    const cur = visite.data[cid];
    const hasExtras = cur && typeof cur === 'object' && !Array.isArray(cur)
      && (cur.note || (cur.photos && cur.photos.length));
    let next;
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      // Composite (pn/pne) : flat-merge avec extras existants
      next = hasExtras
        ? { ...val, note: cur.note || '', photos: cur.photos || [] }
        : val;
    } else if (hasExtras) {
      // Primitive/array : préserver note/photos via { val, note, photos }
      next = { ...cur, val };
    } else {
      next = val;
    }
    // Toute vraie valeur retire le flag N/A
    if (next && typeof next === 'object' && !Array.isArray(next)) delete next.na;
    next = stampMeta(next);
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  const clearVal = (cid) => {
    const d = { ...visite.data };delete d[cid];
    onUpdate({ ...visite, data: d, updated: Date.now() });
  };
  /* Marque le critère comme N/A (Non Applicable / Ne Sait Pas)
     → compte comme rempli dans la complétion, mais sans valeur */
  const setNA = (cid) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : {};
    const next = stampMeta({ ...obj, na: true });
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  /* Update note (always promotes data[id] to object form) */
  const setNote = (cid, note) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : { val: cur };
    const next = stampMeta({ ...obj, note });
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  const setPhotos = (cid, photos) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : { val: cur };
    const next = stampMeta({ ...obj, photos });
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };

  // Auto-advance helper
  const goToNext = () => {
    if (activeIdx < sections.length - 1) {
      setActiveId(sections[activeIdx + 1].id);
      // scroll panel to top
      const panel = document.getElementById('panel-scroll');
      if (panel) panel.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
  const goToPrev = () => {
    if (activeIdx > 0) {
      setActiveId(sections[activeIdx - 1].id);
      const panel = document.getElementById('panel-scroll');
      if (panel) panel.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // Swipe support
  const touchRef = useRef({ x: 0, active: false });
  const onTouchStart = (e) => {touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, active: true };};
  const onTouchEnd = (e) => {
    if (!touchRef.current.active) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = Math.abs(e.changedTouches[0].clientY - touchRef.current.y);
    if (Math.abs(dx) > 60 && dy < 50) {
      if (dx < 0) goToNext();else goToPrev();
    }
    touchRef.current.active = false;
  };

  const hasBV = !sections.find((s) => s.id === 'bv') ? false : true;
  const hasFranch = !sections.find((s) => s.id === 'franch') ? false : true;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      {/* BANDEAU MODE CONSULTATION */}
      {readOnly &&
      <div style={{
        background: 'var(--bureau)', color: 'var(--paper-light)',
        padding: '6px 14px', fontSize: 11, fontWeight: 600,
        letterSpacing: '0.05em', textAlign: 'center', flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
      }}>
        <span>👁</span><span>Mode consultation — modifications désactivées</span>
      </div>
      }
      {/* TOP BAR */}
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '12px 18px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0, gap: 8 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}>
          ← <span className="kicker" style={{ fontSize: 10 }}>Carnet</span>
        </button>
        <div style={{ display: 'flex', gap: 6 }}>
          {onToggleEdit &&
          <button onClick={onToggleEdit} title="Mode édition de la grille" style={{
            color: editMode ? 'var(--paper-light)' : 'var(--paper)',
            background: editMode ? 'var(--red)' : 'transparent',
            fontSize: 11, padding: '5px 10px',
            border: `1px solid ${editMode ? 'var(--red)' : 'rgba(245,242,235,0.2)'}`,
            borderRadius: 2, fontWeight: 600
          }}>{editMode ? '✓ Édition' : '🛠'}</button>
          }
          <button onClick={onOverview} style={{ color: 'var(--paper)', fontSize: 11, padding: '5px 10px',
            border: '1px solid rgba(245,242,235,0.2)', borderRadius: 2,
            display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1" />
                <circle cx="6" cy="6" r="1.5" fill="currentColor" />
              </svg>
              Vue d'ensemble
            </span>
          </button>
        </div>
      </div>

      {/* GARE HEADING + PLAN */}
      <div style={{ background: 'var(--paper-light)', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ padding: '14px 18px 6px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="kicker" style={{ color: 'var(--red)', fontSize: 9.5, marginBottom: 4 }}>
              {gare.cat_sgp} · {gare.ligne_flux}
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.025em', lineHeight: 1.05 }}>{gare.nom}</h2>
            <div style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 3, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
              UIC {gare.uic} · {gare.secteur}
            </div>
            {/* Typologie morphologique — déduite du plan de voies, pour le rendu iso */}
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 7,
              padding: '3px 8px', background: 'var(--paper-deep)',
              border: '1px solid var(--border)', borderRadius: 2,
              fontSize: 10, color: 'var(--ink-soft)', fontWeight: 500, letterSpacing: '0.02em'
            }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--ink-soft)' }} />
              {gare.cat_sgp || gare.cat_pro || '—'}
            </div>
          </div>
          <ProgressRing pct={stats.pct} size={48} />
        </div>
      </div>

      {/* SECTION PANEL — full focus
          Tout ce qui suit scroll, sauf la BARRE TITRE qui est sticky top:0 */}
      <div id="panel-scroll" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{ flex: 1, overflowY: 'auto',
        background: editMode ? '#FFF6F0' : (activeSection.bureau ? '#F5F7F9' : 'var(--white)'),
        minHeight: 0,
        boxShadow: editMode ? 'inset 0 0 0 3px var(--red)' : 'none',
        transition: 'background 0.2s, box-shadow 0.2s'
      }}>

        {/* ENCART CONTEXTE VISITE — scroll avec le contenu */}
        {!readOnly &&
        <div style={{ padding: '0 14px 12px', display: 'flex', gap: 8, flexWrap: 'wrap',
          background: 'var(--paper-light)' }}>
          <label style={{ flex: '1 1 140px', display: 'flex', flexDirection: 'column', gap: 3, minWidth: 0 }}>
            <span style={{ fontSize: 9.5, fontWeight: 600, color: 'var(--taupe)',
              textTransform: 'uppercase', letterSpacing: '0.08em' }}>📅 Date de visite</span>
            <input type="date" value={visite.data?.visite_date || ''}
              onChange={(e) => setVal('visite_date', e.target.value)}
              style={{
                padding: '7px 10px', fontSize: 13, fontFamily: 'inherit',
                border: '1.5px solid var(--border)', borderRadius: 2,
                background: 'var(--white)', outline: 'none'
              }} />
          </label>
          <label style={{ flex: '1 1 140px', display: 'flex', flexDirection: 'column', gap: 3, minWidth: 0 }}>
            <span style={{ fontSize: 9.5, fontWeight: 600, color: 'var(--taupe)',
              textTransform: 'uppercase', letterSpacing: '0.08em' }}>☁ Météo</span>
            <select value={visite.data?.visite_meteo || ''}
              onChange={(e) => setVal('visite_meteo', e.target.value)}
              style={{
                padding: '7px 10px', fontSize: 13, fontFamily: 'inherit',
                border: '1.5px solid var(--border)', borderRadius: 2,
                background: 'var(--white)', outline: 'none'
              }}>
              <option value="">—</option>
              <option value="Soleil">Soleil</option>
              <option value="Couvert">Couvert</option>
              <option value="Pluie">Pluie</option>
              <option value="Brouillard">Brouillard</option>
            </select>
          </label>
        </div>
        }

        {/* SECTION CHIPS — scroll avec le contenu */}
        <div style={{ display: 'flex', gap: 6, padding: '4px 14px 12px', overflowX: 'auto',
          WebkitOverflowScrolling: 'touch', background: 'var(--paper-light)',
          borderBottom: '1px solid var(--border)' }}>
          {sections.map((s) => {
            const st = sectionStats(s, visite.data);
            const done = st.filled === st.total && st.total > 0;
            const partial = st.filled > 0 && !done;
            const active = s.id === activeId;
            return (
              <button key={s.id} onClick={() => setActiveId(s.id)} style={{
                flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 6,
                padding: '6px 11px', borderRadius: 99,
                background: active ? 'var(--red)' : s.bureau ? 'var(--bureau-bg)' : 'var(--white)',
                color: active ? 'var(--paper-light)' : done ? 'var(--green)' : 'var(--ink-soft)',
                border: `1px solid ${active ? 'var(--red)' : done ? 'var(--green-soft)' : 'var(--border)'}`,
                fontSize: 11.5, fontWeight: active ? 600 : 500, whiteSpace: 'nowrap'
              }}>
                <span className="tabular" style={{
                  width: 16, height: 16, borderRadius: '50%',
                  background: active ? 'var(--paper-light)' : done ? 'var(--green)' : 'var(--paper-deep)',
                  color: active ? 'var(--red)' : done ? 'var(--paper-light)' : 'var(--taupe)',
                  fontSize: 9.5, fontWeight: 700, display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
                }}>{done ? '✓' : s.n}</span>
                {s.short}
                {partial && !active &&
                <span className="tabular" style={{ fontSize: 9.5, color: 'var(--taupe)' }}>{st.filled}/{st.total}</span>
                }
              </button>);
          })}
          {editMode &&
          <button onClick={onAddSection} style={{
            flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 4,
            padding: '6px 11px', borderRadius: 99,
            background: 'var(--red-tint)', color: 'var(--red)',
            border: '1px dashed var(--red)',
            fontSize: 11.5, fontWeight: 600, whiteSpace: 'nowrap'
          }}>+ Onglet</button>
          }
        </div>

        {/* BARRE TITRE ONGLET — STICKY top:0, reste fixe quand on scroll dans la section */}
        <div style={{
          position: 'sticky', top: 0, zIndex: 5,
          background: activeSection.bureau ? '#F5F7F9' : 'var(--white)',
          borderTop: '1px solid var(--border)',
          borderBottom: '2px solid var(--ink)',
          padding: '10px 18px',
          display: 'flex', alignItems: 'center', gap: 12
        }}>
          <div className="tabular" style={{
            fontSize: 24, fontWeight: 700, lineHeight: 0.9,
            color: activeSection.bureau ? 'var(--bureau)' : 'var(--red)',
            fontFamily: 'var(--font-display)', letterSpacing: '-0.04em', flexShrink: 0
          }}>{String(Math.floor(activeSection.n)).padStart(2, '0')}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h3 style={{ fontSize: 14.5, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.015em',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{activeSection.title}</h3>
            <div style={{ fontSize: 10, color: 'var(--taupe)', marginTop: 1,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{activeSection.subtitle}</div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <div className="tabular" style={{ fontSize: 13, fontWeight: 700,
              color: sStats.filled === sStats.total && sStats.total > 0 ? 'var(--green)' : 'var(--ink)' }}>
              {sStats.filled}<span style={{ color: 'var(--taupe-light)', fontWeight: 500 }}>/{sStats.total}</span>
            </div>
            <div style={{ fontSize: 8.5, color: 'var(--taupe)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>relevés</div>
          </div>
        </div>
        <div style={{ padding: '18px 18px 100px' }}>
          {activeSection.fluxLocked &&
          <div style={{
            background: 'var(--bureau)', color: 'var(--paper-light)',

          }}>
            <span style={{ fontSize: 16, lineHeight: 1, marginTop: 1 }}>🔒</span>
            <div>
              <strong>Section verrouillée</strong> — données alimentées automatiquement depuis la base Flux.
            </div>

          }
          {activeSection.bureau && !activeSection.fluxLocked &&
          <div style={{ background: 'var(--bureau)', color: 'var(--paper-light)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, borderRadius: 2, lineHeight: 1.4 }}>
              <strong>À remplir au bureau</strong> — données SIG / desk research, pas pendant la visite.
            </div>
          }
          {activeSection.synth &&
          <div style={{ background: 'var(--red-tint)', borderLeft: '3px solid var(--red)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink)', lineHeight: 1.4 }}>
              <strong>Synthèse de visite</strong> — ressenti global + classifications. À remplir en fin de visite.
            </div>

          {activeSection.id === 'pmr' &&
          <div style={{ background: 'var(--paper)', borderLeft: '3px solid var(--ink)', padding: '10px 12px',

              <strong>Accessibilité PMR (en cours)</strong> — relevé des dispositifs pour

            </div>

              <strong>2e parking détecté</strong> — la caractérisation montre plusieurs types de

          <div style={{
            background: 'var(--red)',

            fontSize: 12, fontWeight: 600,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap',
            position: 'sticky', top: 0, zIndex: 5,
