                <span style={{ fontSize: 11, color: 'var(--green)', fontStyle: 'italic' }}>vue {fmtAgo(visite.updated)}</span>
              </div>
            }
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={goToPrev} disabled={activeIdx === 0} style={{
                flex: 1, padding: '13px 14px', background: 'var(--white)', border: '1px solid var(--border)',
                borderRadius: 2, fontWeight: 500, fontSize: 13, color: activeIdx === 0 ? 'var(--taupe-light)' : 'var(--ink)',
                opacity: activeIdx === 0 ? 0.4 : 1, display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center'
              }}>
                ← <span style={{ fontSize: 11, color: 'var(--taupe)' }}>{sections[activeIdx - 1]?.short || ''}</span>
              </button>
              <button onClick={goToNext} disabled={activeIdx === sections.length - 1} style={{
                flex: 2, padding: '13px 14px', background: 'var(--ink)', color: 'var(--paper-light)',
                borderRadius: 2, fontWeight: 600, fontSize: 13, letterSpacing: '0.04em', textTransform: 'uppercase',
                opacity: activeIdx === sections.length - 1 ? 0.4 : 1,
                display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center'
              }}>
                {activeIdx === sections.length - 1 ? 'Fin' : <>Section suivante · <span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0, opacity: 0.85 }}>{sections[activeIdx + 1]?.short}</span> →</>}
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* FAB SORTIR - toujours accessible, en bas à droite, par-dessus tout le contenu */}
      <button onClick={onBack} title="Sortir de cette gare et revenir au carnet"
        aria-label="Sortir et retourner au carnet"
        style={{
          position: 'fixed', bottom: 20, right: 16,
          width: 52, height: 52, borderRadius: '50%',
          background: 'var(--ink)', color: 'var(--paper-light)',
          border: '3px solid var(--paper-light)',
          boxShadow: '0 4px 14px rgba(26,26,26,0.25), 0 1px 3px rgba(26,26,26,0.15)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 50, cursor: 'pointer',
          transition: 'transform 0.15s ease, background 0.15s ease'
        }}
        onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--red)'; e.currentTarget.style.transform = 'scale(1.05)'; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = 'var(--ink)'; e.currentTarget.style.transform = 'scale(1)'; }}
      >
        {/* Icône maison stylisée (= retour carnet/accueil) */}
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M3 11.5 L12 4 L21 11.5" />
          <path d="M5 10 V20 H10 V14 H14 V20 H19 V10" />
        </svg>
      </button>
    </div>);

}

/* ============================================================
   CRITERION
   ============================================================ */
function Criterion({ c, raw, gareName, onSetVal, onSetNote, onSetPhotos, onClear, onSetNA, onToast, locked, isActive, onActivate }) {
  // Sub-head : juste un séparateur visuel dans une section (PSH, Synthèse)
  if (c.type === 'subhead') {
    return (
      <div style={{
        marginTop: 6, marginBottom: -4, paddingTop: 14, paddingBottom: 6,
        borderTop: '1.5px solid var(--ink)'
      }}>
        <h4 style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.04em',
          textTransform: 'uppercase', color: 'var(--ink)' }}>{c.label}</h4>
      </div>
    );
  }

  // Composite values : pne (présence + nombre + état), pn (présence + nombre)
  // Stockés en objet : { presence: 'yes'|'no', nb: N, etat: 0..1 }
  // Le getVal/isFilled les voit comme remplis dès qu'au moins un sous-champ est posé
  const value = getVal(raw);
  const note = getNote(raw);
  const photos = getPhotos(raw);
  const filled = isFilled(c, raw);
  const isNA = raw && typeof raw === 'object' && raw.na === true;
  // Repli auto DÉSACTIVÉ (demande Tony 26/05) : toutes les questions restent
  // ouvertes en permanence, plus aucune ne se replie automatiquement.
  const collapsed = false;
  // Note libre toujours ouverte (sauf si en mode collapsed)
  const [uploading, setUploading] = useState(false);
  const cameraInputRef = useRef(null);
  const galleryInputRef = useRef(null);

  // Animation de remplissage (visuelle) : balayage vert + pop du ✓ au moment
  // EXACT où la question passe de vide à remplie (pas au chargement).
  const [justFilled, setJustFilled] = useState(false);
  const wasFilledRef = useRef(isFilled(c, raw) && !(raw && typeof raw === 'object' && raw.na === true));
  useEffect(() => {
    const nowFilled = isFilled(c, raw) && !(raw && typeof raw === 'object' && raw.na === true);
    if (nowFilled && !wasFilledRef.current) {
      setJustFilled(true);
      const t = setTimeout(() => setJustFilled(false), 850);
      wasFilledRef.current = true;
      return () => clearTimeout(t);
    }
    wasFilledRef.current = nowFilled;
  }, [raw]);

  const handleFileChange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    e.target.value = '';
    setUploading(true);
    let next = [...photos];
    for (const file of files) {
      try {
        // Aperçu LOCAL immédiat (compression rapide, pas d'attente réseau).
        // L'upload Storage se fait ensuite en arrière-plan (retryPendingPhotos).
        const photo = await uploadPhoto(gareName, c.id, file, { localOnly: true });
        next = [...next, photo];
        onSetPhotos(next);
        const fmtSize = (b) => b > 1024*1024 ? `${(b/1024/1024).toFixed(1)} MB` : `${Math.round(b/1024)} KB`;
        const msg = `Photo ajoutée · ${fmtSize(photo.originalSize)} → ${fmtSize(photo.size)} ✓`;
        if (onToast) onToast(msg, 'success');
      } catch (err) {
        console.warn('Upload error:', err);
        if (onToast) onToast('⚠ Échec ajout photo', 'error');
      }
    }
    setUploading(false);
  };

  const removePhotoAt = async (idx) => {
    if (!confirm('Supprimer cette photo ?')) return;
    const photo = photos[idx];
    await deletePhoto(photo);
    const next = photos.filter((_, i) => i !== idx);
    onSetPhotos(next);
    if (onToast) onToast('Photo supprimée');
  };

  // Helpers composite (pn, pne)
  const compVal = (typeof value === 'object' && value !== null && !Array.isArray(value)) ? value : {};
  const setComp = (patch) => onSetVal({ ...compVal, ...patch });

  const photoCount = photos.length;

  // Helper : résumer la valeur en une ligne pour le mode compact
  const summarize = () => {
    if (isNA) return '⊘ Non applicable';
    if (Array.isArray(value)) return value.length ? value.join(', ') : '-';
    if (value && typeof value === 'object') {
      const parts = [];
      if (value.presence === 'yes') parts.push('Présent');
      if (value.presence === 'no') parts.push('Absent');
      if (value.nb != null && value.nb !== '' && value.nb !== 0) parts.push(`${value.nb}`);
      if (value.etat != null) {
        const labelsEtat = ['N/A', 'Mauvais', 'Moyen', 'Bon'];
        parts.push(labelsEtat[Math.round(value.etat * 3)] || '');
      }
      return parts.filter(Boolean).join(' · ') || '-';
    }
    if (c.type === 'rating' && c.labels && typeof value === 'number') { const idx = Math.round(value * (c.labels.length - 1)); return c.labels[idx] || `Note ${value}`; }
    if (c.type === 'presence') return value === 'Présent' ? 'Présent' : value === 'Absent' ? 'Absent' : String(value);
    if (typeof value === 'boolean') return value ? 'Oui' : 'Non';
    return value != null ? String(value) : '-';
  };

  // RENDU COMPACT - pour les questions répondues non actives ou N/A
  if ((collapsed || isNA) && !locked) {
    return (
      <div onClick={onActivate} style={{
        borderLeft: `3px solid ${isNA ? 'var(--taupe-light)' : 'var(--green-soft)'}`,
        paddingLeft: 12, paddingTop: 7, paddingBottom: 7,
        cursor: 'pointer', position: 'relative',
        background: isNA ? 'var(--paper-deep)' : 'transparent',
        opacity: isNA ? 0.75 : 1,
        transition: 'background 0.15s'
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.25,
              color: isNA ? 'var(--taupe)' : 'var(--ink)',
              textDecoration: isNA ? 'line-through' : 'none' }}>{c.label}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2,
              display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
              <span style={{ fontWeight: 600 }}>{summarize()}</span>
              {note && <span style={{ fontSize: 10.5, color: 'var(--taupe)',
                background: 'var(--paper-deep)', padding: '1px 6px', borderRadius: 99 }}>
                📝 {note.length > 20 ? note.slice(0,20)+'…' : note}
              </span>}
              {photoCount > 0 && <span style={{ fontSize: 10.5, color: 'var(--taupe)',
                background: 'var(--paper-deep)', padding: '1px 6px', borderRadius: 99 }}>
                📷 {photoCount}
              </span>}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 }}>
            {isNA && <button onClick={(e) => { e.stopPropagation(); onClear(); }} title="Retirer N/A" style={{
              fontSize: 10, color: 'var(--taupe)', padding: '3px 8px',
              border: '1px solid var(--border)', borderRadius: 2
            }}>↺</button>}
            <span style={{ fontSize: 11, color: 'var(--taupe)', padding: '2px 4px' }}>✎</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div onClick={onActivate} className={justFilled ? 'gareo-fill' : ''} style={{
      borderLeft: `3px solid ${filled ? 'var(--green-soft)' : 'var(--border)'}`,
      paddingLeft: 12, paddingTop: 6, paddingBottom: 6,
      transition: 'border-color 0.25s ease, background-color 0.3s ease',
      opacity: locked ? 0.55 : 1,
      pointerEvents: locked ? 'none' : 'auto',
      position: 'relative'
    }}>
      {justFilled &&
      <span aria-hidden className="gareo-fillbar" style={{
        position: 'absolute', left: -3, top: 0, width: 3, height: '100%',
        background: 'var(--green)', transformOrigin: 'top'
      }} />
      }
      {/* HEADER : label + tag + clear */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.3 }}>{c.label}</div>
          {c.help && <div style={{ fontSize: 11.5, color: 'var(--taupe)', fontStyle: 'italic', marginTop: 2 }}>{c.help}</div>}
        </div>
        <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexShrink: 0 }}>
          {filled && !isNA &&
          <span className="gareo-check" style={{
            width: 18, height: 18, borderRadius: '50%', flexShrink: 0,
            background: 'var(--green)', color: 'var(--paper-light)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 11, fontWeight: 800, lineHeight: 1
          }}>✓</span>
          }
          {c.tag &&
          <span style={{
            fontSize: 8.5, fontWeight: 700, padding: '2px 5px', borderRadius: 1,
            letterSpacing: '0.08em', textTransform: 'uppercase',
            background: c.tag === 'amont' ? 'var(--paper-shade)' : 'var(--bureau-bg)',
            color: c.tag === 'amont' ? 'var(--ink-soft)' : 'var(--bureau)',
            border: `1px solid ${c.tag === 'amont' ? 'var(--taupe-light)' : 'var(--bureau)'}`
          }}>{c.tag}</span>
          }
        </div>
      </div>

      {/* PHOTO-FIRST : gros bouton photo en haut, à droite des inputs */}
      {!locked && c.type !== 'subhead' &&
      <div style={{
        marginBottom: 10,
        display: 'flex', gap: 8, alignItems: 'stretch'
      }}>
        <input type="file" accept="image/*" capture="environment" multiple ref={cameraInputRef}
          onChange={handleFileChange} style={{ display: 'none' }} />
        <input type="file" accept="image/*" multiple ref={galleryInputRef}
          onChange={handleFileChange} style={{ display: 'none' }} />
        <button onClick={() => cameraInputRef.current?.click()} disabled={uploading} style={{
          flex: 1, padding: '10px 12px',
          background: photoCount > 0 ? 'var(--ink)' : 'var(--paper)',
          color: photoCount > 0 ? 'var(--paper-light)' : 'var(--ink)',
          border: photoCount > 0 ? '1.5px solid var(--ink)' : '1.5px dashed var(--taupe-light)',
          borderRadius: 4,
          fontSize: 12, fontWeight: 600,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          opacity: uploading ? 0.6 : 1, transition: 'all .15s'
        }}>
          <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="3" width="12" height="9" rx="1" stroke="currentColor" strokeWidth="1.4" />
            <circle cx="7" cy="7.5" r="2.4" stroke="currentColor" strokeWidth="1.4" fill="none" />
            <rect x="5" y="2" width="4" height="2" rx="0.5" stroke="currentColor" strokeWidth="1.4" />
          </svg>
          {uploading ? 'Envoi…' : (photoCount > 0 ? `${photoCount} photo${photoCount>1?'s':''}` : 'Prendre une photo')}
        </button>
        <button onClick={() => galleryInputRef.current?.click()} disabled={uploading}
          title="Ajouter depuis la galerie"
          style={{
            padding: '10px 12px', minWidth: 44,
            border: '1.5px dashed var(--taupe-light)', borderRadius: 4,
            background: 'var(--paper-light)', color: 'var(--taupe)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            opacity: uploading ? 0.6 : 1
          }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="1" stroke="currentColor" strokeWidth="1.2" />
            <path d="M2 9 L5 6 L8 8 L11 5 L12 6.5" stroke="currentColor" strokeWidth="1.2" fill="none" />
          </svg>
        </button>
      </div>
      }

      {/* PHOTOS PREVIEW (juste sous le bouton si présentes) */}
      {photoCount > 0 &&
      <div style={{
        marginBottom: 10, display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(72px, 1fr))', gap: 6
      }}>
        {photos.map((p, i) => {
          const foreign = isForeignPending(p);
          // URL blob: d'un autre appareil → inexploitable ici : placeholder au lieu d'image cassée
          const showImg = !!p.url && !(foreign && p.url.startsWith('blob:'));
          return (
          <div key={i} style={{
            position: 'relative', aspectRatio: '1', borderRadius: 2, overflow: 'hidden',
            border: `1px solid ${p.pending ? 'var(--amber)' : 'var(--border)'}`,
            background: 'var(--paper)', cursor: 'pointer'
          }} onClick={() => { if (showImg) openLightbox(p.url); }}>
            {showImg
              ? <img src={p.url} alt="" loading="lazy"
                  style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block',
                    opacity: p.pending ? 0.7 : 1 }} />
              : <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center',
                  justifyContent: 'center', fontSize: 20, color: 'var(--muted)' }}>📷</div>}
            {p.pending && <span style={{
              position: 'absolute', bottom: 2, left: 2,
              background: 'var(--amber)', color: 'white',
              fontSize: 8.5, fontWeight: 700, padding: '1px 4px', borderRadius: 1,
              letterSpacing: '0.04em'
            }}>{foreign ? '⏳ ENVOI COLLÈGUE' : '⏳ EN ATTENTE'}</span>}
            {!locked && <button onClick={(e) => { e.stopPropagation(); removePhotoAt(i); }} style={{
              position: 'absolute', top: 2, right: 2,
              width: 20, height: 20, borderRadius: '50%',
              background: 'rgba(26,26,26,0.7)', color: 'var(--paper)',
              fontSize: 12, fontWeight: 'bold', lineHeight: 1,
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>×</button>}
          </div>
          );
        })}
      </div>
      }

      {/* INPUTS - selon type */}
      {c.type === 'yesno' && <YesNo value={value} onSet={onSetVal} />}
      {c.type === 'presence' && <Presence value={value} onSet={onSetVal} />}
      {c.type === 'rating' && <RatingFixed c={c} value={value} onSet={onSetVal} />}
      {c.type === 'count' && <CountInput value={value} onSet={onSetVal} />}
      {c.type === 'choice' && <ChoiceSelect c={c} value={value} onSet={onSetVal} />}
      {c.type === 'multi' && <MultiSelect c={c} value={value} onSet={onSetVal} />}
      {c.type === 'number' && <NumberInput value={value} onSet={onSetVal} />}
      {c.type === 'date' &&
        <input type="date" value={value || ''}
          onChange={(e) => onSetVal(e.target.value)}
          onFocus={onActivate}
          style={{
            padding: '10px 12px', fontSize: 14, fontFamily: 'inherit',
            border: '1.5px solid var(--border)', borderRadius: 2,
            background: 'var(--white)', minWidth: 180, outline: 'none'
          }} />
      }
      {c.type === 'pn' &&
        <CompositePN value={compVal} onSet={setComp} />
      }
      {c.type === 'pne' &&
        <CompositePNE value={compVal} onSet={setComp} />
      }

      {/* NOTE - toujours ouverte (sauf si locked / N/A actif) */}
      {!locked && !isNA &&
      <div style={{ marginTop: c.type === 'text' ? 0 : 8 }}>
        <textarea placeholder={c.type === 'text' ? "Saisir le texte…" : c.type === 'note_photo' ? "Écrivez ici votre observation (et ajoutez une photo ci-dessus)…" : "Note libre (précision, contexte, observation…)"}
          rows={c.type === 'text' ? 3 : c.type === 'note_photo' ? 4 : 2}
          value={note}
          onChange={(e) => onSetNote(e.target.value)}
          onFocus={onActivate}
          style={{
            width: '100%', padding: '8px 10px', fontSize: 12.5, fontFamily: 'inherit',
            border: c.type === 'note_photo' ? '1.5px solid var(--red)' : '1px solid var(--border)', borderRadius: 2,
            background: c.type === 'note_photo' ? 'var(--white)' : 'var(--paper-light)',
            resize: 'vertical', outline: 'none', minHeight: c.type === 'text' ? 72 : c.type === 'note_photo' ? 88 : 40, lineHeight: 1.4
          }} />
      </div>
      }

      {/* BOUTON N/A - toujours dispo, séparé en bas */}
      {!locked && onSetNA && !isNA &&
      <button onClick={onSetNA} style={{
        marginTop: 10, fontSize: 10.5, color: 'var(--taupe)',
        padding: '4px 10px', border: '1px dashed var(--border)', borderRadius: 99,
        display: 'inline-flex', alignItems: 'center', gap: 5,
        fontWeight: 500
      }}>⊘ Non applicable / Ne sait pas</button>
      }

      {/* SIGNATURE - qui a modifié quoi en dernier */}
      {(getEditor(raw) || getEditedAt(raw)) &&
      <div style={{
        marginTop: 10, paddingTop: 8, borderTop: '1px dashed var(--border)',
        fontSize: 10.5, color: 'var(--taupe)', display: 'flex',
        alignItems: 'center', gap: 6, fontFamily: 'var(--font-display)',
        letterSpacing: '0.02em'
      }}>
        <span style={{ opacity: 0.7 }}>✎</span>
        {getEditor(raw) && <span><strong style={{ color: 'var(--ink-soft)', fontWeight: 600 }}>{getEditor(raw)}</strong></span>}
        {getEditedAt(raw) && <span style={{ opacity: 0.8 }}>· {fmtAgo(getEditedAt(raw))}</span>}
      </div>
      }
    </div>);

}

/* ============================================================
   COMPOSITE INPUTS - multi + pn + pne
   ============================================================ */
function MultiSelect({ c, value, onSet }) {
  const sel = Array.isArray(value) ? value : [];
  const toggle = (ch) => {
    if (sel.includes(ch)) onSet(sel.filter(x => x !== ch));
    else onSet([...sel, ch]);
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {c.choices.map((ch) => {
        const active = sel.includes(ch);
        return (
          <button key={ch} onClick={() => toggle(ch)} style={{
            padding: '11px 14px', textAlign: 'left',
            border: `1.5px solid ${active ? 'var(--ink)' : 'var(--border)'}`,
            background: active ? 'var(--ink)' : 'var(--white)',
            color: active ? 'var(--paper-light)' : 'var(--ink-soft)',
            borderRadius: 4, fontSize: 13, fontWeight: active ? 600 : 500,
            display: 'flex', alignItems: 'center', gap: 11,
            transition: 'all .15s'
          }}>
            <span style={{
              width: 16, height: 16, borderRadius: 3,
              border: `1.5px solid ${active ? 'var(--paper-light)' : 'var(--taupe-light)'}`,
              background: active ? 'var(--paper-light)' : 'transparent',
              flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'var(--ink)', fontSize: 11, fontWeight: 700
            }}>{active && '✓'}</span>
            {ch}
          </button>);
      })}
    </div>);
}

function CompositePN({ value, onSet }) {
  // value: { presence: 'yes'|'no', nb: N }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <Presence value={value.presence} onSet={(v) => onSet({ presence: v, nb: v === 'no' ? 0 : value.nb })} />
      {value.presence === 'yes' &&
        <div>
          <div style={{ fontSize: 11, color: 'var(--taupe)', letterSpacing: '0.06em',
            textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>Combien ?</div>
          <CountInput value={value.nb} onSet={(v) => onSet({ presence: 'yes', nb: v })} />
        </div>
      }
    </div>);
}

function CompositePNE({ value, onSet }) {
  // value: { presence: 'yes'|'no', nb: N, etat: 0..1 (rating sur 4) }
  const etatLabels = ['Mauvais', 'Moyen', 'Bon', 'Très bon'];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <Presence value={value.presence} onSet={(v) => onSet({ presence: v, nb: v === 'no' ? 0 : value.nb, etat: v === 'no' ? undefined : value.etat })} />
      {value.presence === 'yes' &&
        <>
          <div>
            <div style={{ fontSize: 11, color: 'var(--taupe)', letterSpacing: '0.06em',
              textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>Combien ?</div>
            <CountInput value={value.nb} onSet={(v) => onSet({ ...value, presence: 'yes', nb: v })} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: 'var(--taupe)', letterSpacing: '0.06em',
              textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>État général</div>
            <RatingFixed c={{ scale: 4, labels: etatLabels }}
              value={value.etat}
              onSet={(v) => onSet({ ...value, presence: 'yes', etat: v })} />
          </div>
        </>
      }
    </div>);
}

/* Lightbox simple - rendu côté DOM en dehors de React */
function openLightbox(url) {
  let el = document.getElementById('lightbox-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'lightbox-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;cursor:pointer;';
    el.onclick = () => el.remove();
    document.body.appendChild(el);
  }
  el.innerHTML = `<img src="${url}" alt="" style="max-width:100%;max-height:100%;object-fit:contain;"/>
    <button style="position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);color:white;font-size:22px;border:none;cursor:pointer;">×</button>`;
}

function YesNo({ value, onSet }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
      {[
      { v: 'no', label: 'Non', icon: '✕', tone: 'red',
        activeStyle: { borderColor: 'var(--red)', background: 'var(--red)', color: 'var(--paper-light)',
          boxShadow:'0 2px 0 var(--red-dark), 0 6px 14px -4px rgba(200,16,46,0.4)' } },
      { v: 'yes', label: 'Oui', icon: '✓', tone: 'green',
        activeStyle: { borderColor: 'var(--green)', background: 'var(--green)', color: 'var(--paper-light)',
          boxShadow:'0 2px 0 #0F4226, 0 6px 14px -4px rgba(29,94,58,0.45)' } }].
      map((b) => {
        const active = value === b.v;
        return (
          <button key={b.v} onClick={() => onSet(b.v)} style={{
            padding: '14px 8px', border: '1.5px solid var(--border)',
            background: 'var(--white)', borderRadius: 4,
            fontSize: 14, fontWeight: 600, color: 'var(--ink-soft)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            transition: 'transform .12s ease, background .15s, color .15s, border-color .15s, box-shadow .15s',
            minHeight: 52, transform: active ? 'translateY(-1px)' : 'translateY(0)',
            ...(active ? b.activeStyle : {})
          }}>
            <span style={{
              width: 22, height: 22, borderRadius:'50%',
              background: active ? 'rgba(255,255,255,0.22)' : 'var(--paper)',
              color: active ? 'var(--paper-light)' : (b.tone==='red' ? 'var(--red)' : 'var(--green)'),
              display:'inline-flex', alignItems:'center', justifyContent:'center',
              fontSize: 13, fontWeight:700
            }}>{b.icon}</span>
            {b.label}
          </button>);

      })}
    </div>);

}

/* Presence - version "recensement" : Absent vs Présent.
   Stocké comme 'no' (absent) / 'yes' (présent) pour rester compat CSV. */
function Presence({ value, onSet }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
      {[
      { v: 'no', label: 'Absent', icon: '∅', tone: 'red',
        activeStyle: { borderColor: 'var(--ink-soft)', background: 'var(--ink-soft)', color: 'var(--paper-light)',
          boxShadow:'0 2px 0 var(--ink), 0 6px 14px -4px rgba(26,26,26,0.4)' } },
      { v: 'yes', label: 'Présent', icon: '●', tone: 'green',
        activeStyle: { borderColor: 'var(--green)', background: 'var(--green)', color: 'var(--paper-light)',
          boxShadow:'0 2px 0 #0F4226, 0 6px 14px -4px rgba(29,94,58,0.45)' } }].
      map((b) => {
        const active = value === b.v;
        return (
          <button key={b.v} onClick={() => onSet(b.v)} style={{
            padding: '14px 8px', border: '1.5px solid var(--border)',
            background: 'var(--white)', borderRadius: 4,
            fontSize: 14, fontWeight: 600, color: 'var(--ink-soft)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            transition: 'transform .12s ease, background .15s, color .15s, border-color .15s, box-shadow .15s',
            minHeight: 52, transform: active ? 'translateY(-1px)' : 'translateY(0)',
            ...(active ? b.activeStyle : {})
          }}>
            <span style={{
              width: 22, height: 22, borderRadius:'50%',
              background: active ? 'rgba(255,255,255,0.22)' : 'var(--paper)',
              color: active ? 'var(--paper-light)' : (b.v === 'no' ? 'var(--taupe)' : 'var(--green)'),
              display:'inline-flex', alignItems:'center', justifyContent:'center',
              fontSize: 13, fontWeight:700
            }}>{b.icon}</span>
            {b.label}
          </button>);

      })}
    </div>);

}

function RatingFixed({ c, value, onSet }) {
  const n = c.scale;
  let vals;
  if (n === 2) vals = [0, 1];else
  if (n === 3) vals = [0, 0.5, 1];else
  if (n === 4) vals = [0, 0.33, 0.66, 1];else
  vals = [0, 0.5, 1];

  const colorFor = (v) => {
    if (v === 0) return { solid: 'var(--red)', shadow: 'var(--red-dark)', dot: 'var(--red)' };
    if (v < 0.55) return { solid: 'var(--amber)', shadow: '#8E5500', dot: 'var(--amber)' };
    if (v < 0.85) return { solid: 'var(--green-soft)', shadow: 'var(--green)', dot: 'var(--green-soft)' };
    return { solid: 'var(--green)', shadow: '#0F4226', dot: 'var(--green)' };
  };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${n}, 1fr)`, gap: 6 }}>
      {vals.map((v, i) => {
        const active = value === v;
        const col = colorFor(v);
        return (
          <button key={v} onClick={() => onSet(v)} style={{
            padding: '12px 4px', border: `1.5px solid ${active ? col.solid : 'var(--border)'}`,
            background: active ? col.solid : 'var(--white)',
            color: active ? 'var(--paper-light)' : 'var(--ink-soft)',
            borderRadius: 4, fontSize: 11.5, fontWeight: active ? 600 : 500,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
            minHeight: 60, lineHeight: 1.15,
            transition: 'transform .12s ease, background .15s, color .15s, border-color .15s, box-shadow .15s',
            textAlign: 'center',
            transform: active ? 'translateY(-1px)' : 'translateY(0)',
            boxShadow: active ? `0 2px 0 ${col.shadow}, 0 5px 12px -4px ${col.solid}` : 'none'
          }}>
            <span style={{
              width: 10, height: 10, borderRadius: '50%',
              background: active ? 'var(--paper-light)' : col.dot,
              opacity: active ? 1 : 0.45,
              transition: 'all 0.15s',
              boxShadow: active ? '0 0 0 3px rgba(255,255,255,0.18)' : 'none'
            }} />
            <span>{c.labels[i]}</span>
          </button>);

      })}
    </div>);

}

function CountInput({ value, onSet }) {
  const cur = value === undefined || value === null || value === '' ? '' : Number(value);
  const filled = cur !== '' && cur !== 0;
  return (
    <div style={{ display: 'flex', alignItems: 'stretch',
      border: `1.5px solid ${filled ? 'var(--green-soft)' : 'var(--border)'}`,
      borderRadius: 4, background: 'var(--white)', overflow: 'hidden', maxWidth: 220, minHeight: 50,
      boxShadow: filled ? '0 2px 0 rgba(29,94,58,0.12)' : 'none',
      transition: 'border-color .15s, box-shadow .15s' }}>
      <button onClick={() => onSet(Math.max(0, (Number(cur) || 0) - 1))} style={{
        width: 50, fontSize: 22, fontWeight: 600, color: 'var(--ink-soft)',
        background: 'var(--paper-light)', borderRight: '1px solid var(--border)',
        transition:'background .15s'
      }}
        onMouseDown={(e)=>{ e.currentTarget.style.background='var(--paper-deep)'; }}
        onMouseUp={(e)=>{ e.currentTarget.style.background='var(--paper-light)'; }}
        onMouseLeave={(e)=>{ e.currentTarget.style.background='var(--paper-light)'; }}>−</button>
      <input type="number" min="0" inputMode="numeric"
      value={cur === '' ? '' : cur}
      placeholder="0"
      onChange={(e) => onSet(e.target.value === '' ? '' : Number(e.target.value))}
      className="tabular"
      style={{
        flex: 1, minWidth: 0, border: 'none', textAlign: 'center',
        fontSize: 20, fontWeight: 700, padding: '4px',
        background: cur === 0 ? 'var(--paper-light)' : 'var(--white)',
        color: cur === 0 ? 'var(--taupe)' : (filled ? 'var(--green)' : 'var(--ink)'),
        outline: 'none', appearance: 'textfield', WebkitAppearance: 'none'
      }} />
      <button onClick={() => onSet((Number(cur) || 0) + 1)} style={{
        width: 50, fontSize: 22, fontWeight: 600, color: 'var(--ink-soft)',
        background: 'var(--paper-light)', borderLeft: '1px solid var(--border)',
        transition:'background .15s'
      }}
        onMouseDown={(e)=>{ e.currentTarget.style.background='var(--paper-deep)'; }}
        onMouseUp={(e)=>{ e.currentTarget.style.background='var(--paper-light)'; }}
        onMouseLeave={(e)=>{ e.currentTarget.style.background='var(--paper-light)'; }}>+</button>
    </div>);

}

function NumberInput({ value, onSet }) {
  return (
    <input type="number" inputMode="numeric"
    value={value === undefined || value === null ? '' : value}
    onChange={(e) => onSet(e.target.value === '' ? '' : Number(e.target.value))}
    placeholder="-" className="tabular"
    style={{
      width: '100%', maxWidth: 200, padding: '12px 14px',
      border: '1.5px solid var(--border)', borderRadius: 2, fontSize: 15,
      background: 'var(--white)', outline: 'none', appearance: 'textfield', WebkitAppearance: 'none'
    }} />);

}

function ChoiceSelect({ c, value, onSet }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {c.choices.map((ch) => {
        const active = value === ch;
        return (
          <button key={ch} onClick={() => onSet(ch)} style={{
            padding: '12px 14px', textAlign: 'left',
            border: `1.5px solid ${active ? 'var(--red)' : 'var(--border)'}`,
            background: active ? 'var(--red-tint)' : 'var(--white)',
            color: active ? 'var(--red-dark)' : 'var(--ink-soft)',
            borderRadius: 4, fontSize: 13, fontWeight: active ? 600 : 500,
            display: 'flex', alignItems: 'center', gap: 11,
            transition: 'transform .12s, background .15s, border-color .15s',
            transform: active ? 'translateX(2px)' : 'translateX(0)',
            boxShadow: active ? '0 2px 0 rgba(200,16,46,0.15)' : 'none'
          }}>
            <span style={{
              width: 18, height: 18, borderRadius: '50%',
              border: `1.5px solid ${active ? 'var(--red)' : 'var(--taupe-light)'}`,
              background: active ? 'var(--red)' : 'transparent',
              flexShrink: 0, position: 'relative',
              transition: 'all 0.15s'
            }}>
              {active && <span style={{
                position: 'absolute', inset: 4, borderRadius: '50%', background: 'var(--paper-light)'
              }} />}
            </span>
            {ch}
          </button>);

      })}
    </div>);

}

/* ============================================================
   OVERVIEW SCREEN - "L'Œil"
   ============================================================ */
function OverviewScreen({ gare, visite, onBack, onZone, onExport, onPrintPDF, onDelete }) {
  const sections = SECTIONS.filter((s) => !s.skipIf || !s.skipIf(gare, visite.data));
  const stats = visiteStats(gare, visite.data);
  const missing = sections.flatMap((s) => {
    const items = fillableCriteria(s);
    return items.filter((c) => !isFilled(c, visite.data?.[c.id])).map((c) => ({ s, c }));
  });

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '12px 18px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 13 }}>← Retour saisie</button>
        <div className="kicker" style={{ fontSize: 10 }}>Vue d'ensemble</div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 20px 40px' }}>
        <Kicker color="var(--ink)">Carnet · {gare.nom}</Kicker>
        <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 6 }}>
          {stats.pct === 100 ? 'Visite complète.' : `Visite en cours · ${stats.pct}%`}
        </h2>
        <div style={{ height: 3, width: 30, background: 'var(--red)', marginBottom: 18 }} />

        {/* Section breakdown */}
        <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>Décomposition par zone</div>
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)' }}>
          {sections.map((s, i) => {
            const st = sectionStats(s, visite.data);
            const done = st.filled === st.total && st.total > 0;
            const pct = st.total === 0 ? 0 : Math.round(st.filled / st.total * 100);
            return (
              <button key={s.id} onClick={() => onZone(s.id)} style={{
                width: '100%', padding: '12px 14px', textAlign: 'left',
                borderBottom: i === sections.length - 1 ? 'none' : '1px solid var(--border-soft)',
                display: 'flex', alignItems: 'center', gap: 12
              }}>
                <span className="tabular" style={{
                  width: 24, height: 24, borderRadius: '50%',
                  background: done ? 'var(--green)' : st.filled > 0 ? 'var(--red)' : 'var(--paper-deep)',
                  color: st.filled > 0 ? 'var(--paper-light)' : 'var(--taupe)',
                  fontSize: 10.5, fontWeight: 700,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0
                }}>{done ? '✓' : s.n}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 500 }}>{s.title}</div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginTop: 5 }}>
                    <div style={{ flex: 1, height: 3, background: 'var(--paper-deep)', borderRadius: 1, overflow: 'hidden', maxWidth: 120 }}>
                      <div style={{ height: '100%', width: `${pct}%`, background: done ? 'var(--green)' : 'var(--red)' }} />
                    </div>
                    <span className="tabular" style={{ fontSize: 10.5, color: 'var(--taupe)', fontWeight: 600 }}>
                      {st.filled}/{st.total}
                    </span>
                  </div>
                </div>
              </button>);

          })}
        </div>

        {/* Missing items */}
        {missing.length > 0 &&
        <>
            <div className="kicker" style={{ color: 'var(--red)', fontSize: 10, marginTop: 22, marginBottom: 10,
            display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 18, height: 1.5, background: 'var(--red)' }} />
              Encore à relever · {missing.length}
            </div>
            <div style={{ background: 'var(--white)', border: '1px solid var(--border)',
            padding: '10px 14px', maxHeight: 180, overflowY: 'auto' }}>
              {missing.slice(0, 12).map(({ s, c }, i) =>
            <button key={c.id} onClick={() => onZone(s.id)} style={{
              display: 'block', width: '100%', textAlign: 'left',
              padding: '7px 0', borderBottom: i === Math.min(missing.length, 12) - 1 ? 'none' : '1px dotted var(--border-soft)',
              fontSize: 12.5
            }}>
                  <span style={{ color: 'var(--taupe)', fontSize: 9.5, letterSpacing: '0.06em',
                textTransform: 'uppercase', marginRight: 8 }}>{s.short}</span>
                  {c.label}
                </button>
            )}
              {missing.length > 12 &&
            <div style={{ fontSize: 11, color: 'var(--taupe)', fontStyle: 'italic', textAlign: 'center', padding: '8px 0 0' }}>
                  + {missing.length - 12} autres…
                </div>
            }
            </div>
          </>
        }

        {stats.pct === 100 &&
        <div style={{ marginTop: 22, background: 'var(--white)', border: '2px solid var(--green)',
          padding: '18px 16px', textAlign: 'center' }}>
            <Stamp color="var(--green)">Visite validée</Stamp>
            <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginTop: 10, lineHeight: 1.5 }}>
              Tous les critères sont relevés. Tu peux exporter le carnet vers la base SERM.
            </div>
          </div>
        }

        <button onClick={onExport} style={{
          marginTop: 22, width: '100%', padding: '15px', background: 'var(--red)', color: 'var(--paper-light)',
          fontWeight: 600, fontSize: 14, letterSpacing: '0.04em', textTransform: 'uppercase',
          borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
        }}>
          ⇣ Exporter ce carnet (CSV)
        </button>

        {onPrintPDF &&
        <button onClick={onPrintPDF} style={{
          marginTop: 10, width: '100%', padding: '13px', background: 'var(--ink)', color: 'var(--paper-light)',
          fontWeight: 600, fontSize: 13, letterSpacing: '0.03em',
          borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
        }}>
          📄 Télécharger la fiche PDF (A4)
        </button>
        }

        {/* DANGER ZONE - bien séparé, en bas */}
        {onDelete &&
        <div style={{ marginTop: 40, paddingTop: 20, borderTop: '1px dashed var(--red-soft)' }}>
          <div className="kicker" style={{ color: 'var(--red)', fontSize: 10, marginBottom: 8 }}>
            Zone dangereuse
          </div>
          <button onClick={onDelete} style={{
            width: '100%', padding: '11px', background: 'var(--white)', color: 'var(--red)',
            border: '1px solid var(--red-soft)', borderRadius: 2,
            fontSize: 12.5, fontWeight: 600,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6
          }}>
            🗑 Supprimer définitivement cette visite
          </button>
          <p style={{ fontSize: 10.5, color: 'var(--taupe)', textAlign: 'center', marginTop: 6 }}>
            Demande une confirmation (taper le nom de la gare)
          </p>
        </div>
        }
      </div>
    </div>);

}

/* ============================================================
   EXPORT SCREEN - choix scope (toutes / cette gare / sélection) × format (CSV / Excel / JSON)
   ============================================================ */
function ExportScreen({ all, onBack, onExport, onExportPhotos, onExportPDFsZip, onExportSynth, onExportSynthPDF, onPrintPDF, onDeleteVisite, syncing }) {
  const visitesAll = Object.values(all).sort((a, b) => b.updated - a.updated);
  const [scope, setScope] = useState('all'); // 'all' | 'select' | 'completed' | 'in_progress'
  const [format, setFormat] = useState('xlsx'); // 'xlsx' | 'csv' | 'json'
  const [selected, setSelected] = useState(() => new Set());

  const toggleSelect = (gareName) => {
    setSelected((s) => {
      const next = new Set(s);
      if (next.has(gareName)) next.delete(gareName); else next.add(gareName);
      return next;
    });
  };

  const visitesToExport = useMemo(() => {
    if (scope === 'all') return visitesAll;
    if (scope === 'select') return visitesAll.filter((v) => selected.has(v.gare));
    if (scope === 'completed') return visitesAll.filter((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      return g && visiteStats(g, v.data).pct === 100;
    });
    if (scope === 'in_progress') return visitesAll.filter((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      return g && visiteStats(g, v.data).pct > 0 && visiteStats(g, v.data).pct < 100;
    });
    return visitesAll;
  }, [scope, selected, visitesAll]);

  const handleExport = () => {
    const baseName = scope === 'select' && selected.size === 1
      ? `releve_${[...selected][0]}`
      : scope === 'completed' ? 'releve_SERM_HDF_validees'
      : scope === 'in_progress' ? 'releve_SERM_HDF_en_cours'
      : 'releve_SERM_HDF_toutes';
    onExport(visitesToExport, format, baseName);
  };

  const formats = [
    { v: 'xlsx', label: 'Excel', sub: '.xlsx - recommandé', icon: '📊' },
    { v: 'csv',  label: 'CSV',   sub: '.csv - séparateur ;', icon: '📄' },
    { v: 'json', label: 'JSON',  sub: '.json - backup / réimport', icon: '⌥' }
  ];
  const scopes = [
    { v: 'all',         label: `Toutes les visites`, count: visitesAll.length },
    { v: 'completed',   label: `Validées (100%)`, count: visitesAll.filter((v) => { const g = GARES.find((x) => x.nom === v.gare); return g && visiteStats(g, v.data).pct === 100; }).length },
    { v: 'in_progress', label: `En cours`, count: visitesAll.filter((v) => { const g = GARES.find((x) => x.nom === v.gare); return g && visiteStats(g, v.data).pct > 0 && visiteStats(g, v.data).pct < 100; }).length },
    { v: 'select',      label: `Sélection manuelle`, count: selected.size }
  ];

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '14px 20px',
        display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 14 }}>← Carnet</button>
        <div className="kicker" style={{ fontSize: 10.5, letterSpacing: '0.18em' }}>Exporter</div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '22px 20px 40px' }}>
        <Kicker color="var(--ink)">Carnet · Export</Kicker>
        <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.025em', marginBottom: 6 }}>
          {visitesAll.length === 0 ? 'Aucune visite à exporter' : `${visitesAll.length} visite${visitesAll.length > 1 ? 's' : ''} disponibles`}
        </h2>
        <div style={{ height: 3, width: 30, background: 'var(--red)', marginBottom: 22 }} />

        {/* Scope */}
        <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>1 - Que veux-tu exporter ?</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 22 }}>
          {scopes.map((s) => (
            <button key={s.v} onClick={() => setScope(s.v)} disabled={s.count === 0 && s.v !== 'select'} style={{
              padding: '13px 14px', textAlign: 'left',
              border: `1.5px solid ${scope === s.v ? 'var(--ink)' : 'var(--border)'}`,
              background: scope === s.v ? 'var(--ink)' : 'var(--white)',
              color: scope === s.v ? 'var(--paper-light)' : 'var(--ink)',
              borderRadius: 2, fontSize: 13.5,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
              opacity: (s.count === 0 && s.v !== 'select') ? 0.4 : 1
            }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{
                  width: 16, height: 16, borderRadius: '50%',
                  border: `1.5px solid ${scope === s.v ? 'var(--paper-light)' : 'var(--border)'}`,
                  background: scope === s.v ? 'var(--paper-light)' : 'transparent',
                  position: 'relative', flexShrink: 0
                }}>
                  {scope === s.v && <span style={{ position: 'absolute', inset: 3, borderRadius: '50%', background: 'var(--ink)' }} />}
                </span>
                {s.label}
              </span>
              <span className="tabular" style={{
                fontSize: 11, fontWeight: 600,
                color: scope === s.v ? 'var(--paper-light)' : 'var(--taupe)'
              }}>{s.count}</span>
            </button>
          ))}
        </div>

        {/* If select scope, show list to pick */}
        {scope === 'select' && visitesAll.length > 0 && (
          <div style={{ marginBottom: 22 }}>
            <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 8 }}>
              Sélectionne les gares · {selected.size} choisie{selected.size > 1 ? 's' : ''}
            </div>
            <div style={{ background: 'var(--white)', border: '1px solid var(--border)', maxHeight: 280, overflowY: 'auto' }}>
              {visitesAll.map((v, i) => {
                const isSel = selected.has(v.gare);
                const g = GARES.find((x) => x.nom === v.gare);
                const stats = g ? visiteStats(g, v.data) : { pct: 0 };
                return (
                  <button key={v.gare} onClick={() => toggleSelect(v.gare)} style={{
                    width: '100%', padding: '10px 14px', textAlign: 'left',
                    borderBottom: i === visitesAll.length - 1 ? 'none' : '1px solid var(--border-soft)',
                    display: 'flex', alignItems: 'center', gap: 10, background: isSel ? 'var(--paper)' : 'var(--white)'
                  }}>
                    <span style={{
                      width: 16, height: 16, borderRadius: 3,
                      border: `1.5px solid ${isSel ? 'var(--red)' : 'var(--border)'}`,
                      background: isSel ? 'var(--red)' : 'transparent',
                      flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: 'var(--paper-light)', fontSize: 11, fontWeight: 700
                    }}>{isSel && '✓'}</span>
                    <span style={{ flex: 1, fontSize: 13 }}>{v.gare}</span>
                    <span className="tabular" style={{ fontSize: 11, color: 'var(--taupe)' }}>{stats.pct}%</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Format */}
        <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>2 - Format</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 26 }}>
          {formats.map((f) => (
            <button key={f.v} onClick={() => setFormat(f.v)} style={{
              padding: '13px 14px', textAlign: 'left',
              border: `1.5px solid ${format === f.v ? 'var(--ink)' : 'var(--border)'}`,
              background: format === f.v ? 'var(--ink)' : 'var(--white)',
              color: format === f.v ? 'var(--paper-light)' : 'var(--ink)',
              borderRadius: 2,
              display: 'flex', alignItems: 'center', gap: 12
            }}>
              <span style={{
                width: 16, height: 16, borderRadius: '50%',
                border: `1.5px solid ${format === f.v ? 'var(--paper-light)' : 'var(--border)'}`,
                background: format === f.v ? 'var(--paper-light)' : 'transparent',
                position: 'relative', flexShrink: 0
              }}>
                {format === f.v && <span style={{ position: 'absolute', inset: 3, borderRadius: '50%', background: 'var(--ink)' }} />}
              </span>
              <span style={{ fontSize: 17 }}>{f.icon}</span>
              <span style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{f.label}</div>
                <div style={{ fontSize: 11, opacity: 0.7, marginTop: 2 }}>{f.sub}</div>
              </span>
            </button>
          ))}
        </div>

        {/* Photos info */}
        <div style={{
          background: 'var(--paper-deep)', border: '1px solid var(--border)',
          padding: '10px 12px', fontSize: 11.5, color: 'var(--ink-soft)', marginBottom: 22,
          lineHeight: 1.5
        }}>
          ℹ Dans le tableau exporté, les photos sont sous forme de liens (URL Supabase) dans une colonne dédiée.
          Pour récupérer toutes les images organisées par gare / section / question, utilise le <strong>ZIP photothèque</strong> ci-dessous.
        </div>

        <button onClick={handleExport} disabled={visitesToExport.length === 0} style={{
          width: '100%', padding: '15px', background: 'var(--red)', color: 'var(--paper-light)',
          fontWeight: 600, fontSize: 14, letterSpacing: '0.04em', textTransform: 'uppercase',
          borderRadius: 2, opacity: visitesToExport.length === 0 ? 0.4 : 1,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
        }}>
          ⇣ Exporter {visitesToExport.length} visite{visitesToExport.length > 1 ? 's' : ''}
        </button>

        {/* ========================================================
            PHOTOTHEQUE ZIP - séparé, après le tableau
            ======================================================== */}
        {(() => {
          // Compter les photos sur le scope sélectionné
          let nPhotos = 0;
          visitesToExport.forEach(v => {
            if (!v.data) return;
            SECTIONS.forEach(s => (s.criteria || []).forEach(c => {
              const d = v.data[c.id];
              if (d && typeof d === 'object' && !Array.isArray(d) && Array.isArray(d.photos)) {
                nPhotos += d.photos.length;
              }
            }));
          });
          return (
            <div style={{ marginTop: 32, paddingTop: 22, borderTop: '1px dashed var(--border)' }}>
              <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>
                Photothèque
              </div>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 6, letterSpacing: '-0.015em' }}>
                ZIP organisé par gare / section / question
              </h3>
              <p style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5, marginBottom: 12 }}>
                Toutes les photos rangées en arborescence claire :<br />
                <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, background: 'var(--paper-deep)',
                  padding: '1px 5px', borderRadius: 2 }}>
                  Lille-Flandres / Quais / Éclairage_01.jpg
                </code>
              </p>
              <button onClick={() => onExportPhotos(visitesToExport)}
                disabled={nPhotos === 0 || syncing}
                style={{
                  width: '100%', padding: '14px', background: 'var(--ink)', color: 'var(--paper-light)',
                  fontWeight: 600, fontSize: 13.5, letterSpacing: '0.03em',
                  borderRadius: 2, opacity: (nPhotos === 0 || syncing) ? 0.4 : 1,
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8
                }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 16 }}>📦</span>
                  <span>{syncing ? 'Préparation…' : 'Télécharger la photothèque'}</span>
                </span>
                <span style={{ fontSize: 11, fontWeight: 500, opacity: 0.75 }}>
                  {nPhotos === 0 ? 'aucune photo' : `${nPhotos} photo${nPhotos > 1 ? 's' : ''}`}
                </span>
              </button>
              <p style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 8, lineHeight: 1.4 }}>
                Téléchargement direct depuis Supabase. Selon le nombre de photos et la connexion,
                la génération peut prendre quelques secondes à plusieurs minutes.
              </p>
            </div>
          );
        })()}

        {/* ========================================================
            FICHE PDF PAR GARE - sélection d'une gare unique
            ======================================================== */}
        {onPrintPDF && (
          <div style={{ marginTop: 32, paddingTop: 22, borderTop: '1px dashed var(--border)' }}>
            <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>
              Fiche PDF
            </div>
            <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 6, letterSpacing: '-0.015em' }}>
              Fiche A4 imprimable par gare
            </h3>
            <p style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5, marginBottom: 12 }}>
              Pour chaque gare : tableau récap par section + photothèque rangée par question.
              Format A4 portrait, prêt à imprimer ou enregistrer en PDF.
            </p>

            {/* Bouton : toutes les fiches A4 sélectionnées dans un seul ZIP */}
            {onExportPDFsZip && visitesToExport.length > 0 && (
              <button onClick={() => onExportPDFsZip(visitesToExport)} disabled={syncing}
                style={{
                  width: '100%', padding: '12px 14px', marginBottom: 14,
                  background: 'var(--red)', color: 'white', borderRadius: 3,
                  fontSize: 13, fontWeight: 700, letterSpacing: '0.01em',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                  opacity: syncing ? 0.6 : 1, cursor: syncing ? 'wait' : 'pointer'
                }}>
                <span>📦 Télécharger {visitesToExport.length} fiche{visitesToExport.length > 1 ? 's' : ''} A4 en ZIP</span>
              </button>
            )}
            <p style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: -6, marginBottom: 14, lineHeight: 1.4 }}>
              Le ZIP respecte la sélection ci-dessus (Toutes / Validées / En cours / Sélection).
              Un PDF par gare. Pour beaucoup de gares, ça peut prendre 1-2 min.
            </p>
            <div style={{ fontSize: 11, color: 'var(--taupe)', fontWeight: 600, marginBottom: 8 }}>
              - ou génère une gare à la fois :
            </div>
            {visitesAll.length === 0 ? (
              <div style={{ fontSize: 12, color: 'var(--taupe)', fontStyle: 'italic',
                padding: '12px', textAlign: 'center', background: 'var(--paper-deep)' }}>
                Aucune gare visitée pour l'instant
              </div>
            ) : (
              <div style={{ border: '1px solid var(--border)', borderRadius: 2,
                maxHeight: 280, overflowY: 'auto' }}>
                {visitesAll.map((v, i) => {
                  const g = GARES.find(x => x.nom === v.gare);
                  const st = g ? visiteStats(g, v.data) : { pct: 0 };
                  return (
                    <div key={v.gare} style={{
                      display: 'flex', alignItems: 'stretch',
                      borderBottom: i === visitesAll.length - 1 ? 'none' : '1px solid var(--border-soft)',
                      background: 'var(--white)'
                    }}>
                      <button onClick={() => onPrintPDF(v.gare)} style={{
                        flex: 1, minWidth: 0, padding: '10px 14px',
                        textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10,
                        background: 'transparent', border: 'none', cursor: 'pointer'
                      }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13.5, fontWeight: 500 }}>{v.gare}</div>
                          <div style={{ fontSize: 10, color: 'var(--taupe)', marginTop: 2 }}>
                            {v.auteur || 'Anonyme'} · {st.pct}% complétée
                          </div>
                        </div>
                        <span style={{ fontSize: 11, color: 'var(--red)', fontWeight: 600, whiteSpace: 'nowrap' }}>📄 Générer →</span>
                      </button>
                      {onDeleteVisite &&
                      <button onClick={() => onDeleteVisite(v.gare)} title={'Supprimer ' + v.gare} style={{
                        flexShrink: 0, width: 44, borderLeft: '1px solid var(--border-soft)',
                        background: 'transparent', color: 'var(--taupe)', fontSize: 15, cursor: 'pointer',
                        display: 'flex', alignItems: 'center', justifyContent: 'center'
                      }}>🗑</button>}
                    </div>
                  );
                })}
              </div>
            )}
            <p style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 8, lineHeight: 1.4 }}>
              Clique sur une gare pour ouvrir l'aperçu, puis utilise <strong>Imprimer / PDF</strong> en haut à droite.
            </p>
          </div>
        )}

        {/* ========================================================
            SYNTHÈSE COMPARATIVE - tableau Excel multi-gares (décideurs)
            ======================================================== */}
        {onExportSynth && (
          <div style={{ marginTop: 32, paddingTop: 22, borderTop: '1px dashed var(--border)' }}>
            <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>
              Synthèse comparative
            </div>
            <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 6, letterSpacing: '-0.015em' }}>
              Tableau comparatif des gares (Excel)
            </h3>
            <p style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5, marginBottom: 12 }}>
              Une ligne par gare relevée : priorité d'intervention, vétusté, ressenti sensible (sécurité, ambiance,
              propreté, confort, lisibilité, intégration), alertes, enjeux clés et points forts. Trié par priorité,
              colonnes filtrables, cases colorées. C'est le document de lecture pour les décideurs.
            </p>
            {visitesAll.length === 0 ? (
              <div style={{ fontSize: 12, color: 'var(--taupe)', fontStyle: 'italic',
                padding: '12px', textAlign: 'center', background: 'var(--paper-deep)' }}>
                Aucune gare visitée pour l'instant
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <button onClick={onExportSynth} disabled={syncing} style={{
                  width: '100%', padding: '13px 14px',
                  background: 'var(--ink)', color: 'white', borderRadius: 3,
                  fontSize: 13, fontWeight: 700, letterSpacing: '0.01em',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                  opacity: syncing ? 0.6 : 1, cursor: syncing ? 'wait' : 'pointer'
                }}>
                  <span>⊞ Synthèse comparative (Excel)</span>
                </button>
                {onExportSynthPDF &&
                <button onClick={onExportSynthPDF} disabled={syncing} style={{
                  width: '100%', padding: '13px 14px',
                  background: 'var(--red)', color: 'white', borderRadius: 3,
                  fontSize: 13, fontWeight: 700, letterSpacing: '0.01em',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                  opacity: syncing ? 0.6 : 1, cursor: syncing ? 'wait' : 'pointer'
                }}>
                  <span>📄 Synthèse comparative (PDF paysage)</span>
                </button>
                }
              </div>
            )}
            <p style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 8, lineHeight: 1.4 }}>
              Inclut toutes les gares relevées. Plus la section Synthèse est remplie, plus le tableau est parlant.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}


const inputStyle = {
  width: '100%', padding: '10px 12px', border: '1px solid var(--border)',
  background: 'var(--white)', fontSize: 14, borderRadius: 4
};
const hintStyle = { fontSize: 11, color: 'var(--taupe)', marginTop: 4 };

/* ============================================================
   APP
   ============================================================ */
function App() {
  // ===== VERROUILLAGE PAR MOT DE PASSE =====
  // Hash SHA-256 du mot de passe actuel. Pour changer le mdp :
  // 1) Choisis ton nouveau mdp
  // 2) Calcule son SHA-256 (ex: en bash → echo -n "tonmdp" | sha256sum)
  // 3) Remplace la valeur de PASSWORD_HASH ci-dessous
  // 4) Tous les utilisateurs devront retaper le nouveau mdp
  //
  // Mot de passe actuel : "serm2026"
  const PASSWORD_HASH = '00747ba10d726dd36a34abd14b331242cfa269471106365a03a176ff98363a86';
  const UNLOCK_KEY = 'serm-hdf:unlocked-v1';

  const [isUnlocked, setIsUnlocked] = useState(() => {
    try { return localStorage.getItem(UNLOCK_KEY) === PASSWORD_HASH; }
    catch (e) { return false; }
  });
  const [pwdInput, setPwdInput] = useState('');
  const [pwdError, setPwdError] = useState(false);
  // Prénom saisi directement sur l'écran de déverrouillage (évite le prompt après login)
  const [nameInput, setNameInput] = useState(() => {
    const a = localStorage.getItem('serm-auteur');
    return a && a !== 'Anonyme' ? a : '';
  });

  const tryUnlock = async () => {
    try {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwdInput));
      const hash = Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(UNLOCK_KEY, hash);
        // Enregistre le prénom saisi sur l'écran de login (s'il y en a un)
        const nm = nameInput.trim();
        if (nm) { setAuteur(nm); localStorage.setItem('serm-auteur', nm); }
        setIsUnlocked(true);
        setPwdError(false);
      } else {
        setPwdError(true);
        setPwdInput('');
      }
    } catch (e) {
      setPwdError(true);
    }
  };
  // (L'écran de verrouillage est rendu plus bas, après TOUS les hooks d'App,
  //  pour respecter les règles des hooks React.)

  // Mode lecture seule activé via ?readonly=1 ou ?ro=1 dans l'URL
  // → désactive toutes les modifications, masque les boutons d'action
  const readOnly = useMemo(() => {
    try {
      const p = new URLSearchParams(window.location.search);
      return p.get('readonly') === '1' || p.get('ro') === '1';
    } catch (e) { return false; }
  }, []);

  // État réseau (online/offline) + queue d'upload photos
  const [isOnline, setIsOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  const [retryingPhotos, setRetryingPhotos] = useState(null); // { done, total } | null
  const [retryTick, setRetryTick] = useState(0); // relance périodique du ré-envoi photos
  const retryingRef = useRef(null); // reflète retryingPhotos pour éviter de relancer pendant un envoi

  useEffect(() => { retryingRef.current = retryingPhotos; }, [retryingPhotos]);

  useEffect(() => {
    const onOnline = () => setIsOnline(true);
    const onOffline = () => setIsOnline(false);
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => {
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  // Ré-essai des photos en attente même si le signal reste "en ligne" mais faible :
  // relance toutes les 25 s, et quand on revient sur l'appli. Le garde retryingRef
  // évite de relancer (et donc d'annuler) pendant qu'un envoi est déjà en cours.
  useEffect(() => {
    const bump = () => { if (!retryingRef.current) setRetryTick((t) => t + 1); };
    const id = setInterval(bump, 25000);
    window.addEventListener('focus', bump);
    return () => { clearInterval(id); window.removeEventListener('focus', bump); };
  }, []);

  const [route, setRoute] = useState({ name: 'home' });
  const [all, setAll] = useState(loadAll());
  const [auteur, setAuteur] = useState(localStorage.getItem('serm-auteur') || 'Anonyme');
  const [toast, setToast] = useState(null);
  const [syncing, setSyncing] = useState(false);

  // ── IndexedDB : reconstruit les blob URLs locales pour les photos pending
  // (les URLs object n'étant pas sérialisables, il faut les recréer après reload)
  // ⚠ BUG FIX 27/05 v2 : utiliser setAll FONCTIONNEL pour ne pas écraser le state
  // avec un snapshot obsolète (sinon Vétusté/Hub/etc disparaissent au mount).
  useEffect(() => {
    let cancelled = false;
    // On passe loadAll() (snapshot frais) à restoreBlobUrls qui mute en place.
    // Puis on merge ciblé : seulement les URLs blob des photos pending sont propagées.
    restoreBlobUrls(loadAll()).then((restored) => {
      if (cancelled || !restored) return;
      setAll((current) => {
        const merged = { ...current };
        let anyChange = false;
        Object.entries(restored).forEach(([gn, restoredVisite]) => {
          const currentVisite = current[gn];
          if (!currentVisite?.data || !restoredVisite?.data) return;
          let visiteChanged = false;
          const newData = { ...currentVisite.data };
          Object.entries(restoredVisite.data).forEach(([critId, restoredVal]) => {
            if (!restoredVal || typeof restoredVal !== 'object' || !Array.isArray(restoredVal.photos)) return;
            const currentVal = currentVisite.data[critId];
            if (!currentVal || typeof currentVal !== 'object' || !Array.isArray(currentVal.photos)) return;
            // Update SEULEMENT les URLs des photos pending matched par blobId
            let photosChanged = false;
            const newPhotos = currentVal.photos.map(p => {
              if (!p?.blobId) return p;
              if (p.url && p.url.startsWith('blob:')) return p;
              const restoredPhoto = restoredVal.photos.find(rp => rp?.blobId === p.blobId);
              if (restoredPhoto?.url && restoredPhoto.url.startsWith('blob:')) {
                photosChanged = true;
                return { ...p, url: restoredPhoto.url };
              }
              return p;
            });
            if (photosChanged) {
              newData[critId] = { ...currentVal, photos: newPhotos };
              visiteChanged = true;
            }
          });
          if (visiteChanged) {
            merged[gn] = { ...currentVisite, data: newData };
            anyChange = true;
          }
        });
        return anyChange ? merged : current;
      });
    });
    return () => { cancelled = true; };
    // eslint-disable-next-line
  }, []); // Au mount seulement
  // Compteur de révision : incrémenté à chaque modification de SECTIONS
  // → force le re-render des composants qui dépendent de la grille
  const [gridRev, setGridRev] = useState(0);
  const bumpGrid = useCallback(() => setGridRev(r => r + 1), []);

  // Compteur de photos en attente d'upload (pending)
  const pendingCount = useMemo(() => {
    let n = 0;
    Object.values(all).forEach(v => {
      if (!v?.data) return;
      Object.values(v.data).forEach(d => {
        if (d?.photos && Array.isArray(d.photos)) {
          d.photos.forEach(p => { if (isMyPending(p)) n++; });
        }
      });
    });
    return n;
  }, [all]);

  // Retry automatique des photos pending au retour online
  // ⚠ BUG FIX (27/05) : utilisation de setAll FONCTIONNEL pour éviter d'écraser
  // le state avec une version obsolète (race condition : pull initial + retry parallèles).
  // Ancien comportement : setAll(newAll) où newAll était basé sur le `all` capturé au
  // début du retry → si un pull/realtime avait setAll entre temps, tout était perdu.
  // Nouveau : merge ciblé par critère, et push direct sans passer par debouncedPush
  // (qui posait un verrou pendingState pour TOUTES les gares = blocage du realtime).
  useEffect(() => {
    if (!isOnline || readOnly || pendingCount === 0 || retryingPhotos) return;
    let cancelled = false;
    setRetryingPhotos({ done: 0, total: pendingCount });
    const allAtStart = all; // snapshot pour comparaison
    retryPendingPhotos(all, (done, total) => {
      if (!cancelled) setRetryingPhotos({ done, total });
    }).then((newAll) => {
      if (cancelled) return;
      if (newAll === allAtStart) {
        setRetryingPhotos(null);
        // Rien n'est monté : si un upload a échoué, on affiche LA cause exacte (une fois).
        if (LAST_PHOTO_ERR && LAST_PHOTO_ERR !== _photoErrToast) {
          _photoErrToast = LAST_PHOTO_ERR;
          showToast('⚠ Upload photo bloqué : ' + LAST_PHOTO_ERR, 'error');
        }
        return;
      }
      // Identifier les critères dont les photos ont effectivement changé
      const changedCriteres = []; // [{ gare, critId, retryVal }]
      Object.entries(newAll).forEach(([gn, retryVisite]) => {
        if (!retryVisite?.data) return;
        Object.entries(retryVisite.data).forEach(([critId, retryVal]) => {
          if (!retryVal || typeof retryVal !== 'object' || !Array.isArray(retryVal.photos)) return;
          const originalVal = allAtStart[gn]?.data?.[critId];
          const originalPhotos = (originalVal && typeof originalVal === 'object' && Array.isArray(originalVal.photos)) ? originalVal.photos : [];
          if (JSON.stringify(originalPhotos) === JSON.stringify(retryVal.photos)) return;
          changedCriteres.push({ gn, critId, retryVal });
        });
      });
      if (changedCriteres.length === 0) { setRetryingPhotos(null); return; }
      // Merge intelligent : on update SEULEMENT les photos des critères qui ont changé,
      // en se basant sur le state ACTUEL (pas sur allAtStart obsolète).
      setAll((current) => {
        const merged = { ...current };
        changedCriteres.forEach(({ gn, critId, retryVal }) => {
          const currentVisite = current[gn];
          if (!currentVisite || !currentVisite.data) return; // gare disparue : on ignore
          const currentVal = currentVisite.data[critId];
          const baseObj = (currentVal && typeof currentVal === 'object' && !Array.isArray(currentVal))
            ? currentVal
            : (currentVal !== undefined ? { val: currentVal } : {});
          const newData = { ...currentVisite.data, [critId]: { ...baseObj, photos: retryVal.photos } };
          merged[gn] = { ...currentVisite, data: newData };
        });
        return merged;
      });
      // Push DIRECT et CIBLÉ : seulement les critères dont les photos ont changé.
      // Pas de debouncedPush global qui poserait des verrous pendingState pour toutes les gares.
      const me = auteur || (typeof localStorage !== 'undefined' ? localStorage.getItem('serm-auteur') : null) || 'Anonyme';
      changedCriteres.forEach(({ gn, critId, retryVal }) => {
        // On push la valeur du critère telle qu'elle est en local APRÈS retry
        // (avec les nouvelles URLs des photos uploadées). Si l'envoi échoue, on
        // met le critère en file d'attente → le ré-essai périodique le rejouera.
        pushCritereToSupa(gn, critId, retryVal, me).catch(() => {
          if (!pendingCriteres.current[gn]) pendingCriteres.current[gn] = new Set();
          pendingCriteres.current[gn].add(critId);
          const base = pendingState.current[gn] || { gare: gn, data: {}, updated: Date.now(), auteur: me };
          pendingState.current[gn] = { ...base, data: { ...(base.data || {}), [critId]: retryVal } };
        });
      });
      showToast(`${changedCriteres.length} photo(s) envoyée(s) ✓`, 'success');
      setRetryingPhotos(null);
    }).catch(() => { if (!cancelled) setRetryingPhotos(null); });
    return () => { cancelled = true; };
    // eslint-disable-next-line
  }, [isOnline, pendingCount, retryTick]);

  // Initial pull from Supabase + local persistence
  useEffect(() => {
    let mounted = true;
    setSyncing(true);
    Promise.all([withTimeout(pullAllFromSupa()), withTimeout(pullGrilleFromSupa())]).then(([fresh, grille]) => {
      if (!mounted) return;
      if (fresh) {
        // Fusion par critère : le serveur fait foi, on ne préserve que MES critères
        // non encore confirmés (rare au tout premier pull, mais possible si le pull
        // est lent et que l'utilisateur a déjà saisi quelque chose). On part de prev
        // pour conserver les gares purement locales pas (encore) côté serveur.
        setAll((prev) => mergeServerState(prev, fresh, {
          state: pendingState.current,
          crit: pendingCriteres.current,
          meta: pendingMetaFlag.current
        }, { crit: pendingCriteres, state: pendingState }));
      }
      if (grille) bumpGrid();
      setSyncing(false);
    }).catch((e) => { console.warn('Initial pull failed:', e); if (mounted) setSyncing(false); });
    return () => { mounted = false; };
  }, [bumpGrid]);

  // Refresh manuel (bouton ↻ dans le header gare) - utile sur mobile où
  // on ne peut pas faire un vrai reload, et quand le realtime a perdu des
  // events (mode dégradé, app en background, etc.)
  // ⚠ BUG FIX 27/05 v2 : utiliser setAll((prev) => ...) pour préserver les gares
  // locales qui n'existent pas encore côté serveur (push en cours, visite créée).
  const manualRefresh = useCallback(async () => {
    if (syncing) return;
    setSyncing(true);
    try {
      const fresh = await withTimeout(pullAllFromSupa());
      if (fresh) {
        // Fusion par critère (cf. mergeServerState). On préserve les gares locales
        // (prev) et MES critères non confirmés, le reste vient du serveur.
        setAll((prev) => mergeServerState(prev, fresh, {
          state: pendingState.current,
          crit: pendingCriteres.current,
          meta: pendingMetaFlag.current
        }, { crit: pendingCriteres, state: pendingState }));
        showToast('↻ Actualisé', 'success');
      } else {
        showToast('Pas de connexion', 'error');
      }
    } catch (e) {
      console.warn('Manual refresh failed:', e);
      showToast('Échec actualisation', 'error');
    } finally {
      setSyncing(false);
    }
  }, [syncing]);

  // Real-time sync : applique les deltas reçus (sans SQL). Le pull complet n'est
  // qu'un filet de sécurité, déclenché au retour au premier plan ou si un payload
  // arrive incomplet. → charge serveur radicalement réduite (cf. captures CPU/RAM).
  useEffect(() => {
    let reconcileTO = null;
    const reconcile = () => {
      // Pull complet débounce (rare). Fusion par critère pour préserver mes saisies
      // non confirmées.
      if (reconcileTO) clearTimeout(reconcileTO);
      reconcileTO = setTimeout(async () => {
        const fresh = await withTimeout(pullAllFromSupa());
        if (fresh) setAll((prev) => mergeServerState(prev, fresh, {
          state: pendingState.current,
          crit: pendingCriteres.current,
          meta: pendingMetaFlag.current
        }));
      }, 600);
    };
    const teardownVis = setupRealtimeSync({
      onResponseDelta: (payload) =>
        setAll((prev) => applyResponseDelta(prev, payload, pendingCriteres.current)),
      onMetaDelta: (payload) =>
        setAll((prev) => applyMetaDelta(prev, payload, pendingMetaFlag.current)),
      onReconcile: reconcile,
      // isOwnEcho(gare, critere) : on ignore l'écho d'un critère que je viens d'écrire
      // et qui n'est pas encore confirmé (ma version locale prime de toute façon).
      isOwnEcho: (gn, cid) => !!(pendingCriteres.current[gn] && pendingCriteres.current[gn].has(cid))
    });
    const teardownGri = setupGrilleRealtime(() => bumpGrid());
    // Réconciliation légère quand l'app revient au premier plan (un seul pull,
    // rattrape d'éventuels events realtime perdus pendant la mise en arrière-plan).
    const onVisible = () => { if (document.visibilityState === 'visible') reconcile(); };
    document.addEventListener('visibilitychange', onVisible);
    return () => {
      teardownVis(); teardownGri();
      document.removeEventListener('visibilitychange', onVisible);
      if (reconcileTO) clearTimeout(reconcileTO);
    };
  }, [bumpGrid]);

  // Persist locally
  useEffect(() => { saveAll(all); }, [all]);

  // First-time author prompt - FALLBACK seulement (si le prénom n'a pas été saisi
  // sur l'écran de déverrouillage). Ne s'ouvre qu'une fois l'app déverrouillée.
  useEffect(() => {
    if (isUnlocked && auteur === 'Anonyme' && !localStorage.getItem('serm-auteur')) {
      const n = (prompt("Quel est ton prénom ou tes initiales ? (pour identifier tes relevés dans l'équipe)") || '').trim();
      if (n) {
        setAuteur(n);
        localStorage.setItem('serm-auteur', n);
      }
    }
    // eslint-disable-next-line
  }, [isUnlocked]);

  const showToast = (msg, type = '') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2200);
  };

  const startVisite = (gareName) => {
    const g = GARES.find((x) => x.nom === gareName);
    if (!all[gareName]) {
      // Pré-remplir avec les attributs connus de la gare (Caractérisation + Synthèse)
      const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
      const initialData = {
        visite_date: today,
