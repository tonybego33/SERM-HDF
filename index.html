/* ============================================================
   IDENTITÉ APPAREIL + APPARTENANCE DES PHOTOS EN ATTENTE
   ============================================================
   Une photo "pending" (non encore uploadée) vit dans l'IndexedDB de
   L'APPAREIL QUI L'A PRISE, avec une URL blob: locale à cet appareil.
   Quand cette photo est diffusée aux autres appareils (realtime/pull),
   son URL blob: n'y résout PAS et son blobId n'y existe PAS → elle restait
   "en attente" à vie chez les collègues et déclenchait des retries inutiles.
   On tamponne donc chaque photo locale avec l'ID de l'appareil (owner).
   Un appareil ne COMPTE et ne RÉ-ESSAIE QUE ses propres photos.
   (owner absent = photo héritée d'avant ce correctif → on garde l'ancien
    comportement pour ne rien casser : traitée comme "mienne".) */
const DEVICE_ID = (() => {
  try {
    let id = localStorage.getItem('serm-device-id');
    if (!id) { id = 'dev_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); localStorage.setItem('serm-device-id', id); }
    return id;
  } catch (e) { return 'dev_anon'; }
})();
// Photo en attente que CET appareil peut réellement uploader (la sienne, ou héritée)
const isMyPending = (p) => !!(p && p.pending && (p.owner === DEVICE_ID || !p.owner));
// Photo en attente appartenant à un AUTRE appareil (URL blob: inexploitable ici)
const isForeignPending = (p) => !!(p && p.pending && p.owner && p.owner !== DEVICE_ID);
// Photo réellement uploadée = vraie URL http(s), pas en attente (pas blob:/data:).
const isUploadedPhoto = (p) => !!(p && p.url && /^https?:\/\//.test(p.url) && !p.pending);
// Nettoie une valeur de critère AVANT envoi serveur : la base ne stocke QUE des
// photos uploadées (jamais de blob:/pending). C'est LA correction du bug "photo
// en attente à vie" : sans ça, une URL blob: locale finissait écrite en base et
// s'affichait "en attente" partout / introuvable au rechargement.
function stripPendingPhotosForServer(value) {
  if (!value || typeof value !== 'object' || !Array.isArray(value.photos)) return value;
  const kept = value.photos.filter(isUploadedPhoto);
  if (kept.length === value.photos.length) return value;
  return { ...value, photos: kept };
}
// Réinjecte MES photos en attente (locales) par-dessus une valeur venue du serveur,
// pour ne pas les perdre lors d'une fusion (le serveur ne stocke jamais de pending).
// → l'aperçu local et le ré-essai d'upload survivent à un refresh / retour d'app.
function keepLocalPendingPhotos(serverVal, localVal) {
  const localPending = (localVal && typeof localVal === 'object' && Array.isArray(localVal.photos))
    ? localVal.photos.filter(p => isMyPending(p)) : [];
  if (localPending.length === 0) return serverVal;
  const base = (serverVal && typeof serverVal === 'object' && !Array.isArray(serverVal))
    ? serverVal : (serverVal !== undefined && serverVal !== null ? { val: serverVal } : {});
  const serverPhotos = Array.isArray(base.photos) ? base.photos : [];
  const seen = new Set(serverPhotos.map(p => p && p.blobId).filter(Boolean));
  const merged = [...serverPhotos, ...localPending.filter(p => !p.blobId || !seen.has(p.blobId))];
  return { ...base, photos: merged };
}

let _photoErrToast = null; // évite de spammer le même message en boucle

/* ============================================================
   INDEXEDDB - stockage persistant des photos en attente d'upload
   ============================================================
   But : si l'utilisateur prend une photo offline et FERME l'app
   avant le retour réseau, le blob est préservé dans IndexedDB
   (au lieu de localStorage qui est limité à 5 Mo).
   Au redémarrage, on retente l'upload Supabase automatiquement.
   ============================================================ */
const PHOTO_DB_NAME = 'serm_photo_store';
const PHOTO_DB_VERSION = 1;
const PHOTO_STORE = 'pending_photos';
let _photoDB = null;

function isIndexedDBAvailable() {
  try { return typeof indexedDB !== 'undefined' && indexedDB !== null; } catch (e) { return false; }
}

async function openPhotoDB() {
  if (_photoDB) return _photoDB;
  if (!isIndexedDBAvailable()) throw new Error('IndexedDB not supported');
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(PHOTO_DB_NAME, PHOTO_DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(PHOTO_STORE)) {
        db.createObjectStore(PHOTO_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => { _photoDB = req.result; resolve(req.result); };
    req.onerror = () => reject(req.error);
  });
}

async function savePhotoBlob(id, blob, meta) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).put({ id, blob, meta: meta || {}, createdAt: Date.now() });
    tx.oncomplete = () => resolve(id);
    tx.onerror = () => reject(tx.error);
  });
}

async function getPhotoBlob(id) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deletePhotoBlob(id) {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function listAllPhotoBlobs() {
  const db = await openPhotoDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// Reconstruit les blob URLs locales pour les photos pending au chargement.
// (Les URLs object n'étant pas sérialisables, il faut les recréer après reload.)
async function restoreBlobUrls(all) {
  if (!isIndexedDBAvailable()) return all;
  try {
    const blobs = await listAllPhotoBlobs();
    const blobMap = Object.create(null);
    blobs.forEach(e => { if (e.blob) blobMap[e.id] = e.blob; });
    Object.values(all).forEach(v => {
      if (!v?.data) return;
      Object.values(v.data).forEach(d => {
        if (d && typeof d === 'object' && Array.isArray(d.photos)) {
          d.photos.forEach(p => {
            if (p?.blobId && blobMap[p.blobId]) {
              // Recrée l'URL object pour preview en local
              if (!p.url || (!p.url.startsWith('blob:') && !p.url.startsWith('http'))) {
                p.url = URL.createObjectURL(blobMap[p.blobId]);
              }
            }
          });
        }
      });
    });
  } catch (e) { console.warn('restoreBlobUrls failed:', e); }
  return all;
}

/* Push one visite to Supabase (silent, non-blocking) */
/* ============================================================
   v71 - PUSH/PULL EN GRANULARITÉ CRITÈRE
   ============================================================
   Au lieu de pousser toute la visite à chaque modif (et écraser ce
   qu'un autre utilisateur vient de saisir sur un autre onglet),
   on push UN row par critère modifié dans la table `responses`.
   Comme ça Tony peut taper Quais et Maram peut taper PSH de la
   même gare sans collision.
   La meta de la visite (auteurs cumulés, date visite, météo) va
   dans la table `visite_meta` séparée.
   ============================================================ */

// Push UN critère modifié vers Supabase (granularité fine)
async function pushCritereToSupa(gareName, critereId, value, auteur) {
  if (!supa) return;
  // La base ne stocke QUE des photos uploadées : on retire toute photo en attente
  // (blob: local) avant l'envoi. La photo en attente reste en local + IndexedDB et
  // sera enregistrée en base avec sa vraie URL une fois l'upload terminé.
  const cleanValue = stripPendingPhotosForServer(value);
  // ⚠ On LÈVE l'erreur (au lieu de l'avaler) : c'est ce qui permet à l'appelant
  // de savoir qu'un envoi a échoué et de le rejouer. Sans ça, sur réseau
  // instable, les saisies étaient "perdues en silence" côté serveur.
  const { error } = await supa.from('responses').upsert({
    gare: gareName,
    critere_id: critereId,
    value: cleanValue === undefined ? null : cleanValue,
    auteur: auteur || 'Anonyme',
    updated_at: new Date().toISOString()
  }, { onConflict: 'gare,critere_id' });
  if (error) throw error;
}

// Push la meta visite (auteurs, météo, date_visite) - peu fréquent
async function pushVisiteMetaToSupa(v) {
  if (!supa) return;
  const { error } = await supa.from('visite_meta').upsert({
    gare: v.gare,
    auteurs: v.auteur || 'Anonyme',
    date_visite: v.data?.visite_date || null,
    updated_at: new Date().toISOString()
  }, { onConflict: 'gare' });
  if (error) throw error;
}

// Supprime un critère côté serveur (utilisé quand on clear une réponse)
async function deleteCritereFromSupa(gareName, critereId) {
  if (!supa) return;
  const { error } = await supa.from('responses').delete()
    .eq('gare', gareName).eq('critere_id', critereId);
  if (error) throw error;
}

/* Pull tous les responses + visite_meta, reconstruit la structure `all` */
// Garde-fou anti-blocage : empêche une requête réseau qui traîne (5G instable)
// de bloquer indéfiniment (spinner infini). Résout à null après `ms` si rien
// n'est revenu → l'appli ne se fige plus, on retentera au prochain cycle.
function withTimeout(promise, ms = 45000) {
  return Promise.race([
    promise,
    new Promise((resolve) => setTimeout(() => resolve(null), ms)),
  ]);
}

async function pullAllFromSupa() {
  if (!supa) return null;
  try {
    // ⚠ BUG FIX 27/05 v3 : PostgREST limite à 1000 lignes par défaut.
    // Avec ~1200+ responses en base, on perdait les lignes 1001+ → des réponses
    // récentes (notamment Vétusté, Hub etc.) n'étaient pas ramenées → l'app
    // pensait que ces réponses n'existaient pas → bug "disparaît au refresh".
    // Solution : pagination explicite via .range() jusqu'à épuisement.
    const PAGE_SIZE = 1000;
    let allResponses = [];
    let from = 0;
    while (true) {
      const { data, error } = await supa.from('responses')
        .select('*')
        .order('gare', { ascending: true })
        .order('critere_id', { ascending: true })
        .range(from, from + PAGE_SIZE - 1);
      if (error) { console.warn('Pull responses page', from, ':', error); return null; }
      if (!data || data.length === 0) break;
      allResponses = allResponses.concat(data);
      if (data.length < PAGE_SIZE) break; // dernière page
      from += PAGE_SIZE;
      if (from > 100000) { console.warn('Pull aborted: >100k rows'); break; } // garde-fou
    }
    // visite_meta : moins critique, généralement < 100 rows. Mais on pagine quand même
    // au cas où le projet grossirait.
    let allMeta = [];
    from = 0;
    while (true) {
      const { data, error } = await supa.from('visite_meta')
        .select('*')
        .order('gare', { ascending: true })
        .range(from, from + PAGE_SIZE - 1);
      if (error) { console.warn('Pull meta page', from, ':', error); break; }
      if (!data || data.length === 0) break;
      allMeta = allMeta.concat(data);
      if (data.length < PAGE_SIZE) break;
      from += PAGE_SIZE;
      if (from > 10000) break;
    }

    const all = {};
    // Reconstituer les visites depuis les responses (1 row = 1 critère)
    allResponses.forEach(row => {
      if (!all[row.gare]) {
        all[row.gare] = { gare: row.gare, data: {}, updated: 0, auteur: 'Anonyme' };
      }
      // value peut être null (= critère existait mais a été nettoyé)
      if (row.value !== null && row.value !== undefined) {
        all[row.gare].data[row.critere_id] = row.value;
      }
      // Le timestamp de la visite = max des timestamps de ses critères
      const ts = new Date(row.updated_at).getTime();
      if (ts > all[row.gare].updated) all[row.gare].updated = ts;
    });
    // Compléter avec la meta visite
    allMeta.forEach(row => {
      if (!all[row.gare]) {
        all[row.gare] = { gare: row.gare, data: {}, updated: 0, auteur: 'Anonyme' };
      }
      all[row.gare].auteur = row.auteurs || all[row.gare].auteur;
    });

    saveAll(all);
    return all;
  } catch (e) { console.warn('Pull failed:', e); return null; }
}

/* Delete une visite entière (toutes ses responses + sa meta) */
async function deleteVisiteRemote(gareName) {
  try { const all = loadAll(); delete all[gareName]; saveAll(all); } catch (e) {}
  if (!supa) return;
  try {
    await Promise.all([
      supa.from('responses').delete().eq('gare', gareName),
      supa.from('visite_meta').delete().eq('gare', gareName)
    ]);
  } catch (e) { console.warn('Delete failed:', e); }
}

/* ============================================================
   Real-time sync — MODE DELTA (v2026-06-09 · 8)
   ============================================================
   ⚠ CHANGEMENT MAJEUR DE CHARGE SERVEUR.
   Avant : à CHAQUE modification d'un coéquipier, on relançait pullAllFromSupa()
   = un scan complet de la table `responses` (1000+ lignes, paginé, trié) sur une
   instance partagée 0.5 Go. Avec plusieurs personnes qui saisissent en même temps,
   ça multipliait les scans complets → CPU à ~100 %, timeouts de connexion,
   "Failed to retrieve schemas". Et ces timeouts produisaient eux-mêmes des pulls
   partiels → divergence des % entre téléphones.

   Maintenant : l'événement realtime CONTIENT déjà la ligne modifiée
   (payload.new = { gare, critere_id, value, ... }). On applique ce delta
   directement à l'état local, SANS AUCUNE requête SQL. Le pull complet n'est plus
   utilisé que pour : le chargement initial, le bouton ↻, le retour au premier plan,
   et en repli si un payload est incomplet. Charge serveur divisée par ~100 en
   usage multi-utilisateurs.
   ============================================================ */

// Applique un événement `responses` (INSERT/UPDATE/DELETE) à l'état, sans SQL.
// Retourne `prev` inchangé s'il n'y a rien à modifier (évite les re-renders inutiles).
function applyResponseDelta(prev, payload, pendingCrit) {
  const isDelete = payload?.eventType === 'DELETE'
    || !payload?.new || (payload?.new && Object.keys(payload.new).length === 0);
  const row = (payload?.new && payload.new.gare) ? payload.new
            : (payload?.old && payload.old.gare) ? payload.old : null;
  if (!row) return prev;
  const gn = row.gare, cid = row.critere_id;
  if (!gn || !cid) return prev;
  // Mon propre critère encore en attente de confirmation : ma version locale prime.
  if (pendingCrit && pendingCrit[gn] && pendingCrit[gn].has(cid)) return prev;
  const cur = prev[gn] || { gare: gn, data: {}, updated: 0, auteur: 'Anonyme' };
  const newData = { ...(cur.data || {}) };
  const val = payload?.new ? payload.new.value : undefined;
  if (isDelete || val === null || val === undefined) {
    if (!(cid in newData)) return prev; // déjà absent → rien à faire
    delete newData[cid];
  } else {
    // On préserve MES photos en attente (le serveur n'en stocke jamais) : elles ne
    // doivent pas disparaître quand un delta serveur arrive sur ce critère.
    const mergedVal = keepLocalPendingPhotos(val, newData[cid]);
    if (JSON.stringify(newData[cid]) === JSON.stringify(mergedVal)) return prev; // pas de réel changement
    newData[cid] = mergedVal;
  }
  const tsRaw = payload?.new && payload.new.updated_at;
  const ts = tsRaw ? new Date(tsRaw).getTime() : Date.now();
  return { ...prev, [gn]: { ...cur, data: newData, updated: Math.max(cur.updated || 0, ts || 0) } };
}

// Applique un événement `visite_meta` (mise à jour des auteurs cumulés), sans SQL.
function applyMetaDelta(prev, payload, pendingMeta) {
  const row = (payload?.new && payload.new.gare) ? payload.new
            : (payload?.old && payload.old.gare) ? payload.old : null;
  if (!row) return prev;
  const gn = row.gare;
  if (!gn) return prev;
  if (pendingMeta && pendingMeta[gn] === true) return prev; // ma meta en attente prime
  const cur = prev[gn];
  if (!cur) return prev; // gare pas encore connue localement : un delta `responses` la créera
  const auteurs = (payload?.new && payload.new.auteurs) || cur.auteur;
  if (auteurs === cur.auteur) return prev;
  return { ...prev, [gn]: { ...cur, auteur: auteurs } };
}

/* Abonnement realtime. Dispatche les deltas ; ne déclenche un pull (onReconcile)
   qu'en repli, si un payload arrive incomplet (ex. DELETE sans clé exploitable).
   isOwnEcho(gare, critere) supprime l'écho de mon propre critère non confirmé. */
function setupRealtimeSync({ onResponseDelta, onMetaDelta, onReconcile, isOwnEcho }) {
  if (!supa) return () => {};
  try {
    const handleResp = (payload) => {
      const gn = payload?.new?.gare || payload?.old?.gare;
      const cid = payload?.new?.critere_id || payload?.old?.critere_id;
      if (gn && cid) {
        if (isOwnEcho && isOwnEcho(gn, cid)) return; // mon propre écho non confirmé
        onResponseDelta(payload);
      } else if (onReconcile) {
        onReconcile(); // payload inexploitable → resync ciblé (rare)
      }
    };
    const handleMeta = (payload) => {
      const gn = payload?.new?.gare || payload?.old?.gare;
      if (gn) onMetaDelta(payload);
      else if (onReconcile) onReconcile();
    };
    const channel = supa.channel('responses_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'responses' }, handleResp)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'visite_meta' }, handleMeta)
      .subscribe();
    return () => { try { supa.removeChannel(channel); } catch (e) {} };
  } catch (e) { console.warn('Realtime setup failed:', e); return () => {}; }
}

/* ============================================================
   FUSION SERVEUR ↔ LOCAL — granularité CRITÈRE (v2026-06-09 · 4)
   ============================================================
   Le serveur (fresh) fait foi, SAUF pour les critères que j'ai édités
   localement et qui ne sont pas encore confirmés côté serveur. Ces
   critères-là (et eux seuls) sont ré-appliqués par-dessus la version
   serveur. Plus aucun verrou au niveau de la gare entière : deux personnes
   peuvent remplir la même gare et chacune voit les critères de l'autre dès
   qu'ils sont confirmés (≈ 1 s). C'est ce qui élimine la divergence des % et
   le "ça apparaît / ça disparaît".

   `pending` = { state: pendingState.current, crit: pendingCriteres.current,
                 meta: pendingMetaFlag.current }
   La fonction est volontairement PURE (aucun accès direct aux refs) pour être
   appelable indifféremment depuis le pull initial, le refresh manuel et le
   realtime. */
function mergeServerState(prev, fresh, pending, recover) {
  if (!fresh) return prev;
  const pState = (pending && pending.state) || {};
  const pCrit = (pending && pending.crit) || {};
  const pMeta = (pending && pending.meta) || {};
  const merged = { ...prev }; // garde les gares purement locales (pas encore poussées)
  const queueRecover = (gn) => {
    if (!recover.crit.current[gn]) recover.crit.current[gn] = new Set();
    return recover.crit.current[gn];
  };
  Object.keys(fresh).forEach((gn) => {
    const freshV = fresh[gn];
    const prevV = prev[gn];
    const fd = freshV.data || {};
    const ld = (prevV && prevV.data) || {};
    const data = { ...fd }; // base = VÉRITÉ SERVEUR
    // 1) UNION : on RÉINJECTE les critères présents UNIQUEMENT en local (jamais
    //    montés sur le serveur) → AUCUNE perte. Si récupération demandée
    //    (pull initial / refresh manuel), on les remet en file d'envoi.
    Object.keys(ld).forEach((cid) => {
      if (!Object.prototype.hasOwnProperty.call(fd, cid)) {
        data[cid] = ld[cid];
        if (recover) { queueRecover(gn).add(cid); recover.state.current[gn] = prevV; }
      }
    });
    // 2) Mes saisies NON CONFIRMÉES priment, critère par critère.
    const critSet = pCrit[gn];
    const metaPending = pMeta[gn] === true;
    const localV = pState[gn] || prevV;
    if (critSet && critSet.size > 0 && localV) {
      critSet.forEach((cid) => {
        const lv = localV.data ? localV.data[cid] : undefined;
        if (lv === undefined || lv === null) delete data[cid];
        else data[cid] = lv;
      });
    }
    // 3. Préserver MES photos en attente même là où le serveur fait foi (le serveur
    //    ne stocke jamais de pending) → une photo pas encore uploadée ne disparaît
    //    pas au refresh / retour d'app, et reste dans la file de ré-essai.
    Object.keys(data).forEach((cid) => { data[cid] = keepLocalPendingPhotos(data[cid], ld[cid]); });
    merged[gn] = {
      ...freshV,
      data,
      auteur: metaPending ? ((localV && localV.auteur) || freshV.auteur) : (freshV.auteur || (localV && localV.auteur)),
      updated: freshV.updated || (localV && localV.updated)
    };
  });
  // Gares présentes SEULEMENT en local (visite jamais arrivée au serveur) :
  // conservées par {...prev} ; si récupération, on remet leurs critères en file.
  if (recover) {
    Object.keys(prev).forEach((gn) => {
      if (fresh[gn]) return;
      const ld = (prev[gn] && prev[gn].data) || {};
      const cids = Object.keys(ld);
      if (cids.length === 0) return;
      const set = queueRecover(gn);
      cids.forEach((cid) => set.add(cid));
      recover.state.current[gn] = prev[gn];
    });
  }
  return merged;
}

/* Photo upload to Supabase Storage */
/* ============================================================
   PHOTOS - compression auto + upload
   ============================================================
   Toutes les photos sont compressées (1600px max, JPEG 80%)
   → divise le poids par 5-10. Pas de mode HD : on garde un
   format léger uniforme pour fluidité terrain et stockage.
   ============================================================ */

// Compresse une image côté navigateur (Canvas API, pas de dépendance).
// Compresse TOUJOURS (pas de skip taille) pour garantir un poids prévisible.
async function compressImage(file, opts = {}) {
  const maxDim = opts.maxDim || 1600;     // 1600px largement suffisant pour analyse terrain
  const quality = opts.quality || 0.80;   // JPEG 80% - bon équilibre qualité/poids

  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const ratio = Math.min(1, maxDim / Math.max(width, height));
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => {
        URL.revokeObjectURL(img.src);
        if (!blob) { resolve(file); return; }
        const baseName = file.name.replace(/\.\w+$/, '');
        const compressed = new File([blob], `${baseName}.jpg`, { type: 'image/jpeg' });
        const ratioPct = Math.round((1 - compressed.size / file.size) * 100);
        console.log(`📷 Compression: ${(file.size/1024).toFixed(0)} KB → ${(compressed.size/1024).toFixed(0)} KB (-${ratioPct}%)`);
        resolve(compressed);
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('Image load failed')); };
    img.src = URL.createObjectURL(file);
  });
}

async function uploadPhoto(gareName, critId, file, opts = {}) {
  // Compression systématique (pas de mode HD)
  const originalSize = file.size;
  let toUpload = file;
  try {
    toUpload = await compressImage(file);
  } catch (e) { console.warn('Compression failed, uploading original:', e); }

  // ── Fallback offline : on stocke le BLOB dans IndexedDB (préservé même à la fermeture)
  // Avec fallback ultime en data URL si IndexedDB indisponible.
  const goOffline = async () => {
    // Essai 1 : IndexedDB (préféré, capacité 50-500 MB)
    if (isIndexedDBAvailable()) {
      try {
        const blobId = `${gareName}__${critId}__${Date.now()}__${Math.random().toString(36).slice(2,8)}`
          .replace(/[^a-zA-Z0-9_-]/g, '_');
        await savePhotoBlob(blobId, toUpload, {
          critId, gareName, name: toUpload.name
        });
        return {
          blobId,                                  // ← référence IndexedDB persistante
          url: URL.createObjectURL(toUpload),       // ← URL object pour preview immédiate
          name: toUpload.name, local: true,
          pending: !!supa,
          owner: DEVICE_ID,                         // ← appareil propriétaire du blob
          size: toUpload.size, originalSize,
          critId, gareName
        };
      } catch (e) {
        console.warn('IndexedDB save failed, fallback to data URL:', e);
      }
    }
    // Essai 2 : data URL en localStorage (ancien comportement, limite ~5 MB total)
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve({
        url: r.result, name: toUpload.name, local: true,
        pending: !!supa,
        owner: DEVICE_ID,                         // ← appareil propriétaire
        size: toUpload.size, originalSize,
        critId, gareName
      });
      r.onerror = reject;
      r.readAsDataURL(toUpload);
    });
  };

  // Si pas de Supabase ou pas de réseau → fallback direct
  if (!supa || (typeof navigator !== 'undefined' && navigator.onLine === false)) {
    return goOffline();
  }

  // Mode "aperçu immédiat" : on rend tout de suite une photo locale (pending),
  // l'upload réseau se fera en arrière-plan via retryPendingPhotos (déclenché
  // automatiquement par pendingCount). → la photo s'affiche INSTANTANÉMENT.
  if (opts.localOnly) {
    return goOffline();
  }

  // Sinon on tente l'upload normal, avec fallback en cas d'erreur réseau
  try {
    const ts = Date.now();
    const safe = toUpload.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(-40);
    const slug = gareName.replace(/[^a-zA-Z0-9]/g, '_');
    const path = `${slug}/${critId}_${ts}_${safe}`;
    // ⚠ Timeout 30 s : sans ça, un upload qui "pend" (réseau qui répond pas) ne se
    // résout JAMAIS → retryPendingPhotos reste bloqué → plus AUCUN ré-essai photo
    // de la session. Le timeout transforme un blocage en simple échec → on retente.
    const res = await withTimeout(supa.storage.from('photos').upload(path, toUpload, {
      contentType: toUpload.type, upsert: false
    }), 30000);
    if (!res) throw new Error('timeout 30s (réseau trop lent ou aucune réponse)');
    if (res.error) throw res.error;
    const { data } = supa.storage.from('photos').getPublicUrl(path);
    LAST_PHOTO_ERR = null; // upload OK → on efface l'erreur précédente
    return {
      url: data.publicUrl, path, name: toUpload.name,
      size: toUpload.size, originalSize
    };
  } catch (e) {
    // On garde le message exact pour pouvoir l'afficher dans l'app (cause réelle :
    // RLS, auth, réseau, timeout… au lieu de "ça marche pas").
    LAST_PHOTO_ERR = (e && (e.message || e.error || e.statusCode || e.name)) ? String(e.message || e.error || ('HTTP ' + e.statusCode) || e.name) : 'erreur inconnue';
    console.warn('Upload failed, falling back offline:', e);
    return goOffline();
  }
}

// Retry des photos pending - parcourt all et tente l'upload des photos
// stockées localement (soit en IndexedDB via blobId, soit legacy en data: URL)
async function retryPendingPhotos(all, onProgress) {
  if (!supa || (typeof navigator !== 'undefined' && navigator.onLine === false)) return all;
  let changed = false;
  const next = { ...all };
  let totalPending = 0;
  let totalDone = 0;
  // Compter total pour le progress (blobId OU data: URL)
  Object.values(all).forEach(v => {
    if (!v?.data) return;
    Object.values(v.data).forEach(d => {
      if (d && typeof d === 'object' && Array.isArray(d.photos)) {
        d.photos.forEach(p => {
          if (isMyPending(p) && (p?.blobId || (p?.url && p.url.startsWith('data:')))) totalPending++;
        });
      }
    });
  });
  if (totalPending === 0) return all;
  if (onProgress) onProgress(0, totalPending);

  for (const [gareName, visite] of Object.entries(next)) {
    if (!visite?.data) continue;
    let visiteChanged = false;
    const newData = { ...visite.data };
    for (const [critId, value] of Object.entries(visite.data)) {
      if (!value || typeof value !== 'object' || !Array.isArray(value.photos)) continue;
      const newPhotos = [];
      for (const p of value.photos) {
        if (!isMyPending(p)) { newPhotos.push(p); continue; }  // déjà uploadée OU photo d'un autre appareil

        let file = null;
        try {
          if (p.blobId && isIndexedDBAvailable()) {
            // ── Cas 1 : photo stockée dans IndexedDB
            const entry = await getPhotoBlob(p.blobId);
            if (entry && entry.blob) {
              file = new File([entry.blob], p.name || 'photo.jpg', { type: entry.blob.type });
            }
          } else if (p.url && p.url.startsWith('data:')) {
            // ── Cas 2 : photo legacy en data URL
            const resp = await fetch(p.url);
            const blob = await resp.blob();
            file = new File([blob], p.name || 'photo.jpg', { type: blob.type });
          }

          if (!file) {
            // Blob introuvable (IndexedDB vidée, etc.) - on garde la photo telle quelle
            newPhotos.push(p);
            continue;
          }

          const uploaded = await uploadPhoto(gareName, critId, file);
          if (uploaded.pending) {
            // Toujours offline → on garde l'originale. uploadPhoto a re-stocké un
            // NOUVEAU blob dans IndexedDB en repli : on le purge (sinon un blob
            // orphelin s'accumule à chaque ré-essai → IndexedDB gonfle, appareil rame).
            if (uploaded.blobId && uploaded.blobId !== p.blobId) {
              try { await deletePhotoBlob(uploaded.blobId); } catch (e) {}
            }
            newPhotos.push(p);
          } else {
            // Upload réussi → nettoyage IndexedDB + révoque blob URL si présente
            if (p.blobId) {
              try { await deletePhotoBlob(p.blobId); } catch (e) {}
            }
            if (p.url && p.url.startsWith('blob:')) {
              try { URL.revokeObjectURL(p.url); } catch (e) {}
            }
            newPhotos.push(uploaded);
            visiteChanged = true;
            totalDone++;
            if (onProgress) onProgress(totalDone, totalPending);
          }
        } catch (e) {
          console.warn('Retry failed for', p.name, e);
          newPhotos.push(p);
        }
      }
      if (visiteChanged) newData[critId] = { ...value, photos: newPhotos };
    }
    if (visiteChanged) {
      next[gareName] = { ...visite, data: newData, updated: Date.now() };
      changed = true;
    }
  }
  return changed ? next : all;
}

async function deletePhoto(photo) {
  if (photo?.path && supa) {
    try { await supa.storage.from('photos').remove([photo.path]); } catch (e) { console.warn(e); }
  }
  // Nettoyer IndexedDB si la photo y est encore stockée (cas pending)
  if (photo?.blobId && isIndexedDBAvailable()) {
    try { await deletePhotoBlob(photo.blobId); } catch (e) {}
  }
  // Révoquer l'URL object si présente (libère la mémoire)
  if (photo?.url && photo.url.startsWith('blob:')) {
    try { URL.revokeObjectURL(photo.url); } catch (e) {}
  }
}

/* ============================================================
   GRILLE CONFIG - chargement et persistance de la grille
   ============================================================
   Architecture :
   - SECTIONS (let) = source de vérité courante (modifiée à chaud)
   - DEFAULT_SECTIONS = snapshot des sections initiales en dur (fallback)
   - SYSTEM_SKIPIF = map id -> skipIf function (les fonctions ne sont
     pas sérialisables en JSON, donc on les rétablit au pull)
   - grille_config table Supabase : 1 row id='active', sections JSONB
   ============================================================ */

// Snapshot des sections initiales - fallback si Supabase indispo
const DEFAULT_SECTIONS = SECTIONS.map(s => ({...s, criteria: [...(s.criteria||[])]}));

// Map des skipIf indexée par id - pour réhydrater au pull
const SYSTEM_SKIPIF = {};
DEFAULT_SECTIONS.forEach(s => { if (s.skipIf) SYSTEM_SKIPIF[s.id] = s.skipIf; });

// Sérialiser : retirer les fonctions skipIf avant push (JSON ne les gère pas)
function serializeSections(secs) {
  return secs.map(s => {
    const clean = {...s};
    delete clean.skipIf;
    return clean;
  });
}

// Désérialiser : rétablir skipIf pour les sections système
// ⚠ FIX 27/05 : fusionner intelligemment la grille Supabase (modifs Maram) avec les
// évolutions du code (nouveaux critères, nouvelles sections). Sinon les ajouts code
// (ex: synth_vetuste, parking3-5) ne s'affichent jamais car la grille Supabase les écrase.
function hydrateSections(secs) {
  const baseById = new Map(secs.map(s => [s.id, s]));
  // On parcourt DEFAULT_SECTIONS (= source code, ordre correct) et on prend la version
  // Supabase si elle existe, sinon la version code. Dans les deux cas on ajoute les
  // critères du code absents de la base à la fin de la section.
  return DEFAULT_SECTIONS.map(defaultSec => {
    const baseSec = baseById.get(defaultSec.id);
    let hydrated;
    if (!baseSec) {
      // Section du code absente de Supabase (ex: parking3/4/5 nouveaux) : on la prend telle quelle
      hydrated = { ...defaultSec };
    } else {
      // Section présente en base : on prend la version base et on rétablit skipIf
      hydrated = SYSTEM_SKIPIF[defaultSec.id]
        ? { ...baseSec, skipIf: SYSTEM_SKIPIF[defaultSec.id] }
        : { ...baseSec };
    }

    // Migration générique : ajouter les critères du code absents de la version base
    if (Array.isArray(defaultSec.criteria) && Array.isArray(hydrated.criteria)) {
      const existingIds = new Set(hydrated.criteria.map(c => c?.id).filter(Boolean));
      const missing = defaultSec.criteria.filter(c => c?.id && !existingIds.has(c.id));
      if (missing.length > 0) {
        hydrated.criteria = [...hydrated.criteria, ...missing];
      }
    } else if (!Array.isArray(hydrated.criteria) && Array.isArray(defaultSec.criteria)) {
      hydrated.criteria = [...defaultSec.criteria];
    }

    return hydrated;
  });
}

// ⚠ Version de la grille codée en dur.
// À INCRÉMENTER à chaque modification structurelle (ajout/suppression de critère,
// déplacement entre sections, etc.) pour forcer la mise à jour automatique
// de la grille Supabase chez tous les utilisateurs au prochain chargement.
const GRID_VERSION = '2026-05-30-v4-triggers-in-sections';
/* Version de l'APP affichée à l'écran : permet de vérifier d'un coup d'œil que
   tous les appareils tournent sur le MÊME code. Si deux appareils affichent des
   versions différentes → l'un sert un ancien cache → vider le cache de celui-ci.
   À incrémenter à chaque déploiement. */
const APP_VERSION = 'v2026-06-09 · 12';

// Push la grille courante vers Supabase
async function pushGrilleToSupa(by) {
  if (!supa) return;
  // Payload complet → fallback minimal si la table n'a pas toutes les colonnes
  const payloads = [
    { id: 'active', sections: serializeSections(SECTIONS), updated_at: new Date().toISOString(), updated_by: by || 'Anonyme', version: GRID_VERSION },
    { id: 'active', sections: serializeSections(SECTIONS), updated_at: new Date().toISOString(), updated_by: by || 'Anonyme' },
    { id: 'active', sections: serializeSections(SECTIONS), updated_at: new Date().toISOString() },
    { id: 'active', sections: serializeSections(SECTIONS) }
  ];
  for (const payload of payloads) {
    try {
      const { error } = await supa.from('grille_config').upsert(payload);
      if (!error) return; // ✓ marché, on arrête
      console.warn('Grille push (payload', Object.keys(payload).join(','), '):', error.message || error);
    } catch (e) { console.warn('Grille push failed:', e); }
  }
}

// Pull la grille depuis Supabase. Si vide, on push la grille du code (init seulement).
// ⚠ La grille Supabase est désormais la SOURCE DE VÉRITÉ (depuis que Maram édite)
// → on ne force PLUS la migration vers la version code, sinon ses modifs sont écrasées.
// Le code reste juste un fallback initial si la table grille_config est vide.
async function pullGrilleFromSupa() {
  if (!supa) return null;
  try {
    const { data, error } = await supa.from('grille_config').select('*').eq('id', 'active').maybeSingle();
    if (error) { console.warn('Grille pull:', error); return null; }
    if (!data || !data.sections) {
      // Première fois : on initialise la table avec la grille par défaut du code
      await pushGrilleToSupa('init');
      return null;
    }
    // ⚠ V2 (migration) : si la version en base diffère de celle du code, le CODE
    // devient la source de vérité. On réécrit la grille Supabase avec la nouvelle
    // structure (refonte V2) et on l'utilise telle quelle. Indispensable pour que
    // la refonte structurelle (nouvel ordre, partie 0, types modifiés, etc.)
    // s'applique partout sans rester bloquée par l'ancienne grille en base.
    if (data.version !== GRID_VERSION) {
      console.info(`Grille Supabase (${data.version}) ≠ code (${GRID_VERSION}) - migration : réécriture avec la grille V2`);
      await pushGrilleToSupa('migration-v2');
      return SECTIONS; // SECTIONS = grille du code (V2), déjà en mémoire
    }
    SECTIONS = hydrateSections(data.sections);
    return SECTIONS;
  } catch (e) { console.warn('Grille pull failed:', e); return null; }
}

// Realtime sync - quand quelqu'un d'autre modifie la grille
function setupGrilleRealtime(onChange) {
  if (!supa) return () => {};
  try {
    const channel = supa.channel('grille_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'grille_config' }, async () => {
        const fresh = await pullGrilleFromSupa();
        if (fresh) onChange(fresh);
      })
      .subscribe();
    return () => { try { supa.removeChannel(channel); } catch (e) {} };
  } catch (e) { console.warn('Grille realtime failed:', e); return () => {}; }
}

   HELPERS
   ============================================================ */
/* fillableCriteria - exclut text + subhead (séparateurs visuels) */
const fillableCriteria = (s) => (s.criteria || []).filter((c) => c.type !== 'text' && c.type !== 'subhead' && c.type !== 'note_photo');
/* Get the actual "val" of a criterion, handling 4 shapes:
   - primitive : data[id] = 'yes' | 0.5 | 12 | 'Quai haut'
   - array (multi-select) : data[id] = ['choix_a', 'choix_b']
   - composite pn/pne : data[id] = { presence, nb, etat, note?, photos? }
   - wrapper avec extras : data[id] = { val: <primitive|array>, note, photos } */
const getVal = (raw) => {
  if (raw == null) return undefined;
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'object') {
    // Composite pn/pne : retourne l'objet entier
    if ('presence' in raw) return raw;
    // Wrapper avec val
    if ('val' in raw) return raw.val;
    // Objet inconnu
    return raw;
  }
  return raw;
};
const getNote = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw.note || '') : '';
const getPhotos = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw.photos || []) : [];
// Tracking par critère : qui a modifié en dernier, à quel moment
const getEditor = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw._by || '') : '';
const getEditedAt = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw._at || null) : null;

const isFilled = (c, raw) => {
  // Cas spécial : N/A (non applicable / ne sait pas) compte comme rempli
  if (raw && typeof raw === 'object' && raw.na === true) return true;
  const v = getVal(raw);
  if (v === undefined || v === null || v === '') return false;
  // Multi-select : rempli si ≥ 1 élément
  if (Array.isArray(v)) return v.length > 0;
  // Composite pn/pne : rempli si presence est posée
  if (typeof v === 'object' && v !== null) {
    if ('presence' in v) return v.presence === 'yes' || v.presence === 'no';
    if ('val' in v) return v.val !== undefined && v.val !== null && v.val !== '';
  }
  return true;
};
const sectionStats = (s, data) => {
  let items = fillableCriteria(s);
  // Corps replié (élément absent) : seuls les critères déclencheurs comptent
  if (s.collapseBodyIf && s.collapseBodyIf(null, data)) {
    items = items.filter((c) => c.trigger);
  }
  const filled = items.filter((c) => isFilled(c, data?.[c.id])).length;
  return { filled, total: items.length };
};
const visiteStats = (gare, data) => {
  let f = 0,t = 0;
  SECTIONS.forEach((s) => {
    if (s.bureau) return; // section bureau (données documentaires) : hors complétion terrain
    if (s.skipIf && s.skipIf(gare, data)) return;
    const st = sectionStats(s, data);
    f += st.filled;t += st.total;
  });
  return { filled: f, total: t, pct: t === 0 ? 0 : Math.round(f / t * 100) };
};
const fmtAgo = (ts) => {
  if (ts == null) return '';
  // Accepte timestamp number OU string ISO ("2026-05-20T...")
  const tsNum = typeof ts === 'number' ? ts : new Date(ts).getTime();
  if (!tsNum || isNaN(tsNum)) return '';
  const m = Math.floor((Date.now() - tsNum) / 60000);
  if (isNaN(m) || m < 0) return '';
  if (m < 1) return 'à l\'instant';
  if (m < 60) return `il y a ${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h / 24)} j`;
};

/* Compteur animé — count-up à l'ouverture seulement (puis suit la valeur live) */
function useCountUp(target, ms = 850) {
  const [n, setN] = useState(0);
  const done = useRef(false);
  useEffect(() => {
    if (done.current) { setN(target); return; }
    let raf, t0;
    const step = (t) => {
      if (!t0) t0 = t;
      const p = Math.min(1, (t - t0) / ms);
      setN(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step); else done.current = true;
    };
    raf = requestAnimationFrame(step);
    // Filet de sécurité : garantit la valeur finale même si rAF est throttlé
    const safety = setTimeout(() => { setN(target); done.current = true; }, ms + 350);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target]);
  return n;
}

            <span className="tabular" style={{ fontSize:12, color:'var(--ink-soft)', fontWeight:600 }}>

              <span style={{ color:'var(--taupe)' }}> · {pctNum}%</span>

        <button onClick={onPick} className="serm-cta" style={{

          onMouseUp={(e)=>{ e.currentTarget.style.transform='translateY(0)'; }}
          onMouseLeave={(e)=>{ e.currentTarget.style.transform='translateY(0)'; }}>
          {/* shimmer band */}
          <span aria-hidden style={{
            position:'absolute', top:0, bottom:0, width:'40%', left:'-50%',

          <span style={{ display:'flex', alignItems:'center', gap: 14, position:'relative' }}>
            <span style={{ width: 32, height: 32, borderRadius:'50%',

          }

        `}</style>
      </div>
    </div>
  );
}

                  flexShrink: 0, width: 40, borderLeft: '1px solid var(--border-soft)',

                  display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>🗑</button>}

          })}

        {/* (footer retiré - épurer encore plus) */}
        </div>
      </div>
    </div>);

}

/* ============================================================
   GARE PICKER
   ============================================================ */
function PickerScreen({ all, onPick, onBack }) {
  const [q, setQ] = useState('');
  const [secteur, setSecteur] = useState(''); // filtre secteur actif ('' = tous)
  const visited = new Set(Object.keys(all));
  // Secteurs distincts (hors gares de test), triés
  const secteurs = useMemo(
    () => [...new Set(GARES.filter(g => g.secteur && g.secteur !== 'Test').map(g => g.secteur))].sort((a, b) => a.localeCompare(b, 'fr')),
    []
  );
  const ql = q.trim().toLowerCase();
  const filtered = GARES.filter((g) => {
    if (secteur && g.secteur !== secteur) return false;
    if (!ql) return true;
    // Recherche multi-champs : nom, secteur, ligne, axe, typologies
    return [g.nom, g.secteur, g.ligne_flux, g.axe, g.cat_pro, g.cat_sgp]
      .filter(Boolean)
      .some((f) => String(f).toLowerCase().includes(ql));
  });
  return (
    <div style={{ height: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', overflow: 'hidden' }}>
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '14px 20px',
        display: 'flex', alignItems: 'center', gap: 14 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 14 }}>← Retour</button>
        <div className="kicker" style={{ fontSize: 10.5, letterSpacing: '0.18em' }}>Choisir une gare</div>
      </div>
      <div style={{ padding: '18px 20px 8px' }}>
        <input autoFocus type="search" value={q} onChange={(e) => setQ(e.target.value)}
        placeholder="Rechercher : nom, secteur, ligne, axe…" style={{
          width: '100%', padding: '13px 16px', fontSize: 15,
          background: 'var(--white)', border: '1.5px solid var(--border)', borderRadius: 2,
          outline: 'none', fontFamily: 'inherit'
        }} />
        {/* Filtres rapides par secteur */}
        <div style={{ display: 'flex', gap: 6, marginTop: 10, overflowX: 'auto', WebkitOverflowScrolling: 'touch', paddingBottom: 2 }}>
          <button onClick={() => setSecteur('')} style={{
            flexShrink: 0, padding: '5px 11px', fontSize: 11, fontWeight: 600, borderRadius: 99,
            border: `1px solid ${secteur === '' ? 'var(--ink)' : 'var(--border)'}`,
            background: secteur === '' ? 'var(--ink)' : 'var(--white)',
            color: secteur === '' ? 'var(--paper-light)' : 'var(--ink-soft)',
            letterSpacing: '0.02em', whiteSpace: 'nowrap'
          }}>Tous</button>
          {secteurs.map((s) => (
            <button key={s} onClick={() => setSecteur(secteur === s ? '' : s)} style={{
              flexShrink: 0, padding: '5px 11px', fontSize: 11, fontWeight: 600, borderRadius: 99,
              border: `1px solid ${secteur === s ? 'var(--red)' : 'var(--border)'}`,
              background: secteur === s ? 'var(--red)' : 'var(--white)',
              color: secteur === s ? 'var(--paper-light)' : 'var(--ink-soft)',
              letterSpacing: '0.02em', whiteSpace: 'nowrap'
            }}>{s}</button>
          ))}
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10, fontSize: 11, color: 'var(--taupe)' }}>
          <span>{filtered.length} gare{filtered.length > 1 ? 's' : ''}{secteur ? ` · ${secteur}` : ''}</span>
          <span><span style={{ color: 'var(--green)' }}>●</span> {visited.size} déjà visitée{visited.size > 1 ? 's' : ''}</span>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 16px 24px' }}>
        {filtered.length === 0 ?
        <div style={{ border: '1px dashed var(--border)', padding: '24px 16px', textAlign: 'center',
          background: 'var(--paper)', color: 'var(--taupe)', fontSize: 12.5, fontStyle: 'italic' }}>
          Aucune gare ne correspond.<br/>
          <span style={{ fontStyle: 'normal', fontSize: 11 }}>Essaie un autre terme ou retire le filtre secteur.</span>
        </div> :
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)' }}>
          {filtered.map((g, i) => {
            const done = visited.has(g.nom);
            return (
              <button key={g.nom} onClick={() => onPick(g.nom)} style={{
                width: '100%', padding: '13px 16px',
                borderBottom: i === filtered.length - 1 ? 'none' : '1px solid var(--border-soft)',
                textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10
              }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 500 }}>{g.nom}</div>
                  <div style={{ fontSize: 10, color: 'var(--taupe)', letterSpacing: '0.06em',
                    textTransform: 'uppercase', marginTop: 3 }}>
                    {g.ligne_flux} · {g.secteur} · {g.cat_sgp && <span style={{ color: 'var(--ink-soft)', fontStyle: 'normal' }}>{g.cat_sgp}</span>}
                  </div>
                </div>
                {done && <span style={{ color: 'var(--green)', fontSize: 18 }}>✓</span>}
              </button>);

          })}
        </div>
        }
      </div>
    </div>);

}

/* ============================================================
   SYNTH SCREEN - tableau comparatif multi-gares (vue décideurs)
   ============================================================ */
function SynthScreen({ all, onBack }) {
  const [sortKey, setSortKey] = useState('priorite');
  const [sortDir, setSortDir] = useState('asc');

  const RATING_META = {
    priorite: { id: 'priorite_terrain', labels: ['Critique', 'Élevée', 'Modérée', 'Faible'], short: 'Priorité' },
    vetuste: { id: 'synth_vetuste', labels: ['Très dégradée', 'Dégradée', 'Correcte', 'Bonne'], short: 'Vétusté' },
    securite: { id: 'sens_securite', labels: ['Anxiogène', 'Mitigé', 'Plutôt rassurant', 'Rassurant'], short: 'Sécurité' },
    ambiance: { id: 'sens_ambiance', labels: ['Hostile', 'Quelconque', 'Agréable', 'Très agréable'], short: 'Ambiance' }
  };
  // idx 0 = pire (rouge) -> idx 3 = meilleur (vert)
  const COLORS = ['#C8102E', '#E07A1F', '#C9A227', '#1D5E3A'];

  const getRating = (data, id, labels) => {
    const raw = data?.[id];
    const v = raw && typeof raw === 'object' ? raw.val : raw;
    if (typeof v !== 'number') return null;
    const idx = Math.round(v * (labels.length - 1));
    return { idx, label: labels[idx], color: COLORS[idx] };
  };
  const getYes = (data, id) => {
    const raw = data?.[id];
    const v = raw && typeof raw === 'object' ? raw.val : raw;
    return v === 'yes';
  };

  const rows = Object.values(all).map((v) => {
    const g = GARES.find((x) => x.nom === v.gare);
    if (!g) return null;
    const stats = visiteStats(g, v.data);
    return {
      gare: v.gare, secteur: g.secteur, ligne: g.ligne_flux, auteur: v.auteur, pct: stats.pct,
      priorite: getRating(v.data, RATING_META.priorite.id, RATING_META.priorite.labels),
      vetuste: getRating(v.data, RATING_META.vetuste.id, RATING_META.vetuste.labels),
      securite: getRating(v.data, RATING_META.securite.id, RATING_META.securite.labels),
      ambiance: getRating(v.data, RATING_META.ambiance.id, RATING_META.ambiance.labels),
      alerteSecu: getYes(v.data, 'alerte_secu'),
      alerteSatu: getYes(v.data, 'alerte_saturation')
    };
  }).filter(Boolean);

  const sorted = [...rows].sort((a, b) => {
    if (sortKey === 'gare') return sortDir === 'asc' ? a.gare.localeCompare(b.gare, 'fr') : b.gare.localeCompare(a.gare, 'fr');
    let av, bv;
    if (sortKey === 'pct') { av = a.pct; bv = b.pct; }
    else { av = a[sortKey]?.idx ?? 99; bv = b[sortKey]?.idx ?? 99; }
    return sortDir === 'asc' ? av - bv : bv - av;
  });

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir((d) => (d === 'asc' ? 'desc' : 'asc'));
    else { setSortKey(key); setSortDir('asc'); }
  };

  const Cell = ({ r }) => r
    ? <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11 }}>
        <span style={{ width: 9, height: 9, borderRadius: '50%', background: r.color, flexShrink: 0 }} />
        <span style={{ color: 'var(--ink-soft)', whiteSpace: 'nowrap' }}>{r.label}</span>
      </span>
    : <span style={{ color: 'var(--taupe-light)', fontSize: 11 }}>-</span>;

  const Th = ({ k, children, w }) => (
    <th onClick={() => toggleSort(k)} style={{
      padding: '8px 10px', textAlign: 'left', fontSize: 9.5, fontWeight: 700,
      letterSpacing: '0.06em', textTransform: 'uppercase', color: sortKey === k ? 'var(--red)' : 'var(--taupe)',
      cursor: 'pointer', whiteSpace: 'nowrap', borderBottom: '2px solid var(--border)', minWidth: w
    }}>{children}{sortKey === k ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ''}</th>
  );

  return (
    <div style={{ height: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', overflow: 'hidden' }}>
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '14px 20px',
        display: 'flex', alignItems: 'center', gap: 14 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 14 }}>← Retour</button>
        <div className="kicker" style={{ fontSize: 10.5, letterSpacing: '0.18em' }}>Synthèse comparative</div>
      </div>

      <div style={{ padding: '16px 20px 8px' }}>
        <h2 style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.015em', marginBottom: 4 }}>Vue d'ensemble des gares</h2>
        <p style={{ fontSize: 11.5, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
          {rows.length} gare{rows.length > 1 ? 's' : ''} relevée{rows.length > 1 ? 's' : ''}. Touche un en-tête de colonne pour trier.
          Tri par défaut : priorité d'intervention (les plus urgentes en haut).
        </p>
        {/* Légende couleurs */}
        <div style={{ display: 'flex', gap: 12, marginTop: 8, flexWrap: 'wrap', fontSize: 10, color: 'var(--taupe)' }}>
          {[['#C8102E', 'Critique / dégradé'], ['#E07A1F', 'Préoccupant'], ['#C9A227', 'Correct'], ['#1D5E3A', 'Bon / rassurant']].map(([c, l]) => (
            <span key={l} style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 9, height: 9, borderRadius: '50%', background: c }} />{l}
            </span>
          ))}
        </div>
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: '4px 12px 24px' }}>
        {rows.length === 0 ?
        <div style={{ border: '1px dashed var(--border)', padding: '28px 16px', textAlign: 'center',
          background: 'var(--paper)', color: 'var(--taupe)', fontSize: 12.5, fontStyle: 'italic' }}>
          Aucune gare relevée pour l'instant.
        </div> :
        <table style={{ borderCollapse: 'collapse', width: '100%', background: 'var(--white)', border: '1px solid var(--border)' }}>
          <thead>
            <tr>
              <Th k="gare" w={140}>Gare</Th>
              <Th k="priorite" w={110}>Priorité</Th>
              <Th k="vetuste" w={120}>Vétusté</Th>
              <Th k="securite" w={130}>Sécurité</Th>
              <Th k="ambiance" w={120}>Ambiance</Th>
              <th style={{ padding: '8px 10px', textAlign: 'left', fontSize: 9.5, fontWeight: 700,
                letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--taupe)',
                whiteSpace: 'nowrap', borderBottom: '2px solid var(--border)' }}>Alertes</th>
              <Th k="pct" w={70}>Complét.</Th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((row, i) => (
              <tr key={row.gare} style={{ borderBottom: '1px solid var(--border-soft)',
                background: i % 2 ? 'var(--paper-light)' : 'var(--white)' }}>
                <td style={{ padding: '9px 10px', minWidth: 140 }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink)' }}>{row.gare}</div>
                  <div style={{ fontSize: 9, color: 'var(--taupe)', textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: 1 }}>{row.ligne} · {row.secteur}</div>
                </td>
                <td style={{ padding: '9px 10px' }}><Cell r={row.priorite} /></td>
                <td style={{ padding: '9px 10px' }}><Cell r={row.vetuste} /></td>
                <td style={{ padding: '9px 10px' }}><Cell r={row.securite} /></td>
                <td style={{ padding: '9px 10px' }}><Cell r={row.ambiance} /></td>
                <td style={{ padding: '9px 10px', whiteSpace: 'nowrap' }}>
                  {row.alerteSecu && <span title="Alerte sécurité" style={{ fontSize: 10.5, color: 'var(--red)', fontWeight: 700, marginRight: 6 }}>⚠ Sécu</span>}
                  {row.alerteSatu && <span title="Alerte saturation" style={{ fontSize: 10.5, color: 'var(--amber)', fontWeight: 700 }}>⚠ Satu</span>}
                  {!row.alerteSecu && !row.alerteSatu && <span style={{ color: 'var(--taupe-light)', fontSize: 11 }}>-</span>}
                </td>
                <td style={{ padding: '9px 10px' }}>
                  <span className="tabular" style={{ fontSize: 12, fontWeight: 700,
                    color: row.pct === 100 ? 'var(--green)' : row.pct > 0 ? 'var(--ink-soft)' : 'var(--taupe-light)' }}>{row.pct}%</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        }
      </div>
    </div>);

}

/* ============================================================
   FORM SCREEN - plan-first hybrid
   ============================================================ */

function FormScreen({ gare, visite, onUpdate, onBack, onOverview, onToast, onRefresh, syncing,
                      readOnly, gridRev }) {
  const sections = useMemo(
    () => SECTIONS.filter((s) => !s.skipIf || !s.skipIf(gare, visite.data)),
    // gridRev force le recalcul quand la grille est modifiée
    [gare, visite.data, gridRev]
  );
  // On démarre sur la 1re section de terrain (pas la section Bureau, qui se remplit hors visite)
  const firstFieldId = (sections.find((s) => !s.bureau) || sections[0]).id;
  const [activeId, setActiveId] = useState(firstFieldId);
  // ID du critère actif (déplié). Les autres critères répondus sont repliés.
  const [activeCritId, setActiveCritId] = useState(null);
  // Reset l'actif quand on change d'onglet
  useEffect(() => { setActiveCritId(null); }, [activeId]);
  // If the active section becomes hidden (e.g. user marked BV as Absent), fall back to first field section
  useEffect(() => {
    if (!sections.find((s) => s.id === activeId)) {
      setActiveId((sections.find((s) => !s.bureau) || sections[0])?.id);
    }
  }, [sections, activeId]);
  const stats = visiteStats(gare, visite.data);
  const activeSection = sections.find((s) => s.id === activeId) || sections[0];
  const activeIdx = sections.findIndex((s) => s.id === (activeSection?.id));
  const sStats = activeSection ? sectionStats(activeSection, visite.data) : { filled: 0, total: 0 };

  /* Update val while preserving note/photos if present.
     val peut être : primitive (string/number/boolean), array (multi-select), objet composite (pn/pne) */
  // Helper : ajoute _by (auteur actuel) et _at (timestamp now) à la valeur stockée.
  // Convertit val en objet si nécessaire pour pouvoir y mettre les meta.
  const stampMeta = (val) => {
    const me = localStorage.getItem('serm-auteur') || 'Anonyme';
    const at = Date.now();
    // Composite (pn/pne) avec presence → on enrobe quand même
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      return { ...val, _by: me, _at: at };
    }
    // Primitive ou array : wrapping
    return { val, _by: me, _at: at };
  };

  const setVal = (cid, val) => {
    const cur = visite.data[cid];
    const hasExtras = cur && typeof cur === 'object' && !Array.isArray(cur)
      && (cur.note || (cur.photos && cur.photos.length));
    let next;
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      // Composite (pn/pne) : flat-merge avec extras existants
      next = hasExtras
        ? { ...val, note: cur.note || '', photos: cur.photos || [] }
        : val;
    } else if (hasExtras) {
      // Primitive/array : préserver note/photos via { val, note, photos }
      next = { ...cur, val };
    } else {
      next = val;
    }
    // Toute vraie valeur retire le flag N/A
    if (next && typeof next === 'object' && !Array.isArray(next)) delete next.na;
    next = stampMeta(next);
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  const clearVal = (cid) => {
    const d = { ...visite.data };delete d[cid];
    onUpdate({ ...visite, data: d, updated: Date.now() });
  };
  /* Marque le critère comme N/A (Non Applicable / Ne Sait Pas)
     → compte comme rempli dans la complétion, mais sans valeur */
  const setNA = (cid) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : {};
    const next = stampMeta({ ...obj, na: true });
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  /* Update note (always promotes data[id] to object form) */
  const setNote = (cid, note) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : { val: cur };
    const next = stampMeta({ ...obj, note });
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  const setPhotos = (cid, photos) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : { val: cur };
    const next = stampMeta({ ...obj, photos });
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };

  // Auto-advance helper
  const goToNext = () => {
    if (activeIdx < sections.length - 1) {
      setActiveId(sections[activeIdx + 1].id);
      // scroll panel to top
      const panel = document.getElementById('panel-scroll');
      if (panel) panel.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
  const goToPrev = () => {
    if (activeIdx > 0) {
      setActiveId(sections[activeIdx - 1].id);
      const panel = document.getElementById('panel-scroll');
      if (panel) panel.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // Swipe support
  const touchRef = useRef({ x: 0, active: false });
  const onTouchStart = (e) => {touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, active: true };};
  const onTouchEnd = (e) => {
    if (!touchRef.current.active) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = Math.abs(e.changedTouches[0].clientY - touchRef.current.y);
    if (Math.abs(dx) > 60 && dy < 50) {
      if (dx < 0) goToNext();else goToPrev();
    }
    touchRef.current.active = false;
  };

  const hasBV = !sections.find((s) => s.id === 'bv') ? false : true;
  const hasFranch = !sections.find((s) => s.id === 'franch') ? false : true;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      {/* BANDEAU MODE CONSULTATION */}
      {readOnly &&
      <div style={{
        background: 'var(--bureau)', color: 'var(--paper-light)',
        padding: '6px 14px', fontSize: 11, fontWeight: 600,
        letterSpacing: '0.05em', textAlign: 'center', flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
      }}>
        <span>👁</span><span>Mode consultation - modifications désactivées</span>
      </div>
      }
      {/* TOP BAR */}
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '12px 18px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0, gap: 8 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}>
          ← <span className="kicker" style={{ fontSize: 10 }}>Carnet</span>
        </button>
        <div style={{ display: 'flex', gap: 6 }}>
          {onRefresh &&
          <button onClick={onRefresh} disabled={syncing} title="Actualiser depuis le serveur"
            aria-label="Actualiser"
            style={{
              color: 'var(--paper)', padding: '5px 9px',
              border: '1px solid rgba(245,242,235,0.2)', borderRadius: 2,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              opacity: syncing ? 0.55 : 1,
              cursor: syncing ? 'wait' : 'pointer'
            }}>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"
              style={{ animation: syncing ? 'sermSpin 0.9s linear infinite' : 'none' }}>
              <path d="M13.5 2.5v3h-3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
              <path d="M2.5 13.5v-3h3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
              <path d="M12.5 5.5A5 5 0 0 0 3.7 7M3.5 10.5A5 5 0 0 0 12.3 9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
          }
          <button onClick={onOverview} style={{ color: 'var(--paper)', fontSize: 11, padding: '5px 10px',
            border: '1px solid rgba(245,242,235,0.2)', borderRadius: 2,
            display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1" />
                <circle cx="6" cy="6" r="1.5" fill="currentColor" />
              </svg>
              Vue d'ensemble
            </span>
          </button>
        </div>
      </div>

      {/* GARE HEADING + PLAN */}
      <div style={{ background: 'var(--paper-light)', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ padding: '14px 18px 6px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="kicker" style={{ color: 'var(--red)', fontSize: 9.5, marginBottom: 4 }}>
              {gare.cat_sgp} · {gare.ligne_flux}
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.025em', lineHeight: 1.05 }}>{gare.nom}</h2>
            <div style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 3, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
              UIC {gare.uic} · {gare.secteur}
            </div>
            {/* Typologie morphologique - déduite du plan de voies, pour le rendu iso */}
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 7,
              padding: '3px 8px', background: 'var(--paper-deep)',
              border: '1px solid var(--border)', borderRadius: 2,
              fontSize: 10, color: 'var(--ink-soft)', fontWeight: 500, letterSpacing: '0.02em'
            }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--ink-soft)' }} />
              {gare.cat_sgp || gare.cat_pro || '-'}
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flexShrink: 0 }}>
            <ProgressRing pct={stats.pct} size={48} />
            {visite.updated > 0 &&
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4,
              fontSize: 9, fontWeight: 600, letterSpacing: '0.04em',
              color: 'var(--green-soft)', whiteSpace: 'nowrap' }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--green-soft)' }} />
              Enregistré
            </span>
            }
          </div>
        </div>
      </div>

      {/* SECTION PANEL - full focus
          Tout ce qui suit scroll, sauf la BARRE TITRE qui est sticky top:0 */}
      <div id="panel-scroll" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{ flex: 1, overflowY: 'auto',
        background: activeSection.bureau ? '#F5F7F9' : 'var(--white)',
        minHeight: 0,
        transition: 'background 0.2s, box-shadow 0.2s'
      }}>

        {/* ENCART CONTEXTE VISITE - scroll avec le contenu */}
        {!readOnly &&
        <div style={{ padding: '0 14px 12px', display: 'flex', gap: 8, flexWrap: 'wrap',
          background: 'var(--paper-light)' }}>
          <label style={{ flex: '1 1 140px', display: 'flex', flexDirection: 'column', gap: 3, minWidth: 0 }}>
            <span style={{ fontSize: 9.5, fontWeight: 600, color: 'var(--taupe)',
              textTransform: 'uppercase', letterSpacing: '0.08em' }}>📅 Date de visite</span>
            <input type="date" value={visite.data?.visite_date || ''}
              onChange={(e) => setVal('visite_date', e.target.value)}
              style={{
                padding: '7px 10px', fontSize: 13, fontFamily: 'inherit',
                border: '1.5px solid var(--border)', borderRadius: 2,
                background: 'var(--white)', outline: 'none'
              }} />
          </label>
        </div>
        }

        {/* SECTION CHIPS - défilement horizontal, mini-progression par onglet */}
        <div style={{ position: 'relative', background: 'var(--paper-light)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ display: 'flex', gap: 8, padding: '4px 14px 12px', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
          {sections.map((s) => {
            const st = sectionStats(s, visite.data);
            const done = st.filled === st.total && st.total > 0;
            const partial = st.filled > 0 && !done;
            const active = s.id === activeId;
            const pct = st.total ? Math.round(st.filled / st.total * 100) : 0;
            return (
              <div key={s.id} style={{ display: 'flex', flexDirection: 'column', gap: 4, flexShrink: 0 }}>
              <button onClick={() => setActiveId(s.id)} style={{
                display: 'inline-flex', alignItems: 'center', gap: 6,
                padding: '7px 12px', borderRadius: 99,
                background: active ? 'var(--red)' : s.bureau ? 'var(--bureau-bg)' : 'var(--white)',
                color: active ? 'var(--paper-light)' : done ? 'var(--green)' : 'var(--ink-soft)',
                border: `1.5px solid ${active ? 'var(--red)' : done ? 'var(--green-soft)' : 'var(--border)'}`,
                fontSize: 11.5, fontWeight: active ? 700 : 500, whiteSpace: 'nowrap',
                boxShadow: active ? '0 3px 10px -3px var(--red)' : 'none',
                transform: active ? 'translateY(-1px)' : 'none'
              }}>
                <span className="tabular" style={{
                  width: 16, height: 16, borderRadius: '50%',
                  background: active ? 'var(--paper-light)' : done ? 'var(--green)' : 'var(--paper-deep)',
                  color: active ? 'var(--red)' : done ? 'var(--paper-light)' : 'var(--taupe)',
                  fontSize: 9.5, fontWeight: 700, display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
                }}>{done ? '✓' : s.n}</span>
                {s.short}
                {partial &&
                <span className="tabular" style={{ fontSize: 9.5, opacity: 0.85,
                  color: active ? 'var(--paper-light)' : 'var(--taupe)' }}>{st.filled}/{st.total}</span>
                }
              </button>
              {st.total > 0 &&
              <div style={{ height: 2.5, borderRadius: 2, background: 'var(--paper-deep)', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: pct + '%',
                  background: done ? 'var(--green)' : 'var(--red)',
                  transition: 'width .45s cubic-bezier(.4,0,.2,1)' }} />
              </div>
              }
              </div>);
          })}
          </div>
          {/* indice de défilement : dégradé à droite */}
          <div aria-hidden style={{ position: 'absolute', top: 0, right: 0, bottom: 1, width: 28,
            pointerEvents: 'none', background: 'linear-gradient(90deg, transparent, var(--paper-light))' }} />
        </div>

        {/* BARRE TITRE ONGLET - STICKY top:0, reste fixe quand on scroll dans la section */}
        <div style={{
          position: 'sticky', top: 0, zIndex: 5,
          background: activeSection.bureau ? '#F5F7F9' : 'var(--white)',
          borderTop: '1px solid var(--border)',
          borderBottom: 'none',
          padding: '10px 18px 12px',
          display: 'flex', alignItems: 'center', gap: 12
        }}>
          <div className="tabular" style={{
            fontSize: 24, fontWeight: 700, lineHeight: 0.9,
            color: activeSection.bureau ? 'var(--bureau)' : 'var(--red)',
            fontFamily: 'var(--font-display)', letterSpacing: '-0.04em', flexShrink: 0
          }}>{String(Math.floor(activeSection.n)).padStart(2, '0')}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h3 style={{ fontSize: 14.5, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.015em',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{activeSection.title}</h3>
            <div style={{ fontSize: 10, color: 'var(--taupe)', marginTop: 1,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{activeSection.subtitle}</div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <div className="tabular" style={{ fontSize: 13, fontWeight: 700,
              color: sStats.filled === sStats.total && sStats.total > 0 ? 'var(--green)' : 'var(--ink)' }}>
              {sStats.filled}<span style={{ color: 'var(--taupe-light)', fontWeight: 500 }}>/{sStats.total}</span>
            </div>
            <div style={{ fontSize: 8.5, color: 'var(--taupe)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>relevés</div>
          </div>
          {/* Barre de progression de section — repère d'avancement, fluide */}
          {(() => {
            const sPct = sStats.total ? Math.round(sStats.filled / sStats.total * 100) : 0;
            return (
              <div className="gareo-secbar" style={{
                position: 'absolute', left: 0, right: 0, bottom: 0, height: 3,
                background: 'var(--paper-deep)'
              }}>
                <i style={{ width: sPct + '%',
                  background: sPct === 100 ? 'var(--green)' : 'var(--red)' }} />
              </div>
            );
          })()}
        </div>
        <div style={{ padding: '18px 18px 100px' }}>
          {activeSection.fluxLocked &&
          <div style={{
            background: 'var(--bureau)', color: 'var(--paper-light)',
            padding: '12px 14px', fontSize: 12, marginBottom: 16, borderRadius: 2,
            lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 10
          }}>
            <span style={{ fontSize: 16, lineHeight: 1, marginTop: 1 }}>🔒</span>
            <div>
              <strong>Section verrouillée</strong> - données alimentées automatiquement depuis la base Flux.
            </div>
          </div>
          }
          {activeSection.bureau && !activeSection.fluxLocked &&
          <div style={{ background: 'var(--bureau)', color: 'var(--paper-light)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, borderRadius: 2, lineHeight: 1.4 }}>
              <strong>À remplir au bureau</strong> - données SIG / desk research, pas pendant la visite.
            </div>
          }
          {activeSection.synth &&
          <div style={{ background: 'var(--red-tint)', borderLeft: '3px solid var(--red)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink)', lineHeight: 1.4 }}>
              <strong>Synthèse - à remplir à plusieurs en fin de visite.</strong> C'est ici qu'on tranche
              les éléments clivants. Cette section est la base de lecture pour les décideurs.
            </div>
          }
          {activeSection.id === 'pmr' &&
          <div style={{ background: 'var(--paper)', borderLeft: '3px solid var(--ink)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
              <strong>Accessibilité PSH (en cours)</strong> - relevé des dispositifs pour
              tous les types de handicap : moteur, visuel, auditif, intellectuel/psychique.
            </div>
          }
          {activeSection.id === 'parking2' &&
          <div style={{ background: 'var(--amber-tint)', borderLeft: '3px solid var(--amber)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
              <strong>2e parking détecté</strong> - tu as indiqué plusieurs parkings dans la section Parking.
              Renseigne ici les caractéristiques propres au second.
            </div>
          }
          {/* trait séparateur retiré : le header sticky a sa propre borderBottom */}

          {/* Bouton next-section compact en haut - pour ne pas avoir à scroller */}
          {activeIdx < sections.length - 1 &&
          <button onClick={goToNext} style={{
            width: '100%', padding: '8px 12px', marginBottom: 16,
            background: 'transparent', border: '1px dashed var(--border)', borderRadius: 2,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            fontSize: 11.5, color: 'var(--taupe)', letterSpacing: '0.02em'
          }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 9.5, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Sauter à</span>
              <span style={{ color: 'var(--ink)', fontWeight: 500 }}>{sections[activeIdx + 1]?.short}</span>
            </span>
            <span style={{ color: 'var(--ink)' }}>→</span>
          </button>
          }

          {/* CRITERIA */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {(() => {
              const bodyCollapsed = activeSection.collapseBodyIf && activeSection.collapseBodyIf(gare, visite.data);
              const crits = bodyCollapsed ? activeSection.criteria.filter((c) => c.trigger) : activeSection.criteria;
              return <>
                {crits.map((c) =>
                <div key={c.id}>
                  <Criterion c={c} raw={visite.data[c.id]}
                    gareName={gare.nom}
                    locked={activeSection.fluxLocked || readOnly}
                    onSetVal={(v) => setVal(c.id, v)}
                    onSetNote={(n) => setNote(c.id, n)}
                    onSetPhotos={(p) => setPhotos(c.id, p)}
                    onClear={() => clearVal(c.id)}
                    onSetNA={() => setNA(c.id)}
                    isActive={activeCritId === c.id}
                    onActivate={() => setActiveCritId(c.id)}
                    onToast={onToast} />
                </div>
                )}
                {bodyCollapsed &&
                <div style={{ background: 'var(--paper-deep)', border: '1px dashed var(--border)', borderRadius: 4,
                  padding: '16px 18px', fontSize: 12.5, color: 'var(--taupe)', lineHeight: 1.5, textAlign: 'center' }}>
                  Élément indiqué comme <strong>absent</strong> ci-dessus : le reste de cette section n'est pas à remplir.<br/>
                  <span style={{ fontSize: 11.5 }}>Modifie le choix du haut si tu veux faire réapparaître les questions.</span>
                </div>
                }
              </>;
            })()}
          </div>

          {/* FOOTER NAV inside panel */}
          <div style={{ marginTop: 30, padding: '18px 0 0', borderTop: '1px dashed var(--border)' }}>
            {sStats.filled === sStats.total && sStats.total > 0 &&
            <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
                <Stamp color="var(--green)">section complète</Stamp>
