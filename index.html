/* ============================================================
   APP
   ============================================================ */
function App() {
  // ===== VERROUILLAGE PAR MOT DE PASSE =====
  // Hash SHA-256 du mot de passe actuel. Pour changer le mdp :
  // 1) Choisis ton nouveau mdp
  // 2) Calcule son SHA-256 (ex: en bash → echo -n "tonmdp" | sha256sum)
  // 3) Remplace la valeur de PASSWORD_HASH ci-dessous
  // 4) Tous les utilisateurs devront retaper le nouveau mdp
  //
  // Mot de passe actuel : "serm2026"
  const PASSWORD_HASH = '00747ba10d726dd36a34abd14b331242cfa269471106365a03a176ff98363a86';
  const UNLOCK_KEY = 'serm-hdf:unlocked-v1';

  const [isUnlocked, setIsUnlocked] = useState(() => {
    try { return localStorage.getItem(UNLOCK_KEY) === PASSWORD_HASH; }
    catch (e) { return false; }
  });
  const [pwdInput, setPwdInput] = useState('');
  const [pwdError, setPwdError] = useState(false);

  const tryUnlock = async () => {
    try {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwdInput));
      const hash = Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(UNLOCK_KEY, hash);
        setIsUnlocked(true);
        setPwdError(false);
      } else {
        setPwdError(true);
        setPwdInput('');
      }
    } catch (e) {
      setPwdError(true);
    }
  };
  // (L'écran de verrouillage est rendu plus bas, après TOUS les hooks d'App,
  //  pour respecter les règles des hooks React.)

  // Mode lecture seule activé via ?readonly=1 ou ?ro=1 dans l'URL
  // → désactive toutes les modifications, masque les boutons d'action
  const readOnly = useMemo(() => {
    try {
      const p = new URLSearchParams(window.location.search);
      return p.get('readonly') === '1' || p.get('ro') === '1';
    } catch (e) { return false; }
  }, []);

  // État réseau (online/offline) + queue d'upload photos
  const [isOnline, setIsOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  const [retryingPhotos, setRetryingPhotos] = useState(null); // { done, total } | null

  useEffect(() => {
    const onOnline = () => setIsOnline(true);
    const onOffline = () => setIsOnline(false);
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => {
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  const [route, setRoute] = useState({ name: 'home' });
  const [all, setAll] = useState(loadAll());
  const [auteur, setAuteur] = useState(localStorage.getItem('serm-auteur') || 'Anonyme');
  const [toast, setToast] = useState(null);
  const [syncing, setSyncing] = useState(false);

  // ── IndexedDB : reconstruit les blob URLs locales pour les photos pending
  // (les URLs object n'étant pas sérialisables, il faut les recréer après reload)
  useEffect(() => {
    let cancelled = false;
    restoreBlobUrls(all).then((restored) => {
      if (cancelled || restored === all) return;
      setAll({ ...restored });
    });
    return () => { cancelled = true; };
    // eslint-disable-next-line
  }, []); // Au mount seulement

  // Mode édition de la grille (toggle global)
  const [editMode, setEditMode] = useState(false);
  // Compteur de révision : incrémenté à chaque modification de SECTIONS
  // → force le re-render des composants qui dépendent de la grille
  const [gridRev, setGridRev] = useState(0);
  const bumpGrid = useCallback(() => setGridRev(r => r + 1), []);

  // Compteur de photos en attente d'upload (pending)
  const pendingCount = useMemo(() => {
    let n = 0;
    Object.values(all).forEach(v => {
      if (!v?.data) return;
      Object.values(v.data).forEach(d => {
        if (d?.photos && Array.isArray(d.photos)) {
          d.photos.forEach(p => { if (p?.pending) n++; });
        }
      });
    });
    return n;
  }, [all]);

  // Retry automatique des photos pending au retour online
  useEffect(() => {
    if (!isOnline || readOnly || pendingCount === 0 || retryingPhotos) return;
    let cancelled = false;
    setRetryingPhotos({ done: 0, total: pendingCount });
    retryPendingPhotos(all, (done, total) => {
      if (!cancelled) setRetryingPhotos({ done, total });
    }).then((newAll) => {
      if (cancelled) return;
      if (newAll !== all) {
        setAll(newAll);
        // Push à Supabase pour persister les nouvelles URLs des photos
        Object.values(newAll).forEach(v => debouncedPush(v));
        showToast(`${pendingCount} photo(s) envoyée(s) ✓`, 'success');
      }
      setRetryingPhotos(null);
    }).catch(() => { if (!cancelled) setRetryingPhotos(null); });
    return () => { cancelled = true; };
    // eslint-disable-next-line
  }, [isOnline, pendingCount]);

  // Initial pull from Supabase + local persistence
  useEffect(() => {
    let mounted = true;
    setSyncing(true);
    Promise.all([pullAllFromSupa(), pullGrilleFromSupa()]).then(([fresh, grille]) => {
      if (!mounted) return;
      if (fresh) {
        // Au pull initial, on respecte pendingState au cas où l'utilisateur
        // aurait déjà modifié quelque chose (rare mais possible si pull lent)
        setAll((prev) => {
          const merged = { ...fresh };
          Object.keys(pendingState.current).forEach(gn => {
            merged[gn] = pendingState.current[gn];
          });
          return merged;
        });
      }
      if (grille) bumpGrid();
      setSyncing(false);
    });
    return () => { mounted = false; };
  }, [bumpGrid]);

  // Real-time sync : refresh when teammates push changes
  useEffect(() => {
    const teardownVis = setupRealtimeSync((fresh) => {
      setAll((prev) => {
        // ⚠ Merge realtime — règle simple et FIABLE :
        // Pour toute gare présente dans pendingState (push en cours ou récemment
        // pushé, conf serveur pas encore retombée), on garde la version locale
        // SANS aucune condition de timestamp. Les timestamps locaux ne sont pas
        // fiables (ils changent à chaque keystroke), et c'est précisément ce
        // qu'on essaie de protéger contre l'écho realtime qui pourrait les
        // écraser.
        const merged = { ...fresh };
        Object.keys(pendingState.current).forEach(gn => {
          merged[gn] = pendingState.current[gn];
        });
        return merged;
      });
    });
    const teardownGri = setupGrilleRealtime(() => bumpGrid());
    return () => { teardownVis(); teardownGri(); };
  }, [bumpGrid]);

  // Persist locally
  useEffect(() => { saveAll(all); }, [all]);

  // First-time author prompt
  useEffect(() => {
    if (auteur === 'Anonyme' && !localStorage.getItem('serm-auteur')) {
      const n = (prompt("Bienvenue ! Quel est ton prénom ou tes initiales ? (pour identifier tes relevés dans l'équipe)") || '').trim();
      if (n) {
        setAuteur(n);
        localStorage.setItem('serm-auteur', n);
      }
    }
    // eslint-disable-next-line
  }, []);

  // Wrapper qui mute SECTIONS + push Supabase + force re-render
  const applyGridChange = useCallback((mutateFn, successMsg) => {
    if (readOnly) { alert('Mode consultation — édition de grille désactivée'); return false; }
    const ok = mutateFn();
    if (ok === false) return false;
    bumpGrid();
    pushGrilleToSupa(auteur);
    if (successMsg) setToast({ msg: successMsg, type: 'success' });
    setTimeout(() => setToast(null), 1800);
    return ok;
  }, [auteur, bumpGrid, readOnly]);

  // State de la modale d'édition de la grille
  // editModal = null | { type, sectionId?, critId?, current? }
  // types: 'edit-crit' | 'add-crit' | 'add-section' | 'edit-section'
  const [editModal, setEditModal] = useState(null);

  const openGridEdit = useCallback((type, sectionId, critId) => {
    const sec = sectionId ? SECTIONS.find(s => s.id === sectionId) : null;
    const crit = critId && sec ? (sec.criteria || []).find(c => c.id === critId) : null;
    setEditModal({ type, sectionId, critId, current: crit || sec || null });
  }, [gridRev]); // gridRev pour avoir la dernière version

  const closeGridEdit = useCallback(() => setEditModal(null), []);

  // Confirmation de suppression d'un critère
  const confirmDeleteCrit = useCallback((sectionId, critId) => {
    const sec = SECTIONS.find(s => s.id === sectionId);
    const crit = (sec?.criteria || []).find(c => c.id === critId);
    if (!crit) return;
    const msg = `Supprimer la question "${crit.label}" ?\n\nLes réponses déjà saisies sur les visites resteront stockées en base et seront récupérables si on remet la question avec le même identifiant.`;
    if (confirm(msg)) {
      applyGridChange(() => gridDeleteCriterion(sectionId, critId), 'Question supprimée');
    }
  }, [applyGridChange, gridRev]);

  // Confirmation de suppression d'un onglet
  const confirmDeleteSection = useCallback((sectionId) => {
    const sec = SECTIONS.find(s => s.id === sectionId);
    if (!sec) return;
    if (sec.system) {
      alert(`L'onglet "${sec.title}" est un onglet système et ne peut pas être supprimé. Vous pouvez en revanche modifier ou supprimer ses questions.`);
      return;
    }
    const msg = `Supprimer l'onglet "${sec.title}" et toutes ses ${(sec.criteria||[]).length} question(s) ?\n\nLes réponses déjà saisies resteront stockées en base.`;
    if (confirm(msg)) {
      applyGridChange(() => gridDeleteSection(sectionId), 'Onglet supprimé');
    }
  }, [applyGridChange, gridRev]);

  // Restaurer la grille par défaut
  const restoreDefaultGrille = useCallback(() => {
    if (!confirm("⚠ Restaurer la grille par défaut ?\n\nToutes les modifications apportées (questions ajoutées, modifiées, supprimées, nouveaux onglets) seront perdues.\n\nLes réponses déjà saisies sur les visites ne sont PAS affectées.")) return;
    applyGridChange(() => { gridRestoreDefault(); return true; }, 'Grille restaurée');
  }, [applyGridChange]);


  const showToast = (msg, type = '') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2200);
  };

  const startVisite = (gareName) => {
    const g = GARES.find((x) => x.nom === gareName);
    if (!all[gareName]) {
      // Pré-remplir avec les attributs connus de la gare (Caractérisation + Synthèse)
      const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
      const initialData = {
        visite_date: today,
        carac_quais_nb_acc: g.quais,
        // Pré-remplir la typologie SRADDET d'après cat_pro qui suit le même format
        synth_typo_sraddet: g.cat_pro || ''
      };
      const newV = { gare: gareName, data: initialData, updated: Date.now(), auteur };
      setAll((a) => ({ ...a, [gareName]: newV }));
      // v71 : push chaque critère initial + meta visite individuellement
      const me = auteur || (typeof localStorage !== 'undefined' ? localStorage.getItem('serm-auteur') : null) || 'Anonyme';
      Object.entries(initialData).forEach(([cid, val]) => {
        if (val !== undefined && val !== null && val !== '') {
          pushCritereToSupa(gareName, cid, val, me);
        }
      });
      pushVisiteMetaToSupa(newV);
    }
    setRoute({ name: 'form', gareName });
  };

  /* ============================================================
     RACE CONDITION FIX v2 — pendingState au lieu de timestamps
     ============================================================
     Problèmes résolus :
       - Photos qui disparaissent après les avoir prises
       - Texte qui se perd quand on tape pendant un sync realtime
       - Clics qui ne réagissent pas (UI ré-rendue avec ancien state)
     Approche : tant qu'une modif locale n'est pas confirmée par le
     serveur, on garde la version locale dans `pendingState`. Le merge
     realtime IGNORE toute gare présente dans pendingState, sans aucune
     condition de timestamp (les timestamps locaux n'étant pas fiables).
     ============================================================ */
  const pendingPushes = useRef({});  // gareName -> timeoutId (push en attente)
  const pendingState = useRef({});   // gareName -> visite locale en attente de confirmation serveur
  // v71 : buffer des critères modifiés à push (par gare)
  const pendingCriteres = useRef({}); // gareName -> Set<critereId>
  const pendingMetaFlag = useRef({}); // gareName -> bool (meta visite à push)

  const debouncedPush = useCallback((visite) => {
    const gn = visite.gare;
    // ⚠ Verrouille IMMÉDIATEMENT la version locale avant le timer.
    // Ainsi, même si un realtime arrive AVANT le push, le merge garde le local.
    pendingState.current[gn] = visite;

    if (pendingPushes.current[gn]) clearTimeout(pendingPushes.current[gn]);
    pendingPushes.current[gn] = setTimeout(async () => {
      delete pendingPushes.current[gn];
      const versionPushed = visite;
      // Récupérer les critères à pusher pour cette gare (et reset le buffer)
      const critSet = pendingCriteres.current[gn] || new Set();
      const critsToFlush = Array.from(critSet);
      pendingCriteres.current[gn] = new Set();
      const flushMeta = pendingMetaFlag.current[gn] === true;
      pendingMetaFlag.current[gn] = false;
      const me = auteur || (typeof localStorage !== 'undefined' ? localStorage.getItem('serm-auteur') : null) || 'Anonyme';

      try {
        // v71 : push CHAQUE critère modifié individuellement (multi-user safe)
        await Promise.all(critsToFlush.map(cid => {
          const val = versionPushed.data?.[cid];
          if (val === undefined || val === null) {
            // Critère effacé : on supprime côté serveur
            return deleteCritereFromSupa(gn, cid);
          }
          return pushCritereToSupa(gn, cid, val, me);
        }));
        // Meta visite (auteurs, date_visite, météo) si changée
        if (flushMeta) await pushVisiteMetaToSupa(versionPushed);
      } catch (e) {
        console.warn('Push failed, keeping local pending state:', e);
        // En cas d'erreur, on GARDE pendingState pour ne pas perdre les modifs
        return;
      }
      // Push réussi. On retire le verrou 3 sec après pour absorber les échos
      // realtime retardés. MAIS si l'utilisateur a fait une nouvelle modif
      // entre-temps (pendingState a été réécrit), on ne touche à rien :
      // un autre push est déjà programmé et il prendra le relais.
      setTimeout(() => {
        if (pendingState.current[gn] === versionPushed) {
          delete pendingState.current[gn];
        }
      }, 3000);
    }, 800);
  }, [auteur]);

  const updateVisite = (v) => {
    if (readOnly) return; // Mode consultation — aucune écriture
    // Accumuler les enquêteurs : si plusieurs personnes ont contribué, on garde toute la liste
    const existing = v.auteur || '';
    const auteurs = new Set(existing.split(',').map(s => s.trim()).filter(Boolean));
    if (auteur) auteurs.add(auteur);
    const updated = { ...v, auteur: [...auteurs].join(', '), updated: new Date().toISOString() };

    // v71 : calculer le diff vs ancienne visite pour identifier les critères modifiés
    const prevVisite = all[v.gare] || { data: {}, auteur: '' };
    const prevData = prevVisite.data || {};
    const newData = updated.data || {};
    const allCritIds = new Set([...Object.keys(prevData), ...Object.keys(newData)]);

    if (!pendingCriteres.current[v.gare]) {
      pendingCriteres.current[v.gare] = new Set();
    }
    allCritIds.forEach(cid => {
      // Compare structurellement (JSON.stringify suffit pour nos objets simples)
      const a = prevData[cid], b = newData[cid];
      if (JSON.stringify(a) !== JSON.stringify(b)) {
        pendingCriteres.current[v.gare].add(cid);
      }
    });
    // Meta visite changée ?
    if (prevVisite.auteur !== updated.auteur ||
        prevData.visite_date !== newData.visite_date ||
        prevData.visite_meteo !== newData.visite_meteo) {
      pendingMetaFlag.current[v.gare] = true;
    }

    setAll((a) => ({ ...a, [v.gare]: updated }));
    debouncedPush(updated);
  };

  const deleteVisite = async (gareName) => {
    if (readOnly) { alert('Mode consultation — suppression désactivée'); return; }
    const typed = prompt(`⚠ Suppression IRRÉVERSIBLE de la visite "${gareName}".\n\nToutes les données saisies ET les photos seront perdues.\n\nPour confirmer, tape exactement le nom de la gare :`);
    if (typed === null) return; // Annulé
    if (typed.trim() !== gareName) {
      alert('Nom incorrect — suppression annulée.');
      return;
    }
    setAll((a) => { const next = { ...a }; delete next[gareName]; return next; });
    await deleteVisiteRemote(gareName);
    showToast('Visite supprimée');
    setRoute({ name: 'home' });
  };

  const changeAuteur = () => {
    const n = (prompt('Ton prénom ou tes initiales ?', auteur) || '').trim();
    if (n) {
      setAuteur(n);
      localStorage.setItem('serm-auteur', n);
    }
  };

  /* ===== EXPORT — multi-format (CSV / Excel / JSON) avec choix de scope ===== */
  const csvEscape = (v) => {
    if (v == null) return '';
    const s = String(v);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  /* Construit un tableau 2D : [headers, ...rows] à partir d'une liste de visites */
  const buildTable = (visites) => {
    const headerMeta = ['gare', 'typologie', 'cat_pro', 'cat_sgp', 'ligne_flux', 'axe', 'secteur', 'auteur', 'updated', 'progression_pct'];
    const headerCrit = [];
    SECTIONS.forEach((s) => {
      (s.criteria || []).forEach((c) => {
        if (c.type === 'subhead') return; // séparateurs visuels — exclus de l'export
        headerCrit.push(`${s.id}__${c.id}__val`);
        headerCrit.push(`${s.id}__${c.id}__note`);
        headerCrit.push(`${s.id}__${c.id}__photos`);
      });
    });
    const headers = [...headerMeta, ...headerCrit];
    const rows = [];
    visites.forEach((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      const stats = g ? visiteStats(g, v.data) : { pct: 0 };
      const row = [
        v.gare,
        g?.cat_sgp || '',
        g?.cat_pro || '', g?.cat_sgp || '', g?.ligne_flux || '', g?.axe || '', g?.secteur || '',
        v.auteur || '',
        new Date(v.updated || Date.now()).toISOString(),
        stats.pct
      ];
      SECTIONS.forEach((s) => {
        (s.criteria || []).forEach((c) => {
          if (c.type === 'subhead') return;
          const d = v.data?.[c.id];
          let val = '', note = '', photos = '';
          if (Array.isArray(d)) {
            // multi-select : on joint les choix par " | "
            val = d.join(' | ');
          } else if (d != null && typeof d === 'object') {
            note = d.note || '';
            photos = (d.photos || []).map((p) => p.url || '').join(' | ');
            // Composite (pn/pne) : on sérialise presence + nb [+ etat]
            if ('presence' in d && !('val' in d)) {
              const parts = [d.presence === 'yes' ? 'présent' : d.presence === 'no' ? 'absent' : ''];
              if (d.nb != null && d.nb !== '' && d.presence === 'yes') parts.push(`nb=${d.nb}`);
              if (d.etat != null && d.presence === 'yes') {
                const labels = ['Mauvais', 'Moyen', 'Bon', 'Très bon'];
                const idx = [0, 0.33, 0.66, 1].indexOf(d.etat);
                parts.push(`état=${idx >= 0 ? labels[idx] : d.etat}`);
              }
              val = parts.filter(Boolean).join(' / ');
            } else if ('val' in d) {
              const inner = d.val;
              val = Array.isArray(inner) ? inner.join(' | ') : (inner != null ? inner : '');
            }
          } else {
            val = d != null ? d : '';
          }
          row.push(val); row.push(note); row.push(photos);
        });
      });
      rows.push(row);
    });
    return { headers, rows };
  };
  const downloadBlob = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  };
  const exportData = (visites, format, baseName) => {
    if (visites.length === 0) { showToast('Aucune visite à exporter', 'error'); return; }
    const today = new Date().toISOString().slice(0, 10);
    const safeName = baseName.replace(/[^a-z0-9_-]/gi, '_');
    if (format === 'csv') {
      const { headers, rows } = buildTable(visites);
      const csv = '\uFEFF' + [headers, ...rows].map((r) => r.map(csvEscape).join(';')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      downloadBlob(blob, `${safeName}_${today}.csv`);
      showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success');
    } else if (format === 'xlsx') {
      // Génération stylée avec ExcelJS (asynchrone, lance en background)
      buildExcelPretty(visites, safeName, today)
        .then(() => showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success'))
        .catch((e) => { console.error('Excel export:', e); showToast('Erreur export Excel', 'error'); });
    } else if (format === 'json') {
      const payload = {
        exported_at: new Date().toISOString(),
        exported_by: auteur,
        n_visites: visites.length,
        visites: visites.map((v) => ({
          gare: v.gare,
          gare_info: GARES.find((g) => g.nom === v.gare) || null,
          typologie: (() => { const g = GARES.find((x) => x.nom === v.gare); return g?.cat_sgp || null; })(),
          auteur: v.auteur || null,
          updated: v.updated || null,
          data: v.data || {}
        }))
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      downloadBlob(blob, `${safeName}_${today}.json`);
      showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success');
    }
  };

  /* ===========================================================
     EXPORT EXCEL STYLÉ (ExcelJS) — multi-onglets façon base de données pro
     Onglets : Base de données / Suivi visites / Méthodologie / Mode d'emploi
     =========================================================== */

  // Couleurs par section, inspirées du template AREP de Tony
  const SECTION_COLORS = {
    carac:     '#C8102E', // rouge AREP
    parking:   '#567B8F', // bleu acier
    parking2:  '#567B8F',
    parvis:    '#9E0B24', // rouge bordeaux
    velos:     '#6B8E4E', // vert olive
    tc:        '#D17B0F', // orange
    bv:        '#7A4E8C', // violet
    franch:    '#B85450', // saumon
    quais:     '#1D5E3A', // vert foncé
    pmr:       '#444444', // gris
    synthese:  '#1A1A1A'  // noir
  };
  const IDENTITY_COLOR = '#1A1A1A';
  const BUREAU_COLOR = '#2B3A4A';
  const META_COLOR = '#6B6259';

  // Format human-readable d'une valeur de critère pour Excel
  const formatValForExcel = (c, raw) => {
    if (raw && typeof raw === 'object' && raw.na === true) return 'N/A';
    const v = getVal(raw);
    if (v == null || v === '') return '';
    if (Array.isArray(v)) return v.join(', ');
    if (typeof v === 'object') {
      const parts = [];
      if (v.presence === 'yes') parts.push('Présent');
      if (v.presence === 'no') parts.push('Absent');
      if (v.nb != null && v.nb !== '') parts.push(`n=${v.nb}`);
      if (v.etat != null) {
        const labels = ['mauvais', 'moyen', 'bon', 'très bon'];
        parts.push(`état: ${labels[Math.round(v.etat*3)] || ''}`);
      }
      return parts.join(' · ');
    }
    if (c.type === 'rating' && c.labels && typeof v === 'number') { const idx = Math.round(v * (c.labels.length - 1)); return c.labels[idx] || `Note ${v}`; }
    if (c.type === 'yesno') return v === true ? 'Oui' : v === false ? 'Non' : String(v);
    return String(v);
  };

  const buildExcelPretty = async (visites, safeName, today) => {
    if (!window.ExcelJS) throw new Error('ExcelJS non chargé');
    const wb = new window.ExcelJS.Workbook();
    wb.creator = 'SERM HDF · AREP × G&C';
    wb.created = new Date();

    // ============= ONGLET 1 : Base de données =============
    const wsBase = wb.addWorksheet('Base de données', {
      views: [{ state: 'frozen', xSplit: 1, ySplit: 8, showGridLines: false }]
    });

    // Construire la liste des colonnes :
    // - Identité (Nom, UIC, Cat SGP, Cat Pro, Secteur, Axe, Ligne flux) — 7 cols
    // - Méta visite (Date, Météo, Enquêteur(s), % complétion) — 4 cols
    // - Sections (en parcourant SECTIONS, sauf bureau et carac qui sont gérés à part)
    const identityCols = [
      { label: 'Nom gare',   getter: (g) => g.nom },
      { label: 'UIC',        getter: (g) => g.uic },
      { label: 'Cat. SGP',   getter: (g) => g.cat_sgp },
      { label: 'Cat. Pro',   getter: (g) => g.cat_pro },
      { label: 'Secteur',    getter: (g) => g.secteur },
      { label: 'Axe',        getter: (g) => g.axe },
      { label: 'Ligne flux', getter: (g) => g.ligne_flux }
    ];
    const metaCols = [
      { label: 'Date de visite', getter: (g, v) => v.data?.visite_date || '' },
      { label: 'Météo',          getter: (g, v) => v.data?.visite_meteo || '' },
      { label: 'Enquêteur(s)',   getter: (g, v) => v.auteur || '' },
      { label: '% complétion',   getter: (g, v) => `${visiteStats(g, v.data).pct}%` }
    ];

    // Pour chaque section, on liste ses critères (sauf subhead et bureau)
    const sectionBlocks = [];
    SECTIONS.forEach((s) => {
      const items = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');
      if (items.length === 0) return;
      const color = s.id === 'bureau' ? BUREAU_COLOR : (SECTION_COLORS[s.id] || META_COLOR);
      sectionBlocks.push({ section: s, color, items });
    });

    // === LIGNE 2 : titre principal ===
    wsBase.mergeCells('A2:G2');
    const titleCell = wsBase.getCell('A2');
    titleCell.value = 'AREP — BASE DE RELEVÉ TERRAIN · SERM HDF';
    titleCell.font = { name: 'Arial', size: 16, bold: true, color: { argb: 'FF1A1A1A' } };
    titleCell.alignment = { vertical: 'middle', horizontal: 'left' };
    wsBase.getRow(2).height = 24;

    // === LIGNE 3 : sous-titre ===
    wsBase.mergeCells('A3:G3');
    const subCell = wsBase.getCell('A3');
    subCell.value = `${visites.length} visite${visites.length > 1 ? 's' : ''} · exporté le ${new Date().toLocaleString('fr-FR')}`;
    subCell.font = { name: 'Arial', size: 10, color: { argb: 'FF6B6259' }, italic: true };

    // === LIGNE 7 : section headers fusionnés et colorés ===
    const HEADER_ROW1 = 7;
    const HEADER_ROW2 = 8;
    let col = 1;
    // Bloc IDENTITÉ
    wsBase.mergeCells(HEADER_ROW1, col, HEADER_ROW1, col + identityCols.length - 1);
    const idCell = wsBase.getCell(HEADER_ROW1, col);
    idCell.value = 'IDENTITÉ';
    idCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + IDENTITY_COLOR.slice(1) } };
    idCell.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
    idCell.alignment = { vertical: 'middle', horizontal: 'center' };
    col += identityCols.length;
    // Bloc MÉTA VISITE
    wsBase.mergeCells(HEADER_ROW1, col, HEADER_ROW1, col + metaCols.length - 1);
    const metaCell = wsBase.getCell(HEADER_ROW1, col);
    metaCell.value = 'CONTEXTE VISITE';
    metaCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + META_COLOR.slice(1) } };
    metaCell.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
    metaCell.alignment = { vertical: 'middle', horizontal: 'center' };
    col += metaCols.length;
    // Blocs des sections
    sectionBlocks.forEach((block) => {
      const start = col;
      const end = col + block.items.length - 1;
      wsBase.mergeCells(HEADER_ROW1, start, HEADER_ROW1, end);
      const c = wsBase.getCell(HEADER_ROW1, start);
      c.value = `${String(Math.floor(block.section.n)).padStart(2,'0')} · ${block.section.title.toUpperCase()}  (${block.items.length})`;
      c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + block.color.slice(1) } };
      c.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
      c.alignment = { vertical: 'middle', horizontal: 'center' };
      col = end + 1;
    });
    wsBase.getRow(HEADER_ROW1).height = 22;

    // === LIGNE 8 : noms de colonnes individuels ===
    col = 1;
    const addColumnHeader = (label, color) => {
      const c = wsBase.getCell(HEADER_ROW2, col);
      c.value = label;
      c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + color.slice(1) } };
      c.font = { name: 'Arial', size: 9, bold: true, color: { argb: 'FFFFFFFF' } };
      c.alignment = { vertical: 'middle', horizontal: 'left', wrapText: true };
      c.border = { bottom: { style: 'thin', color: { argb: 'FF000000' } } };
      col++;
    };
    identityCols.forEach((ic) => addColumnHeader(ic.label, IDENTITY_COLOR));
    metaCols.forEach((mc) => addColumnHeader(mc.label, META_COLOR));
    sectionBlocks.forEach((block) => block.items.forEach((it) => addColumnHeader(it.label, block.color)));
    wsBase.getRow(HEADER_ROW2).height = 50;

    // === LIGNES 9+ : données des gares (1 ligne par visite) ===
    visites.forEach((v, idx) => {
      const g = GARES.find((x) => x.nom === v.gare);
      if (!g) return;
      const rowNum = HEADER_ROW2 + 1 + idx;
      let c = 1;
      // Identité
      identityCols.forEach((ic) => { wsBase.getCell(rowNum, c++).value = ic.getter(g); });
      // Méta
      metaCols.forEach((mc) => { wsBase.getCell(rowNum, c++).value = mc.getter(g, v); });
      // Sections
      sectionBlocks.forEach((block) => {
        block.items.forEach((it) => {
          const raw = v.data?.[it.id];
          const val = formatValForExcel(it, raw);
          const cell = wsBase.getCell(rowNum, c);
          cell.value = val;
          // Note libre en commentaire si présente
          if (raw?.note) {
            cell.note = raw.note;
          }
          c++;
        });
      });
      // Bordure ligne entière (légère)
      for (let cc = 1; cc < col; cc++) {
        wsBase.getCell(rowNum, cc).border = {
          bottom: { style: 'thin', color: { argb: 'FFE0E0E0' } },
          right:  { style: 'thin', color: { argb: 'FFE0E0E0' } }
        };
      }
      // Première colonne (nom gare) en gras
      wsBase.getCell(rowNum, 1).font = { name: 'Arial', size: 10, bold: true };
    });

    // === LARGEURS DES COLONNES ===
    let cIdx = 1;
    identityCols.forEach(() => { wsBase.getColumn(cIdx++).width = 18; });
    metaCols.forEach(() => { wsBase.getColumn(cIdx++).width = 14; });
    sectionBlocks.forEach((block) => block.items.forEach(() => { wsBase.getColumn(cIdx++).width = 16; }));

    // === FILTRES AUTO sur la ligne 8 ===
    wsBase.autoFilter = {
      from: { row: HEADER_ROW2, column: 1 },
      to:   { row: HEADER_ROW2, column: col - 1 }
    };

    // ============= ONGLET 2 : Suivi visites =============
    const wsSuivi = wb.addWorksheet('Suivi visites', {
      views: [{ state: 'frozen', ySplit: 7, showGridLines: false }]
    });
    wsSuivi.mergeCells('A2:F2');
    wsSuivi.getCell('A2').value = 'AREP — SUIVI DES VISITES';
    wsSuivi.getCell('A2').font = { name: 'Arial', size: 16, bold: true };
    wsSuivi.mergeCells('A3:F3');
    wsSuivi.getCell('A3').value = 'Avancement par gare · statut, auteur(s), date';
    wsSuivi.getCell('A3').font = { name: 'Arial', size: 10, italic: true, color: { argb: 'FF6B6259' } };

    const suiviHeaders = ['Nom gare', 'Statut', 'Enquêteur(s)', 'Date dernière modif', '% complétion', 'Critères remplis'];
    suiviHeaders.forEach((h, i) => {
      const c = wsSuivi.getCell(7, i + 1);
      c.value = h;
      c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
      c.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
      c.alignment = { vertical: 'middle', horizontal: 'left' };
    });
    wsSuivi.getRow(7).height = 22;

    visites.forEach((v, idx) => {
      const g = GARES.find((x) => x.nom === v.gare);
      if (!g) return;
      const stats = visiteStats(g, v.data);
      const r = 8 + idx;
      let statut, statutColor;
      if (stats.pct === 100) { statut = '✓ Complète'; statutColor = 'FF1D5E3A'; }
      else if (stats.pct >= 50) { statut = '⏳ En cours'; statutColor = 'FFD17B0F'; }
      else if (stats.pct > 0) { statut = '◐ Démarrée'; statutColor = 'FFB85450'; }
      else { statut = '○ À faire'; statutColor = 'FF6B6259'; }
      wsSuivi.getCell(r, 1).value = g.nom;
      wsSuivi.getCell(r, 1).font = { name: 'Arial', size: 10, bold: true };
      wsSuivi.getCell(r, 2).value = statut;
      wsSuivi.getCell(r, 2).font = { name: 'Arial', size: 10, bold: true, color: { argb: statutColor } };
      wsSuivi.getCell(r, 3).value = v.auteur || '—';
      wsSuivi.getCell(r, 4).value = v.updated ? new Date(v.updated).toLocaleString('fr-FR') : '—';
      wsSuivi.getCell(r, 5).value = stats.pct / 100;
      wsSuivi.getCell(r, 5).numFmt = '0%';
      wsSuivi.getCell(r, 6).value = `${stats.filled} / ${stats.total}`;
    });
    wsSuivi.getColumn(1).width = 28;
    wsSuivi.getColumn(2).width = 16;
    wsSuivi.getColumn(3).width = 22;
    wsSuivi.getColumn(4).width = 22;
    wsSuivi.getColumn(5).width = 14;
    wsSuivi.getColumn(6).width = 18;
    wsSuivi.autoFilter = { from: { row: 7, column: 1 }, to: { row: 7, column: 6 } };

    // ============= ONGLET 3 : Méthodologie =============
    const wsMethodo = wb.addWorksheet('Méthodologie', { views: [{ showGridLines: false }] });
    wsMethodo.mergeCells('B2:E2');
    wsMethodo.getCell('B2').value = 'AREP — MÉTHODOLOGIE';
    wsMethodo.getCell('B2').font = { name: 'Arial', size: 16, bold: true };
    wsMethodo.mergeCells('B3:E3');
    wsMethodo.getCell('B3').value = 'Référentiel de relevé terrain SERM Hauts-de-France';
    wsMethodo.getCell('B3').font = { name: 'Arial', size: 10, italic: true, color: { argb: 'FF6B6259' } };

    let rM = 6;
    wsMethodo.getCell(`B${rM}`).value = 'ARCHITECTURE';
    wsMethodo.getCell(`B${rM}`).font = { name: 'Arial', size: 11, bold: true, color: { argb: 'FFC8102E' } };
    rM += 2;
    wsMethodo.getCell(`B${rM}`).value = `${SECTIONS.length} sections · ${SECTIONS.reduce((n, s) => n + (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text').length, 0)} critères au total`;
    rM += 2;

    wsMethodo.getCell(`B${rM}`).value = 'SECTIONS';
    wsMethodo.getCell(`B${rM}`).font = { name: 'Arial', size: 11, bold: true, color: { argb: 'FFC8102E' } };
    rM += 2;
    // Header
    const methodoHeaders = ['N°', 'Section', 'Critères', 'Description'];
    methodoHeaders.forEach((h, i) => {
      const c = wsMethodo.getCell(rM, i + 2);
      c.value = h;
      c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
      c.font = { name: 'Arial', size: 9, bold: true, color: { argb: 'FFFFFFFF' } };
    });
    rM++;
    SECTIONS.forEach((s) => {
      const nCriteria = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text').length;
      wsMethodo.getCell(rM, 2).value = String(Math.floor(s.n)).padStart(2, '0');
      wsMethodo.getCell(rM, 3).value = s.title;
      wsMethodo.getCell(rM, 3).font = { name: 'Arial', size: 10, bold: true };
      wsMethodo.getCell(rM, 4).value = nCriteria;
      wsMethodo.getCell(rM, 5).value = s.subtitle || '';
      wsMethodo.getCell(rM, 5).font = { name: 'Arial', size: 9, italic: true };
      rM++;
    });
    wsMethodo.getColumn(1).width = 3;
    wsMethodo.getColumn(2).width = 6;
    wsMethodo.getColumn(3).width = 26;
    wsMethodo.getColumn(4).width = 10;
    wsMethodo.getColumn(5).width = 60;

    // ============= ONGLET 4 : Mode d'emploi =============
    const wsMode = wb.addWorksheet("Mode d'emploi", { views: [{ showGridLines: false }] });
    wsMode.mergeCells('B2:D2');
    wsMode.getCell('B2').value = "AREP — MODE D'EMPLOI";
    wsMode.getCell('B2').font = { name: 'Arial', size: 16, bold: true };
    wsMode.mergeCells('B3:D3');
    wsMode.getCell('B3').value = 'Lecture et utilisation de cette base';
    wsMode.getCell('B3').font = { name: 'Arial', size: 10, italic: true, color: { argb: 'FF6B6259' } };

    const modeContent = [
      ['STRUCTURE', ''],
      ['Onglet 1', 'Base de données : 1 ligne par gare visitée. Headers colorés par section.'],
      ['Onglet 2', "Suivi : statut d'avancement par gare (Complète / En cours / Démarrée / À faire)."],
      ['Onglet 3', 'Méthodologie : architecture du référentiel, sections et nombre de critères.'],
      ['Onglet 4', "Ce mode d'emploi."],
      ['', ''],
      ['CONVENTIONS', ''],
      ['Valeurs', '"Présent" / "Absent" pour les présences, "Oui" / "Non" pour les booléens, valeurs textuelles pour les choix, nombres pour les compteurs.'],
      ['N/A', "Critère marqué comme Non Applicable ou Ne Sait Pas — compte comme rempli dans la complétion."],
      ['Note', 'Une note libre peut être attachée à chaque critère — apparaît en commentaire de cellule (survol).'],
      ['Photos', "Les photos sont stockées séparément (ZIP photothèque), non incluses dans ce fichier."],
      ['', ''],
      ['SOURCE', ''],
      ['Outil', "Saisie via l'app SERM HDF (HTML + Supabase). Cet Excel est généré à l'export."],
      ['Contact', 'Tony BÉGO — AREP Programmation · SNCF G&C']
    ];
    let rMode = 6;
    modeContent.forEach((line) => {
      const isHeader = line[1] === '' && line[0] !== '';
      if (isHeader) {
        wsMode.getCell(rMode, 2).value = line[0];
        wsMode.getCell(rMode, 2).font = { name: 'Arial', size: 11, bold: true, color: { argb: 'FFC8102E' } };
      } else if (line[0] !== '' || line[1] !== '') {
        wsMode.getCell(rMode, 2).value = line[0];
        wsMode.getCell(rMode, 2).font = { name: 'Arial', size: 10, bold: true };
        wsMode.getCell(rMode, 3).value = line[1];
        wsMode.getCell(rMode, 3).font = { name: 'Arial', size: 10 };
        wsMode.getCell(rMode, 3).alignment = { wrapText: true };
      }
      rMode++;
    });
    wsMode.getColumn(1).width = 3;
    wsMode.getColumn(2).width = 16;
    wsMode.getColumn(3).width = 80;

    // ============= SAVE =============
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    downloadBlob(blob, `${safeName}_${today}.xlsx`);
  };

  /* ===========================================================
     EXPORT PPTX AREP — Fiche de relevé terrain par gare
     Style strict charte AREP : Segoe UI, rouge AREP, layout 16:9.
     Structure : Garde / Identif / Synthèse / 1 slide par section / Cover.
     Photos incluses à côté des critères (grille 2x2).
     =========================================================== */

  const AREP_COL = {
    RED:       'C8102E',
    RED_DARK:  '801618',
    RED_LIGHT: 'F7D2D1',
    INK:       '1A1A1A',
    INK_SOFT:  '3D3D3D',
    GRAY:      '6B6259',
    GRAY_LT:   'BFB9AC',
    BORDER:    'D9D3C4',
    PAPER:     'F5F2EB',
    PAPER_LT:  'FAF8F3',
    GREEN:     '1D5E3A',
    GREEN_LT:  'E3EBE4',
    BLUE:      '1B515D',
    ORANGE:    'D17B0F',
    BUREAU:    '2B3A4A'
  };

  // Fetch + cache pour photos PPTX (réutilise data déjà téléchargée si possible)
  const fetchPhotoForPptx = async (url) => {
    try {
      if (url.startsWith('data:')) return url;
      const resp = await fetch(url);
      const blob = await resp.blob();
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(blob);
      });
    } catch (e) { return null; }
  };

  const buildPptxAREP = async (gare, visite, auteur) => {
    if (!window.PptxGenJS) throw new Error('PptxGenJS non chargé');
    const pres = new window.PptxGenJS();
    pres.layout = 'LAYOUT_WIDE';                 // 13.33 x 7.5 inches
    pres.title = `Fiche SERM HDF - ${gare.nom}`;
    pres.author = auteur || 'AREP';
    pres.company = 'AREP × SNCF G&C';
    pres.subject = 'Relevé terrain SERM Hauts-de-France';

    // ===== Helpers communs à toutes les slides ============================

    // Footer + numéro de page + mini logo AREP (présent sur toutes les slides
    // sauf garde et couverture finale)
    const addFooter = (slide, pageNum, totalPages) => {
      const today = new Date().toLocaleDateString('fr-FR');
      slide.addText(`SERM HDF  ·  ${gare.nom}  ·  généré le ${today}`, {
        x: 0.4, y: 7.15, w: 10, h: 0.25,
        fontSize: 8, color: AREP_COL.GRAY, fontFace: 'Segoe UI'
      });
      slide.addText(`page ${pageNum}/${totalPages}`, {
        x: 11.5, y: 7.15, w: 1.5, h: 0.25,
        fontSize: 8, color: AREP_COL.GRAY, fontFace: 'Segoe UI', align: 'right'
      });
      // Logo AREP rouge en bas droite
      slide.addText('AREP', {
        x: 12.7, y: 6.85, w: 0.6, h: 0.3,
        fontSize: 14, color: AREP_COL.RED, bold: true,
        fontFace: 'Segoe UI Semibold', align: 'right'
      });
    };

    // En-tête commun de slide section : kicker "N. SECTION" + titre + sous-titre + ligne rouge
    const addHeader = (slide, kicker, title, subtitle, accentColor) => {
      const acc = accentColor || AREP_COL.RED;
      if (kicker) {
        slide.addText(kicker, {
          x: 0.4, y: 0.35, w: 6, h: 0.25,
          fontSize: 10, color: acc, bold: true,
          fontFace: 'Segoe UI Semibold', charSpacing: 2
        });
      }
      slide.addText(title, {
        x: 0.4, y: 0.6, w: 12, h: 0.55,
        fontSize: 24, color: AREP_COL.INK, bold: true,
        fontFace: 'Segoe UI Semibold'
      });
      if (subtitle) {
        slide.addText(subtitle, {
          x: 0.4, y: 1.15, w: 12, h: 0.35,
          fontSize: 12, color: AREP_COL.INK_SOFT,
          fontFace: 'Segoe UI'
        });
      }
      // Trait rouge sous le header
      slide.addShape('rect', {
        x: 0.4, y: subtitle ? 1.55 : 1.25, w: 0.6, h: 0.04,
        fill: { color: acc }, line: { type: 'none' }
      });
    };

    // ===== Pré-calcul des sections + photos pour estimer le nb de pages ====
    const sectionsToRender = SECTIONS.filter(s => {
      const items = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');
      return items.length > 0;
    });
    // 1 garde + 1 identif + 1 synthèse + N sections + 1 final
    const totalPages = 3 + sectionsToRender.length + 1;

    // ===== Récupération de toutes les photos en parallèle =================
    // (Pour permettre l'affichage progressif des slides)
    const photoUrls = [];
    sectionsToRender.forEach(s => {
      (s.criteria || []).forEach(c => {
        const raw = visite.data?.[c.id];
        if (raw?.photos?.length) {
          raw.photos.forEach(p => photoUrls.push({ url: p.url, label: c.label }));
        }
      });
    });

    const photoCache = {};
    if (photoUrls.length) {
      setPdfStatus({ stage: 'Téléchargement des photos…', current: 0, total: photoUrls.length });
      const BATCH = 4;
      for (let i = 0; i < photoUrls.length; i += BATCH) {
        const batch = photoUrls.slice(i, i + BATCH);
        const results = await Promise.all(batch.map(p => fetchPhotoForPptx(p.url)));
        batch.forEach((p, k) => { photoCache[p.url] = results[k]; });
        setPdfStatus({ stage: 'Téléchargement des photos…', current: Math.min(i + BATCH, photoUrls.length), total: photoUrls.length });
      }
      setPdfStatus({ stage: 'Génération du PPTX…', current: 0, total: totalPages });
    }

    // ====================================================================
    // SLIDE 1 — PAGE DE GARDE
    // ====================================================================

  /* ===== EXPORT PHOTOS — ZIP rangé par Gare / Section / Question ===== */
  const exportPhotosZip = async (visites) => {
    if (!window.JSZip) { showToast('Bibliothèque ZIP non chargée — recharge la page', 'error'); return; }
    // Sanitize : retire caractères interdits dans les noms de fichiers
    const sanit = (s) => String(s).replace(/[<>:"/\\|?*\u0000-\u001f]/g, '').replace(/\s+/g, ' ').trim().slice(0, 80);
    // Compter total
    let totalPhotos = 0;
    visites.forEach(v => {
      if (!v.data) return;
      SECTIONS.forEach(s => (s.criteria || []).forEach(c => {
        totalPhotos += getPhotos(v.data[c.id]).length;
      }));
    });
    if (totalPhotos === 0) { showToast('Aucune photo à exporter', 'error'); return; }

    setSyncing(true);
    showToast(`Préparation de ${totalPhotos} photo${totalPhotos > 1 ? 's' : ''}…`);
    const zip = new window.JSZip();
    let fetched = 0, errors = 0;
    const manifest = [`PHOTOTHEQUE SERM HAUTS-DE-FRANCE`,
      `Export du ${new Date().toLocaleString('fr-FR')}`,
      `Auteur : ${auteur}`,
      '',
      'STRUCTURE : Gare / Section / Question_NN.jpg',
      '(_HD signale une photo en qualité originale)',
      '',
      '--- DETAIL ---'];

    for (const v of visites) {
      if (!v.data) continue;
      const gareSafe = sanit(v.gare);
      for (const s of SECTIONS) {
        const secSafe = sanit(s.title);
        for (const c of (s.criteria || [])) {
          const photos = getPhotos(v.data[c.id]);
          if (photos.length === 0) continue;
          const critSafe = sanit(c.label);
          for (let i = 0; i < photos.length; i++) {
            const p = photos[i];
            if (!p.url) continue;
            const num = String(i + 1).padStart(2, '0');
            const hdTag = p.hd ? '_HD' : '';
            // Extension : déduite de p.url ou .jpg par défaut
            const ext = (p.url.match(/\.(jpe?g|png|webp|heic)(?:\?|$)/i)?.[1] || 'jpg').toLowerCase();
            const path = `${gareSafe}/${secSafe}/${critSafe}_${num}${hdTag}.${ext}`;
            try {
              const resp = await fetch(p.url);
              if (!resp.ok) throw new Error('HTTP ' + resp.status);
              const blob = await resp.blob();
              zip.file(path, blob);
              manifest.push(`✓ ${path}`);
              fetched++;
            } catch (e) {
              console.warn('Photo fetch failed:', p.url, e);
              manifest.push(`✗ ${path}  [ÉCHEC]`);
              errors++;
            }
          }
        }
      }
    }

    if (fetched === 0) {
      showToast('Échec téléchargement des photos', 'error');
      setSyncing(false);
      return;
    }

    manifest.push('', `--- RECAP ---`, `${fetched} photo(s) téléchargée(s)`, errors > 0 ? `${errors} échec(s)` : '');
    zip.file('_README.txt', manifest.join('\n'));

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    const today = new Date().toISOString().slice(0, 10);
    downloadBlob(blob, `photos_SERM_HDF_${today}.zip`);
    showToast(`Photothèque ZIP : ${fetched} photo${fetched > 1 ? 's' : ''}${errors > 0 ? ` (${errors} échec)` : ''} ✓`, 'success');
    setSyncing(false);
  };

  /* ===== GÉNÉRATION PDF NATIF (jsPDF) — A4 calibré, téléchargement direct ===== */

  // Convertit une URL (publique ou data:) en data URL JPEG
  const urlToBase64 = async (url) => {
    if (url.startsWith('data:')) return url;
    const resp = await fetch(url);
    const blob = await resp.blob();
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  };

  // Redimensionne pour le PDF (max 600px, JPEG 75%)
  const resizeForPDF = async (url, maxDim = 600) => {
    const dataUrl = await urlToBase64(url);
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve({ dataUrl: canvas.toDataURL('image/jpeg', 0.75), w, h });
      };
      img.onerror = () => reject(new Error('img load failed'));
      img.src = dataUrl;
    });
  };

  // Formate la valeur d'un critère pour le PDF (texte court, sans caractères spéciaux)
  const formatValForPDF = (c, raw) => {
    if (raw && typeof raw === 'object' && raw.na === true) return 'N/A';
    const v = getVal(raw);
    if (v == null || v === '') return '-';
    if (Array.isArray(v)) return v.join(', ');
    if (typeof v === 'object') {
      const parts = [];
      if (v.presence === 'yes') parts.push('Present');
      if (v.presence === 'no') parts.push('Absent');
      if (v.nb != null && v.nb !== '') parts.push(`n=${v.nb}`);
      if (v.etat != null) {
        const labels = ['mauvais', 'moyen', 'bon', 'tres bon'];
        parts.push(`etat ${labels[Math.round(v.etat*3)] || ''}`);
      }
      return parts.join(' / ') || '-';
    }
    if (c.type === 'rating' && c.labels && typeof v === 'number') { const idx = Math.round(v * (c.labels.length - 1)); return c.labels[idx] || `Note ${v}`; }
    return String(v);
  };

  const [pdfStatus, setPdfStatus] = useState(null); // { stage, current, total } | null

  const buildPDFForGare = async (gare, visite) => {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      showToast('Bibliothèque PDF non chargée — recharge la page', 'error');
      return;
    }
    setPdfStatus({ stage: 'Génération du PDF…', current: 0, total: 1 });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const PAGE_W = 210, PAGE_H = 297, MARGIN = 10;
    const CONTENT_W = PAGE_W - 2 * MARGIN;

    // ── HEADER bandeau rouge ──
    doc.setFillColor(200, 16, 46);
    doc.rect(0, 0, PAGE_W, 22, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.text('AREP x G&C - SERM HAUTS-DE-FRANCE', MARGIN, 7);
    doc.setFontSize(16);
    doc.text(gare.nom, MARGIN, 15);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text(`${gare.cat_pro} - ${gare.cat_sgp} - ${gare.secteur}`, MARGIN, 20);
    // Compteur droite
    const stats = visiteStats(gare, visite.data);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text(`${stats.pct}%`, PAGE_W - MARGIN, 14, { align: 'right' });
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.text(`${stats.filled}/${stats.total} critères`, PAGE_W - MARGIN, 19, { align: 'right' });
    doc.setTextColor(0, 0, 0);

    let y = 28;

    // ── META ──
    doc.setFillColor(245, 242, 235);
    doc.rect(MARGIN, y, CONTENT_W, 10, 'F');
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    const auteurStr = visite.auteur || '';
    const isMultipleAuteurs = auteurStr.includes(',');
    doc.text('DATE VISITE', MARGIN + 2, y + 3.5);
    doc.text('MÉTÉO', MARGIN + 50, y + 3.5);
    doc.text(isMultipleAuteurs ? 'ENQUÊTEURS' : 'ENQUÊTEUR', MARGIN + 95, y + 3.5);
    doc.text('UIC', MARGIN + 145, y + 3.5);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text(visite.data?.visite_date || '-', MARGIN + 2, y + 8);
    doc.text(visite.data?.visite_meteo || '-', MARGIN + 50, y + 8);
    doc.text(auteurStr || '-', MARGIN + 95, y + 8);
    doc.text(String(gare.uic), MARGIN + 145, y + 8);
    y += 14;

    // ── SECTIONS ──
    const sections = SECTIONS.filter(s => !s.skipIf || !s.skipIf(gare, visite.data));
    for (const s of sections) {
      const items = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');
      if (items.length === 0) continue;
      const sStats = sectionStats(s, visite.data);

      doc.autoTable({
        startY: y,
        head: [[
          { content: `${String(Math.floor(s.n)).padStart(2,'0')} - ${s.title}`,
            styles: { halign: 'left' } },
          { content: `${sStats.filled}/${sStats.total}`,
            styles: { halign: 'right' } }
        ]],
        body: items.map(c => {
          const raw = visite.data?.[c.id];
          const val = formatValForPDF(c, raw);
          const tags = [];
          if (raw?.photos?.length) tags.push(`[${raw.photos.length} photo${raw.photos.length > 1 ? 's' : ''}]`);
          if (raw?.note) tags.push('[note]');
          return [
            { content: c.label, styles: { halign: 'left' } },
            { content: val + (tags.length ? '   ' + tags.join(' ') : ''),
              styles: { halign: 'left', fontStyle: 'bold' } }
          ];
        }),
        styles: { fontSize: 7.5, cellPadding: { top: 0.8, right: 2, bottom: 0.8, left: 2 },
          lineColor: [230, 230, 230], lineWidth: 0.1 },
        headStyles: { fillColor: [26,26,26], textColor: 255, fontStyle: 'bold', fontSize: 8.5,
          cellPadding: { top: 1.5, right: 2, bottom: 1.5, left: 2 } },
        columnStyles: { 0: { cellWidth: 115 }, 1: { cellWidth: 75 } },
        margin: { left: MARGIN, right: MARGIN },
        theme: 'plain',
        didDrawPage: () => {}
      });
      y = doc.lastAutoTable.finalY + 2;

      // Notes libres significatives en dessous
      const withNotes = items.filter(c => visite.data?.[c.id]?.note);
      if (withNotes.length > 0) {
        doc.setFontSize(6.5);
        doc.setTextColor(80);
        doc.setFont('helvetica', 'italic');
        for (const c of withNotes) {
          const noteText = `${c.label} : ${visite.data[c.id].note}`;
          const wrapped = doc.splitTextToSize(noteText, CONTENT_W - 4);
          if (y + wrapped.length * 2.5 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
          doc.text(wrapped, MARGIN + 2, y + 2);
          y += wrapped.length * 2.5 + 0.5;
        }
        doc.setTextColor(0);
        doc.setFont('helvetica', 'normal');
        y += 1;
      }
      // Saut de page si on est près du bord
      if (y > PAGE_H - 25) { doc.addPage(); y = MARGIN; }
    }

    // ── PHOTOS ──
    const allPhotos = [];
    sections.forEach(s => (s.criteria || []).forEach(c => {
      const photos = visite.data?.[c.id]?.photos || [];
      photos.forEach((p, i) => allPhotos.push({ p, label: c.label, section: s.short, num: i+1 }));
    }));

    if (allPhotos.length > 0) {
      doc.addPage();
      y = MARGIN;
      doc.setFillColor(200, 16, 46);
      doc.rect(0, 0, PAGE_W, 12, 'F');
      doc.setTextColor(255);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.text(`Photothèque - ${allPhotos.length} photo${allPhotos.length > 1 ? 's' : ''}`, MARGIN, 8);
      doc.setTextColor(0);
      doc.setFont('helvetica', 'normal');
      y = 18;

      const COLS = 3, GAP = 3;
      const cellW = (CONTENT_W - (COLS-1) * GAP) / COLS;
      const cellH = cellW * 0.75;
      const captionH = 6;

      setPdfStatus({ stage: 'Téléchargement des photos…', current: 0, total: allPhotos.length });

      // Fetch en parallèle par batch de 4 pour ne pas saturer
      // Pas de resize : on garde la photo originale ET on lit ses dimensions
      // pour préserver son ratio d'aspect dans le PDF (object-fit: contain).
      const BATCH = 4;
      const processed = [];
      for (let i = 0; i < allPhotos.length; i += BATCH) {
        const batch = allPhotos.slice(i, i + BATCH);
        const results = await Promise.all(batch.map(async (ph) => {
          try {
            const dataUrl = await urlToBase64(ph.p.url);
            // Récupérer les dimensions réelles de la photo
            const dims = await new Promise((res, rej) => {
              const img = new Image();
              img.onload = () => res({ w: img.width, h: img.height });
              img.onerror = rej;
              img.src = dataUrl;
            });
            return { ...ph, dataUrl, w: dims.w, h: dims.h };
          } catch (e) { return { ...ph, dataUrl: null }; }
        }));
        processed.push(...results);
        setPdfStatus({ stage: 'Téléchargement des photos…', current: processed.length, total: allPhotos.length });
      }

      setPdfStatus({ stage: 'Mise en page des photos…', current: 0, total: processed.length });

      let col = 0;
      for (let k = 0; k < processed.length; k++) {
        const ph = processed[k];
        if (col === 0 && y + cellH + captionH > PAGE_H - MARGIN) {
          doc.addPage();
          y = MARGIN;
        }
        const x = MARGIN + col * (cellW + GAP);
        // Fond pour combler quand la photo ne remplit pas la cellule
        doc.setFillColor(240, 235, 224);
        doc.rect(x, y, cellW, cellH, 'F');
        if (ph.dataUrl && ph.w && ph.h) {
          // Calculer les dimensions de dessin en préservant le ratio (object-fit: contain)
          const photoRatio = ph.w / ph.h;
          const cellRatio = cellW / cellH;
          let drawW, drawH;
          if (photoRatio > cellRatio) {
            drawW = cellW;
            drawH = cellW / photoRatio;
          } else {
            drawH = cellH;
            drawW = cellH * photoRatio;
          }
          const drawX = x + (cellW - drawW) / 2;
          const drawY = y + (cellH - drawH) / 2;
          try { doc.addImage(ph.dataUrl, 'JPEG', drawX, drawY, drawW, drawH, undefined, 'FAST'); }
          catch (e) { console.warn('addImage failed:', e); }
        } else if (ph.dataUrl) {
          // Pas de dimensions : fallback addImage avec dimensions de cellule
          try { doc.addImage(ph.dataUrl, 'JPEG', x, y, cellW, cellH, undefined, 'FAST'); }
          catch (e) { console.warn('addImage failed:', e); }
        } else {
          doc.setFontSize(6); doc.setTextColor(150);
          doc.text('Image non dispo', x + cellW/2, y + cellH/2, { align: 'center' });
          doc.setTextColor(0);
        }
        // Caption
        doc.setFontSize(5.5);
        doc.setTextColor(80);
        const captionText = `${ph.section} · ${ph.label} #${ph.num}`;
        const truncated = captionText.length > 38 ? captionText.slice(0, 36) + '…' : captionText;
        doc.text(truncated, x, y + cellH + 3);
        doc.setTextColor(0);

        col++;
        if (col === COLS) { col = 0; y += cellH + captionH; }
        setPdfStatus({ stage: 'Mise en page des photos…', current: k + 1, total: processed.length });
      }
    }

    // ── FOOTER sur toutes les pages ──
    const totalPages = doc.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFontSize(6.5);
      doc.setTextColor(150);
      doc.text(
        `SERM HDF · ${gare.nom} · généré le ${new Date().toLocaleDateString('fr-FR')} · page ${p}/${totalPages}`,
        PAGE_W/2, PAGE_H - 5, { align: 'center' }
      );
    }

    // ── SAVE ──
    const safeName = gare.nom.replace(/[^a-zA-Z0-9-]/g, '_');
    const today = new Date().toISOString().slice(0, 10);
    doc.save(`SERM_${safeName}_${today}.pdf`);
    setPdfStatus(null);
    showToast(`PDF généré : ${gare.nom} ✓`, 'success');
  };

  // ===== ÉCRAN DE VERROUILLAGE — rendu après tous les hooks =====
  // Doit être ICI (et pas en haut de App) pour respecter les règles
  // des hooks React (ordre stable à chaque render).
  if (!isUnlocked) {
    return (
      <div style={{
        minHeight: '100dvh', background: 'var(--ink)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20
      }}>
        <div style={{
          background: 'var(--paper-light)', borderRadius: 4,
          padding: '32px 28px', maxWidth: 380, width: '100%',
          boxShadow: '0 20px 60px rgba(0,0,0,0.4)'
        }}>
          <div style={{
            background: 'var(--red)', color: 'white',
            padding: '3px 10px', display: 'inline-block',
            fontSize: 10, fontWeight: 700, letterSpacing: '0.18em', marginBottom: 16
          }}>AREP × G&C</div>
          <h1 style={{
            fontSize: 24, fontWeight: 700, letterSpacing: '-0.025em',
            marginBottom: 6, lineHeight: 1.15
          }}>SERM Hauts-de-France</h1>
          <p style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 24, lineHeight: 1.45 }}>
            Outil de relevé terrain — accès réservé à l'équipe projet.
            Saisis le mot de passe communiqué par Tony pour continuer.
          </p>
          <input
            type="password"
            value={pwdInput}
            onChange={(e) => { setPwdInput(e.target.value); setPwdError(false); }}
            onKeyDown={(e) => { if (e.key === 'Enter') tryUnlock(); }}
            autoFocus
            placeholder="Mot de passe"
            style={{
              width: '100%', padding: '12px 14px', fontSize: 15, fontFamily: 'inherit',
              border: `1.5px solid ${pwdError ? 'var(--red)' : 'var(--border)'}`,
              borderRadius: 2, background: 'var(--white)',
              outline: 'none', marginBottom: 4
            }}
          />
          {pwdError &&
          <div style={{ fontSize: 11.5, color: 'var(--red)', marginTop: 4, marginBottom: 8 }}>
            Mot de passe incorrect.
          </div>
          }
          <button onClick={tryUnlock} style={{
            marginTop: 14, width: '100%', padding: '13px',
            background: 'var(--red)', color: 'var(--paper-light)',
            fontWeight: 600, fontSize: 13.5, letterSpacing: '0.04em', textTransform: 'uppercase',
            borderRadius: 2
          }}>
            Déverrouiller
          </button>
          <p style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 18, lineHeight: 1.5 }}>
            En cas d'oubli, contacte Tony Bégo (AREP Programmation).
          </p>
        </div>
      </div>
    );
  }

  if (route.name === 'home') {
    return <>
      <HomeScreen all={all} auteur={auteur} syncing={syncing}
        onPick={() => setRoute({ name: 'picker' })}
        onOpen={(g) => setRoute({ name: 'form', gareName: g })}
        onChangeAuteur={changeAuteur}
        onExportAll={() => setRoute({ name: 'export' })}
        editMode={editMode && !readOnly}
        onToggleEdit={readOnly ? null : (() => setEditMode(e => !e))}
        onRestoreGrille={readOnly ? null : restoreDefaultGrille}
        readOnly={readOnly}
        isOnline={isOnline}
        pendingCount={pendingCount}
        retryingPhotos={retryingPhotos}
        gridRev={gridRev} />
      {!readOnly && <GridEditModal modal={editModal} onClose={closeGridEdit} apply={applyGridChange} gridRev={gridRev} auteur={auteur} />}
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  if (route.name === 'picker') {
    return <PickerScreen all={all} onBack={() => setRoute({ name: 'home' })} onPick={startVisite} />;
  }
  if (route.name === 'export') {
    return <>
      <ExportScreen all={all}
        onBack={() => setRoute({ name: 'home' })}
        onExport={(visites, format, name) => exportData(visites, format, name)}
        onExportPhotos={exportPhotosZip}
        onPrintPDF={(gareName) => {
          const g = GARES.find(x => x.nom === gareName);
          const v = all[gareName];
          if (g && v) buildPDFForGare(g, v);
        }}
        onExportPPTX={async (gareName) => {
          const g = GARES.find(x => x.nom === gareName);
          const v = all[gareName];
          if (!g || !v) return;
          try {
            await buildPptxAREP(g, v, auteur);
            showToast('Fiche PPTX générée ✓', 'success');
          } catch (e) {
            console.error('PPTX:', e);
            showToast('Erreur génération PPTX', 'error');
          } finally {
            setPdfStatus(null);
          }
        }}
        pdfStatus={pdfStatus}
        syncing={syncing} />
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  if (route.name === 'form') {
    const g = GARES.find((x) => x.nom === route.gareName);
    const v = all[route.gareName];
    if (!g || !v) { setTimeout(() => setRoute({ name: 'home' })); return null; }
    return <>
      <FormScreen gare={g} visite={v} onUpdate={updateVisite}
        onBack={() => setRoute({ name: 'home' })}
        onOverview={() => setRoute({ name: 'overview', gareName: g.nom })}
        onToast={showToast}
        editMode={editMode && !readOnly}
        onToggleEdit={readOnly ? null : (() => setEditMode(e => !e))}
        onEditCrit={(sid, cid) => openGridEdit('edit-crit', sid, cid)}
        onAddCrit={(sid) => openGridEdit('add-crit', sid)}
        onDeleteCrit={confirmDeleteCrit}
        onEditSection={(sid) => openGridEdit('edit-section', sid)}
        onAddSection={() => openGridEdit('add-section')}
        onDeleteSection={confirmDeleteSection}
        readOnly={readOnly}
        gridRev={gridRev} />
      {!readOnly && <GridEditModal modal={editModal} onClose={closeGridEdit} apply={applyGridChange} gridRev={gridRev} auteur={auteur} />}
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  if (route.name === 'overview') {
    const g = GARES.find((x) => x.nom === route.gareName);
    const v = all[route.gareName];
    if (!g || !v) { setTimeout(() => setRoute({ name: 'home' })); return null; }
    return <>
      <OverviewScreen gare={g} visite={v}
        onBack={() => setRoute({ name: 'form', gareName: g.nom })}
        onZone={(id) => setRoute({ name: 'form', gareName: g.nom, jumpTo: id })}
        onExport={() => exportData([v], 'xlsx', `releve_${g.nom}`)}
        onPrintPDF={() => buildPDFForGare(g, v)}
        onDelete={readOnly ? null : (() => deleteVisite(g.nom))}
        gridRev={gridRev} />
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  return null;
}

/* ============================================================
   PRINT SCREEN — fiche imprimable A4 d'une gare
   Utilise window.print() avec un CSS @media print dédié.
   Pour générer un PDF : Ctrl+P → Enregistrer en PDF.
   ============================================================ */
function PrintScreen({ gare, visite, onBack }) {
  const sections = SECTIONS.filter((s) => !s.skipIf || !s.skipIf(gare, visite.data));
  const stats = visiteStats(gare, visite.data);
  const dateStr = new Date(visite.updated || Date.now()).toLocaleDateString('fr-FR',
    { day: 'numeric', month: 'long', year: 'numeric' });
  const visiteDate = visite.data?.visite_date || '-';
  const meteo = visite.data?.visite_meteo || '-';

  // Helper pour afficher la valeur d'un critère
  const renderVal = (c, raw) => {
    if (raw && typeof raw === 'object' && raw.na === true) return <em style={{ color: '#888' }}>N/A</em>;
    const v = getVal(raw);
    if (v == null || v === '') return <span style={{ color: '#aaa' }}>—</span>;
    if (Array.isArray(v)) return v.join(', ');
    if (typeof v === 'object') {
      const parts = [];
      if (v.presence === 'yes') parts.push('Présent');
      if (v.presence === 'no') parts.push('Absent');
      if (v.nb != null && v.nb !== '') parts.push(`n=${v.nb}`);
      if (v.etat != null) parts.push(`état ${Math.round(v.etat*100)}%`);
      return parts.join(' · ') || '—';
    }
    if (c.type === 'rating' && c.labels && typeof v === 'number') { const idx = Math.round(v * (c.labels.length - 1)); return c.labels[idx] || `Note ${v}`; }
    return String(v);
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', background: '#E5E5E5' }}>
      {/* TOP BAR — masquée à l'impression */}
      <div className="no-print" style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '12px 18px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'sticky', top: 0, zIndex: 10 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 13 }}>← Retour</button>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <span style={{ fontSize: 11, opacity: 0.7 }}>Aperçu fiche · Ctrl+P pour imprimer / enregistrer en PDF</span>
          <button onClick={() => window.print()} style={{
            background: 'var(--red)', color: 'white', padding: '6px 14px',
            fontSize: 12, fontWeight: 600, borderRadius: 2
          }}>📄 Imprimer / PDF</button>
        </div>
      </div>

      <style>{`
        @media print {
          .no-print { display: none !important; }
          body { background: white !important; margin: 0 !important; }
          .print-page { box-shadow: none !important; margin: 0 !important; width: 100% !important; min-height: auto !important; }
          .pagebreak { page-break-before: always; }
          /* Pas de page-break-after sur h2 : on accepte un titre en bas de page
             pour mieux remplir l'espace */
          table { page-break-inside: auto; }
          tr { page-break-inside: avoid; page-break-after: auto; }
          thead { display: table-row-group; }
        }
        @page { size: A4 portrait; margin: 7mm 7mm 8mm; }
      `}</style>

      {/* PAGE A4 */}
      <div className="print-page" style={{
        background: 'white', width: '210mm', margin: '20px auto',
        padding: '7mm 8mm', boxShadow: '0 2px 20px rgba(0,0,0,0.1)',
        fontSize: 8.5, lineHeight: 1.3, color: '#1A1A1A'
      }}>
        {/* HEADER FICHE */}
        <div style={{ borderBottom: '2px solid #C8102E', paddingBottom: 6, marginBottom: 10,
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
          <div>
            <div style={{ background: '#C8102E', color: 'white', padding: '2px 6px', display: 'inline-block',
              fontSize: 8.5, fontWeight: 700, letterSpacing: '0.18em', marginBottom: 4 }}>AREP × G&C · SERM HDF</div>
            <h1 style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em', margin: 0 }}>{gare.nom}</h1>
            <div style={{ fontSize: 9, color: '#666', marginTop: 1 }}>
              {gare.cat_pro} · {gare.cat_sgp} · ligne {gare.ligne_flux} · {gare.secteur}
            </div>
          </div>
          <div style={{ textAlign: 'right', fontSize: 8.5, color: '#666' }}>
            <div>UIC {gare.uic}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: stats.pct === 100 ? '#1D5E3A' : '#C77800', marginTop: 2 }}>
              {stats.pct}%
            </div>
            <div style={{ fontSize: 8 }}>{stats.filled}/{stats.total} critères</div>
          </div>
        </div>

        {/* META */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 6,
          fontSize: 8.5, marginBottom: 10, background: '#F5F2EB', padding: '6px 8px' }}>
          <div><strong>Date visite</strong><br/>{visiteDate}</div>
          <div><strong>Météo</strong><br/>{meteo}</div>
          <div><strong>Enquêteur</strong><br/>{visite.auteur || '—'}</div>
          <div><strong>Dernière modif</strong><br/>{dateStr}</div>
        </div>

        {/* SECTIONS */}
        {sections.map((s) => {
          const sStats = sectionStats(s, visite.data);
          const items = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');
          if (items.length === 0) return null;
          return (
            <div key={s.id} style={{ marginBottom: 8 }}>
              <div style={{ borderBottom: '1px solid #1A1A1A', paddingBottom: 2, marginBottom: 4,
                display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <h2 style={{ fontSize: 10.5, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', margin: 0 }}>
                  {String(Math.floor(s.n)).padStart(2, '0')} · {s.title}
                </h2>
                <span style={{ fontSize: 8.5, color: '#666' }}>{sStats.filled}/{sStats.total}</span>
              </div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 8.5 }}>
                <tbody>
                {items.map(c => (
                  <tr key={c.id} style={{ borderBottom: '1px dotted #E0E0E0' }}>
                    <td style={{ padding: '2px 4px 2px 0', width: '55%', verticalAlign: 'top' }}>{c.label}</td>
                    <td style={{ padding: '2px 4px', fontWeight: 600, width: '32%', verticalAlign: 'top' }}>
                      {renderVal(c, visite.data?.[c.id])}
                    </td>
                    <td style={{ padding: '2px 0 2px 4px', fontSize: 7.5, color: '#999',
                      textAlign: 'right', verticalAlign: 'top', width: '13%' }}>
                      {(() => {
                        const d = visite.data?.[c.id];
                        const photos = d?.photos || [];
                        const note = d?.note || '';
                        const tags = [];
                        if (photos.length) tags.push(`📷${photos.length}`);
                        if (note) tags.push('📝');
                        return tags.join(' ');
                      })()}
                    </td>
                  </tr>
                ))}
                </tbody>
              </table>
              {/* Notes libres significatives */}
              {items.some(c => visite.data?.[c.id]?.note) &&
              <div style={{ marginTop: 3, fontSize: 7.5, color: '#444', lineHeight: 1.3 }}>
                {items.filter(c => visite.data?.[c.id]?.note).map(c => (
                  <div key={c.id}>
                    <em>{c.label} :</em> {visite.data[c.id].note}
                  </div>
                ))}
              </div>}
            </div>
          );
        })}

        {/* PHOTOS RÉCAP — page suivante */}
        {(() => {
          const allPhotos = [];
          sections.forEach(s => (s.criteria || []).forEach(c => {
            const d = visite.data?.[c.id];
            if (d?.photos) d.photos.forEach((p, i) => allPhotos.push({ p, label: c.label, section: s.short, num: i+1 }));
          }));
          if (allPhotos.length === 0) return null;
          return (
            <div className="pagebreak" style={{ marginTop: 24, paddingTop: 14, borderTop: '2px solid #C8102E' }}>
              <h2 style={{ fontSize: 13, fontWeight: 700, marginBottom: 10,
                textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                Photothèque · {allPhotos.length} photo{allPhotos.length > 1 ? 's' : ''}
              </h2>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
                {allPhotos.map((ph, i) => (
                  <div key={i} style={{ breakInside: 'avoid' }}>
                    <div style={{ width: '100%', aspectRatio: '4/3',
                      background: '#F0EBE0', border: '1px solid #D9D3C4',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
                      <img src={ph.p.url} alt="" style={{
                        maxWidth: '100%', maxHeight: '100%',
                        objectFit: 'contain', display: 'block' }} />
                    </div>
                    <div style={{ fontSize: 7.5, color: '#666', marginTop: 2, lineHeight: 1.2 }}>
                      <strong>{ph.section}</strong> · {ph.label} #{ph.num}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* FOOTER */}
        <div style={{ marginTop: 24, paddingTop: 8, borderTop: '1px solid #ccc',
          fontSize: 7.5, color: '#888', textAlign: 'center' }}>
          Fiche générée le {new Date().toLocaleString('fr-FR')} · SERM Hauts-de-France · AREP × Gares & Connexions
        </div>
      </div>
    </div>
  );
}

function PDFProgressOverlay({ status }) {
  if (!status) return null;
  const pct = status.total > 0 ? Math.round((status.current / status.total) * 100) : 0;
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 999,
      background: 'rgba(26,26,26,0.85)', backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
      <div style={{ background: 'var(--white)', padding: '24px 28px', borderRadius: 4,
        maxWidth: 360, width: '90%', textAlign: 'center' }}>
        <div style={{ fontSize: 28, marginBottom: 10 }}>📄</div>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>{status.stage}</div>
        <div style={{ background: 'var(--paper-deep)', height: 6, borderRadius: 99, overflow: 'hidden' }}>
          <div style={{ background: 'var(--red)', height: '100%', width: `${pct}%`,
            transition: 'width 0.2s' }} />
        </div>
        <div style={{ fontSize: 11, color: 'var(--taupe)', marginTop: 8 }}>
          {status.current} / {status.total} · {pct}%
        </div>
      </div>
    </div>
  );
}

function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 30, left: '50%', transform: 'translateX(-50%)',
      background: toast.type === 'success' ? 'var(--green)' : toast.type === 'error' ? 'var(--red)' : 'var(--ink)',
      color: 'var(--paper-light)', padding: '10px 18px',
      fontSize: 13, fontWeight: 500, borderRadius: 2, boxShadow: 'var(--shadow-lg)',
      zIndex: 1000, letterSpacing: '0.02em', maxWidth: '80vw'
    }}>{toast.msg}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
