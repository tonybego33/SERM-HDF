        carac_quais_nb_acc: g.quais,
        // Pré-remplir la typologie SRADDET d'après cat_pro qui suit le même format
        synth_typo_sraddet: g.cat_pro || ''
      };
      const newV = { gare: gareName, data: initialData, updated: Date.now(), auteur };
      setAll((a) => ({ ...a, [gareName]: newV }));
      // Mise en file d'attente fiable : la création initiale passe par le buffer
      // (pendingCriteres + pendingState + pendingMetaFlag). Le ré-essai périodique
      // garantit l'envoi même si le réseau est instable au moment de la création.
      if (!pendingCriteres.current[gareName]) pendingCriteres.current[gareName] = new Set();
      Object.entries(initialData).forEach(([cid, val]) => {
        if (val !== undefined && val !== null && val !== '') {
          pendingCriteres.current[gareName].add(cid);
        }
      });
      pendingMetaFlag.current[gareName] = true;
      pendingState.current[gareName] = newV;
      debouncedPush(newV);
    }
    setRoute({ name: 'form', gareName });
  };

  /* ============================================================
     COUCHE SYNC — granularité CRITÈRE (v2026-06-09 · 4)
     ============================================================
     Problèmes résolus :
       - % qui divergent entre téléphones (4% / 16% / 30%)
       - saisies d'un collègue invisibles tant que je travaille sur la même gare
       - données qui "apparaissent / disparaissent" au gré des pulls
     Approche : tant qu'un CRITÈRE local n'est pas confirmé par le serveur, on le
     garde dans pendingState/pendingCriteres. La fusion (mergeServerState) part
     TOUJOURS de l'état serveur et ne re-superpose que mes critères non confirmés.
     Plus aucun verrou au niveau de la gare entière (l'ancien pendingState +
     lastLocalEdit/PROTECT_MS au niveau gare était la cause des divergences).
     ============================================================ */
  const pendingPushes = useRef({});  // gareName -> timeoutId (push en attente)
  const pendingState = useRef({});   // gareName -> visite locale (source des valeurs en attente)
  // v71 : buffer des critères modifiés à push (par gare) — c'est CE set qui définit
  // ce que la fusion protège du serveur, critère par critère.
  const pendingCriteres = useRef({}); // gareName -> Set<critereId>
  const pendingMetaFlag = useRef({}); // gareName -> bool (meta visite à push)

  const debouncedPush = useCallback((visite) => {
    const gn = visite.gare;
    // ⚠ Verrouille IMMÉDIATEMENT la version locale avant le timer.
    // Ainsi, même si un realtime arrive AVANT le push, le merge garde le local.
    pendingState.current[gn] = visite;

    if (pendingPushes.current[gn]) clearTimeout(pendingPushes.current[gn]);
    pendingPushes.current[gn] = setTimeout(async () => {
      delete pendingPushes.current[gn];
      // On lit la DERNIÈRE version locale connue (pendingState), pas le snapshot
      // figé : ainsi un re-essai pousse les valeurs à jour.
      const local = pendingState.current[gn] || visite;
      const critSet = pendingCriteres.current[gn];
      const critsToFlush = critSet ? Array.from(critSet) : [];
      const flushMeta = pendingMetaFlag.current[gn] === true;
      if (critsToFlush.length === 0 && !flushMeta) return; // rien à envoyer
      const me = auteur || (typeof localStorage !== 'undefined' ? localStorage.getItem('serm-auteur') : null) || 'Anonyme';

      try {
        // Push CHAQUE critère modifié individuellement (multi-user safe)
        await Promise.all(critsToFlush.map(cid => {
          const val = local.data?.[cid];
          if (val === undefined || val === null) {
            return deleteCritereFromSupa(gn, cid); // critère effacé → suppression serveur
          }
          return pushCritereToSupa(gn, cid, val, me);
        }));
        if (flushMeta) await pushVisiteMetaToSupa(local);
      } catch (e) {
        // ÉCHEC réseau : on NE VIDE PAS le buffer → les critères restent en
        // attente et seront RÉ-ESSAYÉS (retry périodique) jusqu'à succès. On
        // garde aussi pendingState. → plus aucune saisie perdue en silence.
        console.warn('Envoi échoué, sera réessayé:', e);
        return;
      }
      // SUCCÈS : on retire du buffer UNIQUEMENT ce qu'on vient de confirmer
      // (sans toucher aux critères ajoutés entre-temps par une nouvelle saisie).
      if (critSet) critsToFlush.forEach(cid => critSet.delete(cid));
      if (flushMeta) pendingMetaFlag.current[gn] = false;
      // Si plus rien en attente, on libère la protection locale 3 s plus tard
      // (absorbe les échos realtime retardés), sauf si une nouvelle saisie est
      // arrivée entre-temps (pendingState réécrit → un autre push prendra le relais).
      setTimeout(() => {
        const stillPending = (pendingCriteres.current[gn] && pendingCriteres.current[gn].size > 0) || pendingMetaFlag.current[gn] === true;
        if (!stillPending && pendingState.current[gn] === local) {
          delete pendingState.current[gn];
        }
      }, 3000);
    }, 800);
  }, [auteur]);

  // ── FILET DE SÉCURITÉ : ré-essai des envois en attente ───────────────────
  // Sur réseau instable (gares), un envoi peut échouer. Les critères concernés
  // restent dans pendingCriteres ; on les rejoue toutes les 8 s, au retour de
  // connexion et au retour sur l'appli, jusqu'à confirmation serveur. C'est ce
  // qui garantit que les saisies finissent TOUTES par arriver → plus de
  // pourcentages qui divergent entre appareils.
  useEffect(() => {
    if (readOnly) return;
    const flushPending = () => {
      Object.keys(pendingCriteres.current).forEach(gn => {
        const hasCrit = pendingCriteres.current[gn] && pendingCriteres.current[gn].size > 0;
        const hasMeta = pendingMetaFlag.current[gn] === true;
        if (!hasCrit && !hasMeta) return;
        const v = pendingState.current[gn];
        if (v) debouncedPush(v);
      });
    };
    const id = setInterval(flushPending, 20000);
    window.addEventListener('online', flushPending);
    window.addEventListener('focus', flushPending);
    return () => {
      clearInterval(id);
      window.removeEventListener('online', flushPending);
      window.removeEventListener('focus', flushPending);
    };
  }, [debouncedPush, readOnly]);

  const updateVisite = (v) => {
    if (readOnly) return; // Mode consultation - aucune écriture
    // Accumuler les enquêteurs : si plusieurs personnes ont contribué, on garde toute la liste
    const existing = v.auteur || '';
    const auteurs = new Set(existing.split(',').map(s => s.trim()).filter(Boolean));
    if (auteur) auteurs.add(auteur);
    const updated = { ...v, auteur: [...auteurs].join(', '), updated: new Date().toISOString() };

    // v71 : calculer le diff vs ancienne visite pour identifier les critères modifiés
    const prevVisite = all[v.gare] || { data: {}, auteur: '' };
    const prevData = prevVisite.data || {};
    const newData = updated.data || {};
    const allCritIds = new Set([...Object.keys(prevData), ...Object.keys(newData)]);

    if (!pendingCriteres.current[v.gare]) {
      pendingCriteres.current[v.gare] = new Set();
    }
    allCritIds.forEach(cid => {
      // Compare structurellement (JSON.stringify suffit pour nos objets simples)
      const a = prevData[cid], b = newData[cid];
      if (JSON.stringify(a) !== JSON.stringify(b)) {
        pendingCriteres.current[v.gare].add(cid);
      }
    });
    // Meta visite changée ?
    if (prevVisite.auteur !== updated.auteur ||
        prevData.visite_date !== newData.visite_date) {
      pendingMetaFlag.current[v.gare] = true;
    }

    setAll((a) => ({ ...a, [v.gare]: updated }));
    debouncedPush(updated);
  };

  const deleteVisite = async (gareName, opts = {}) => {
    if (readOnly) { alert('Mode consultation - suppression désactivée'); return; }
    const typed = prompt(`⚠ Suppression IRRÉVERSIBLE de la visite "${gareName}".\n\nToutes les données saisies ET les photos seront perdues.\n\nPour confirmer, tape exactement le nom de la gare :`);
    if (typed === null) return; // Annulé
    if (typed.trim() !== gareName) {
      alert('Nom incorrect - suppression annulée.');
      return;
    }
    setAll((a) => { const next = { ...a }; delete next[gareName]; return next; });
    await deleteVisiteRemote(gareName);
    showToast('Visite supprimée');
    if (!opts.stay) setRoute({ name: 'home' });
  };

  const changeAuteur = () => {
    const n = (prompt('Ton prénom ou tes initiales ?', auteur) || '').trim();
    if (n) {
      setAuteur(n);
      localStorage.setItem('serm-auteur', n);
    }
  };

  /* ===== EXPORT - multi-format (CSV / Excel / JSON) avec choix de scope ===== */
  const csvEscape = (v) => {
    if (v == null) return '';
    const s = String(v);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  /* Construit un tableau 2D : [headers, ...rows] à partir d'une liste de visites */
  const buildTable = (visites) => {
    const headerMeta = ['gare', 'typologie', 'cat_pro', 'cat_sgp', 'ligne_flux', 'axe', 'secteur', 'auteur', 'updated', 'progression_pct'];
    const headerCrit = [];
    SECTIONS.forEach((s) => {
      (s.criteria || []).forEach((c) => {
        if (c.type === 'subhead') return; // séparateurs visuels - exclus de l'export
        headerCrit.push(`${s.id}__${c.id}__val`);
        headerCrit.push(`${s.id}__${c.id}__note`);
        headerCrit.push(`${s.id}__${c.id}__photos`);
      });
    });
    const headers = [...headerMeta, ...headerCrit];
    const rows = [];
    visites.forEach((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      const stats = g ? visiteStats(g, v.data) : { pct: 0 };
      const row = [
        v.gare,
        g?.cat_sgp || '',
        g?.cat_pro || '', g?.cat_sgp || '', g?.ligne_flux || '', g?.axe || '', g?.secteur || '',
        v.auteur || '',
        new Date(v.updated || Date.now()).toISOString(),
        stats.pct
      ];
      SECTIONS.forEach((s) => {
        (s.criteria || []).forEach((c) => {
          if (c.type === 'subhead') return;
          const d = v.data?.[c.id];
          let val = '', note = '', photos = '';
          if (Array.isArray(d)) {
            // multi-select : on joint les choix par " | "
            val = d.join(' | ');
          } else if (d != null && typeof d === 'object') {
            note = d.note || '';
            photos = (d.photos || []).map((p) => p.url || '').join(' | ');
            // Composite (pn/pne) : on sérialise presence + nb [+ etat]
            if ('presence' in d && !('val' in d)) {
              const parts = [d.presence === 'yes' ? 'présent' : d.presence === 'no' ? 'absent' : ''];
              if (d.nb != null && d.nb !== '' && d.presence === 'yes') parts.push(`nb=${d.nb}`);
              if (d.etat != null && d.presence === 'yes') {
                const labels = ['Mauvais', 'Moyen', 'Bon', 'Très bon'];
                const idx = [0, 0.33, 0.66, 1].indexOf(d.etat);
                parts.push(`état=${idx >= 0 ? labels[idx] : d.etat}`);
              }
              val = parts.filter(Boolean).join(' / ');
            } else if ('val' in d) {
              const inner = d.val;
              val = Array.isArray(inner) ? inner.join(' | ') : (inner != null ? inner : '');
            }
          } else {
            val = d != null ? d : '';
          }
          row.push(val); row.push(note); row.push(photos);
        });
      });
      rows.push(row);
    });
    return { headers, rows };
  };
  const downloadBlob = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  };
  const exportData = (visites, format, baseName) => {
    if (visites.length === 0) { showToast('Aucune visite à exporter', 'error'); return; }
    const today = new Date().toISOString().slice(0, 10);
    const safeName = baseName.replace(/[^a-z0-9_-]/gi, '_');
    if (format === 'csv') {
      const { headers, rows } = buildTable(visites);
      const csv = '\uFEFF' + [headers, ...rows].map((r) => r.map(csvEscape).join(';')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      downloadBlob(blob, `${safeName}_${today}.csv`);
      showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success');
    } else if (format === 'xlsx') {
      // Génération stylée avec ExcelJS (asynchrone, lance en background)
      buildExcelPretty(visites, safeName, today)
        .then(() => showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success'))
        .catch((e) => { console.error('Excel export:', e); showToast('Erreur export Excel', 'error'); });
    } else if (format === 'json') {
      const payload = {
        exported_at: new Date().toISOString(),
        exported_by: auteur,
        n_visites: visites.length,
        visites: visites.map((v) => ({
          gare: v.gare,
          gare_info: GARES.find((g) => g.nom === v.gare) || null,
          typologie: (() => { const g = GARES.find((x) => x.nom === v.gare); return g?.cat_sgp || null; })(),
          auteur: v.auteur || null,
          updated: v.updated || null,
          data: v.data || {}
        }))
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      downloadBlob(blob, `${safeName}_${today}.json`);
      showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success');
    }
  };

  /* ===========================================================
     EXPORT EXCEL STYLÉ (ExcelJS) - multi-onglets façon base de données pro
     Onglets : Base de données / Suivi visites / Méthodologie
     =========================================================== */


  const SECTION_COLORS = {
    carac:     '#C8102E', // rouge AREP
    parking:   '#567B8F', // bleu acier
    parking2:  '#567B8F',
    parvis:    '#9E0B24', // rouge bordeaux
    velos:     '#6B8E4E', // vert olive
    tc:        '#D17B0F', // orange
    bv:        '#7A4E8C', // violet
    franch:    '#B85450', // saumon
    quais:     '#1D5E3A', // vert foncé
    pmr:       '#444444', // gris
    synthese:  '#1A1A1A'  // noir
  };
  const IDENTITY_COLOR = '#1A1A1A';
  const BUREAU_COLOR = '#2B3A4A';
  const META_COLOR = '#6B6259';

  // Format human-readable d'une valeur de critère pour Excel
  const formatValForExcel = (c, raw) => {
    if (raw && typeof raw === 'object' && raw.na === true) return 'N/A';
    const v = getVal(raw);
    if (v == null || v === '') return '';
    if (Array.isArray(v)) return v.join(', ');
    if (typeof v === 'object') {
      const parts = [];
      if (v.presence === 'yes') parts.push('Présent');
      if (v.presence === 'no') parts.push('Absent');
      if (v.nb != null && v.nb !== '') parts.push(`n=${v.nb}`);
      if (v.etat != null) {
        const labels = ['mauvais', 'moyen', 'bon', 'très bon'];
        parts.push(`état: ${labels[Math.round(v.etat*3)] || ''}`);
      }
      return parts.join(' · ');
    }
    if (c.type === 'rating' && c.labels && typeof v === 'number') { const idx = Math.round(v * (c.labels.length - 1)); return c.labels[idx] || `Note ${v}`; }
    // yes/no stocké en chaîne 'yes'/'no' (ou booléen) -> libellé français
    if (v === 'yes' || v === true)  return c.type === 'yesno' ? 'Oui' : 'Présent';
    if (v === 'no'  || v === false) return c.type === 'yesno' ? 'Non' : 'Absent';
    return String(v);
  };

  /* ===== EXPORT SYNTHÈSE COMPARATIVE (Excel, 1 ligne / gare) ===== */
  const buildSynthExcel = async (visites, today) => {
    if (!window.ExcelJS) throw new Error('ExcelJS non chargé');
    // Helpers : lecture dynamique des libellés depuis SECTIONS
    const findCrit = (id) => {
      for (const s of SECTIONS) { const c = (s.criteria || []).find((x) => x.id === id); if (c) return c; }
      return null;
    };
    const ratingLabel = (data, id) => {
      const c = findCrit(id); const raw = data?.[id];
      const v = raw && typeof raw === 'object' ? raw.val : raw;
      if (typeof v !== 'number' || !c?.labels) return '';
      return c.labels[Math.round(v * (c.labels.length - 1))] || '';
    };
    const yesNo = (data, id) => { const raw = data?.[id]; const v = raw && typeof raw === 'object' ? raw.val : raw; return v === 'yes' ? 'Oui' : v === 'no' ? 'Non' : ''; };
    const noteOf = (data, id) => { const raw = data?.[id]; return (raw && raw.note) ? String(raw.note) : ''; };

    const cols = [
      { h: 'Gare', w: 26, get: (g, v) => g.nom },
      { h: 'Secteur', w: 20, get: (g) => g.secteur },
      { h: 'Ligne', w: 9, get: (g) => g.ligne_flux },
      { h: 'Priorité', w: 14, get: (g, v) => ratingLabel(v.data, 'priorite_terrain') },
      { h: 'Vétusté', w: 15, get: (g, v) => ratingLabel(v.data, 'synth_vetuste') },
      { h: 'Sécurité ressentie', w: 18, get: (g, v) => ratingLabel(v.data, 'sens_securite') },
      { h: 'Ambiance', w: 16, get: (g, v) => ratingLabel(v.data, 'sens_ambiance') },
      { h: 'Propreté', w: 14, get: (g, v) => ratingLabel(v.data, 'sens_proprete') },
      { h: "Confort d'attente", w: 16, get: (g, v) => ratingLabel(v.data, 'sens_confort_attente') },
      { h: 'Lisibilité', w: 14, get: (g, v) => ratingLabel(v.data, 'sens_lisibilite') },
      { h: 'Intégration urbaine', w: 18, get: (g, v) => ratingLabel(v.data, 'sens_integration') },
      { h: 'Alerte sécurité', w: 14, get: (g, v) => yesNo(v.data, 'alerte_secu') },
      { h: 'Alerte saturation', w: 14, get: (g, v) => yesNo(v.data, 'alerte_saturation') },
      { h: 'Manque équipement', w: 16, get: (g, v) => yesNo(v.data, 'synth_manque_equip') },
      { h: 'Enjeux clés', w: 45, get: (g, v) => noteOf(v.data, 'synth_enjeux') },
      { h: 'Points forts', w: 40, get: (g, v) => noteOf(v.data, 'synth_points_forts') },
      { h: 'Retours agents/usagers', w: 40, get: (g, v) => noteOf(v.data, 'synth_retours_agents') },
      { h: '% complétion', w: 12, get: (g, v) => visiteStats(g, v.data).pct / 100 },
      { h: 'Enquêteur(s)', w: 20, get: (g, v) => v.auteur || '' }
    ];

    const wb = new window.ExcelJS.Workbook();
    wb.creator = 'SERM HDF · AREP';
    wb.created = new Date();
    const ws = wb.addWorksheet('Synthèse comparative', { views: [{ state: 'frozen', xSplit: 1, ySplit: 5, showGridLines: false }] });

    // Titre
    ws.mergeCells('A2:D2');
    const t = ws.getCell('A2');
    t.value = 'SYNTHÈSE COMPARATIVE · SERM HDF';
    t.font = { name: 'Arial', size: 16, bold: true, color: { argb: 'FF1A1A1A' } };
    ws.getRow(2).height = 24;
    ws.mergeCells('A3:D3');
    const sub = ws.getCell('A3');
    sub.value = `${visites.length} gare${visites.length > 1 ? 's' : ''} · exporté le ${new Date().toLocaleString('fr-FR')}`;
    sub.font = { name: 'Arial', size: 10, italic: true, color: { argb: 'FF6B6259' } };

    // En-tête (ligne 5)
    const HEAD = 5;
    cols.forEach((c, i) => {
      const cell = ws.getCell(HEAD, i + 1);
      cell.value = c.h;
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
      cell.font = { name: 'Arial', size: 9.5, bold: true, color: { argb: 'FFFFFFFF' } };
      cell.alignment = { vertical: 'middle', horizontal: 'left', wrapText: true };
      ws.getColumn(i + 1).width = c.w;
    });
    ws.getRow(HEAD).height = 28;

    // Couleur de fond selon le niveau (pour priorité/vétusté/ressenti)
    const cellTint = (id, data) => {
      const c = findCrit(id); const raw = data?.[id];
      const v = raw && typeof raw === 'object' ? raw.val : raw;
      if (typeof v !== 'number' || !c?.labels) return null;
      const idx = Math.round(v * (c.labels.length - 1));
      const tints = ['FFF7D5D5', 'FFF6E2CC', 'FFF3EDCB', 'FFD6E8DC']; // rouge clair -> vert clair
      return tints[idx] || null;
    };
    const sensIds = { 4: 'priorite_terrain', 5: 'synth_vetuste', 6: 'sens_securite', 7: 'sens_ambiance', 8: 'sens_proprete', 9: 'sens_confort_attente', 10: 'sens_lisibilite', 11: 'sens_integration' };

    // Données triées par priorité (Critique en haut)
    const rows = visites.map((v) => ({ v, g: GARES.find((x) => x.nom === v.gare) })).filter((r) => r.g);
    rows.sort((a, b) => {
      const ra = a.v.data?.priorite_terrain, rb = b.v.data?.priorite_terrain;
      const pa = typeof (ra && ra.val !== undefined ? ra.val : ra) === 'number' ? (ra.val !== undefined ? ra.val : ra) : 99;
      const pb = typeof (rb && rb.val !== undefined ? rb.val : rb) === 'number' ? (rb.val !== undefined ? rb.val : rb) : 99;
      return pa - pb;
    });

    rows.forEach((r, ri) => {
      const rowIdx = HEAD + 1 + ri;
      cols.forEach((c, ci) => {
        const cell = ws.getCell(rowIdx, ci + 1);
        cell.value = c.get(r.g, r.v);
        cell.font = { name: 'Arial', size: 9.5, color: { argb: 'FF1A1A1A' } };
        cell.alignment = { vertical: 'top', horizontal: ci === 17 ? 'center' : 'left', wrapText: ci >= 14 && ci <= 16 };
        if (ci === 0) cell.font = { name: 'Arial', size: 9.5, bold: true, color: { argb: 'FF1A1A1A' } };
        if (ci === 17) cell.numFmt = '0%';
        // Teinte de fond pour les colonnes de ressenti/priorité
        if (sensIds[ci]) {
          const argb = cellTint(sensIds[ci], r.v.data);
          if (argb) cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb } };
        }
        cell.border = { bottom: { style: 'thin', color: { argb: 'FFE8E8E8' } } };
      });
    });

    ws.autoFilter = { from: { row: HEAD, column: 1 }, to: { row: HEAD, column: cols.length } };

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    downloadBlob(blob, `synthese_comparative_SERM_HDF_${today}.xlsx`);
  };

  /* ===== EXPORT SYNTHÈSE COMPARATIVE (PDF paysage, comme la vue écran) ===== */
  const buildSynthPDF = (visites) => {
    if (!window.jspdf || !window.jspdf.jsPDF) { showToast('Bibliothèque PDF non chargée - recharge la page', 'error'); return; }
    const rows0 = visites.map((v) => ({ v, g: GARES.find((x) => x.nom === v.gare) })).filter((r) => r.g);
    if (rows0.length === 0) { showToast('Aucune gare à synthétiser', 'error'); return; }

    const findCrit = (id) => { for (const s of SECTIONS) { const c = (s.criteria || []).find((x) => x.id === id); if (c) return c; } return null; };
    const ratingIdx = (data, id) => {
      const c = findCrit(id); const raw = data?.[id];
      const v = raw && typeof raw === 'object' ? raw.val : raw;
      if (typeof v !== 'number' || !c?.labels) return -1;
      return Math.round(v * (c.labels.length - 1));
    };
    const ratingLabel = (data, id) => { const c = findCrit(id); const i = ratingIdx(data, id); return i < 0 ? '-' : (c.labels[i] || '-'); };
    const yes = (data, id) => { const raw = data?.[id]; const v = raw && typeof raw === 'object' ? raw.val : raw; return v === 'yes'; };

    // idx 0..3 -> couleurs de fond (claires) et texte
    const FILL = [[245, 213, 213], [246, 226, 204], [243, 237, 203], [214, 232, 220]];
    const TEXTC = [[150, 20, 30], [150, 80, 20], [110, 95, 10], [20, 80, 50]];

    // Tri par priorité (Critique en haut)
    rows0.sort((a, b) => {
      const ia = ratingIdx(a.v.data, 'priorite_terrain'); const ib = ratingIdx(b.v.data, 'priorite_terrain');
      return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
    });

    const sensCols = [
      { id: 'priorite_terrain', head: 'Priorité' },
      { id: 'synth_vetuste', head: 'Vétusté' },
      { id: 'sens_securite', head: 'Sécurité' },
      { id: 'sens_ambiance', head: 'Ambiance' },
      { id: 'sens_proprete', head: 'Propreté' },
      { id: 'sens_confort_attente', head: 'Confort' },
      { id: 'sens_lisibilite', head: 'Lisibilité' },
      { id: 'sens_integration', head: 'Intégration' }
    ];

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const PAGE_W = doc.internal.pageSize.getWidth();
    const MARGIN = 8;

    // En-tête
    doc.setFillColor(26, 26, 26);
    doc.rect(0, 0, PAGE_W, 16, 'F');
    doc.setTextColor(255); doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.text('SYNTHÈSE COMPARATIVE · SERM HDF', MARGIN, 10);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
    doc.text(`${rows0.length} gare${rows0.length > 1 ? 's' : ''} · ${new Date().toLocaleDateString('fr-FR')} · tri par priorité`, PAGE_W - MARGIN, 10, { align: 'right' });
    doc.setTextColor(0);

    // Légende
    let lx = MARGIN, ly = 21;
    doc.setFontSize(7);
    [['Critique / dégradé', FILL[0]], ['Préoccupant', FILL[1]], ['Correct', FILL[2]], ['Bon / rassurant', FILL[3]]].forEach(([lab, col]) => {
      doc.setFillColor(col[0], col[1], col[2]); doc.roundedRect(lx, ly - 3, 4, 4, 0.5, 0.5, 'F');
      doc.setTextColor(80); doc.text(lab, lx + 5.5, ly);
      lx += doc.getTextWidth(lab) + 14;
    });

    // Construire les lignes du tableau
    const head = [['Gare', ...sensCols.map((c) => c.head), 'Alertes', '%']];
    const body = rows0.map((r) => {
      const cells = [];
      cells.push(`${r.g.nom}\n${r.g.ligne_flux} · ${r.g.secteur}`);
      sensCols.forEach((c) => cells.push(ratingLabel(r.v.data, c.id)));
      const al = [];
      if (yes(r.v.data, 'alerte_secu')) al.push('Sécu');
      if (yes(r.v.data, 'alerte_saturation')) al.push('Satu');
      cells.push(al.length ? al.join(' + ') : '-');
      cells.push(`${visiteStats(r.g, r.v.data).pct}%`);
      return cells;
    });

    doc.autoTable({
      head, body, startY: 25,
      styles: { fontSize: 7.5, cellPadding: { top: 1.5, right: 2, bottom: 1.5, left: 2 }, lineColor: [225, 225, 225], lineWidth: 0.1, valign: 'middle' },
      headStyles: { fillColor: [60, 60, 60], textColor: 255, fontStyle: 'bold', fontSize: 7.5, halign: 'left' },
      columnStyles: { 0: { cellWidth: 46, fontStyle: 'bold' } },
      margin: { left: MARGIN, right: MARGIN },
      theme: 'grid',
      didParseCell: (data) => {
        if (data.section !== 'body') return;
        const colIdx = data.column.index;
        // Colonnes 1..8 = sensCols
        if (colIdx >= 1 && colIdx <= sensCols.length) {
          const r = rows0[data.row.index];
          const idx = ratingIdx(r.v.data, sensCols[colIdx - 1].id);
          if (idx >= 0) {
            data.cell.styles.fillColor = FILL[idx];
            data.cell.styles.textColor = TEXTC[idx];
            data.cell.styles.fontStyle = 'bold';
          } else {
            data.cell.styles.textColor = [170, 170, 170];
          }
        }
        // Colonne Alertes
        if (colIdx === sensCols.length + 1 && data.cell.raw && data.cell.raw !== '-') {
          data.cell.styles.textColor = [200, 16, 46];
          data.cell.styles.fontStyle = 'bold';
        }
      }
    });

    const today = new Date().toISOString().slice(0, 10);
    doc.save(`synthese_comparative_SERM_HDF_${today}.pdf`);
  };

  const buildExcelPretty = async (visites, safeName, today) => {
    if (!window.ExcelJS) throw new Error('ExcelJS non chargé');
    const wb = new window.ExcelJS.Workbook();
    wb.creator = 'SERM HDF · AREP';
    wb.created = new Date();

    // ============= ONGLET 1 : Base de données =============
    const wsBase = wb.addWorksheet('Base de données', {

    });

    // Construire la liste des colonnes :
    // - Identité (Nom, UIC, Cat SGP, Cat Pro, Secteur, Axe, Ligne flux) - 7 cols
    // - Méta visite (Date, Météo, Enquêteur(s), % complétion) - 4 cols
    // - Sections (en parcourant SECTIONS, sauf bureau et carac qui sont gérés à part)
    const identityCols = [
      { label: 'Nom gare',   getter: (g) => g.nom },
      { label: 'UIC',        getter: (g) => g.uic },
      { label: 'Cat. SGP',   getter: (g) => g.cat_sgp },
      { label: 'Cat. Pro',   getter: (g) => g.cat_pro },

    ];
    const metaCols = [
      { label: 'Date de visite', getter: (g, v) => v.data?.visite_date || '' },
      { label: 'Enquêteur(s)',   getter: (g, v) => v.auteur || '' },
      { label: '% complétion',   getter: (g, v) => `${visiteStats(g, v.data).pct}%` }
    ];

    // Pour chaque section, on liste ses critères (sauf subhead et bureau)
    const sectionBlocks = [];
    SECTIONS.forEach((s) => {
      const items = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');

  /* ===== EXPORT PHOTOS - ZIP rangé par Gare / Section / Question ===== */
  const exportPhotosZip = async (visites) => {
    if (!window.JSZip) { showToast('Bibliothèque ZIP non chargée - recharge la page', 'error'); return; }
    // Sanitize : retire caractères interdits dans les noms de fichiers
    const sanit = (s) => String(s).replace(/[<>:"/\\|?*\u0000-\u001f]/g, '').replace(/\s+/g, ' ').trim().slice(0, 80);
    // Construire la liste plate de toutes les photos à télécharger
    const photoJobs = []; // { path, url }
    visites.forEach(v => {
      if (!v.data) return;
      const gareSafe = sanit(v.gare);
      SECTIONS.forEach(s => {
        const secSafe = sanit(s.title);
        (s.criteria || []).forEach(c => {
          const photos = getPhotos(v.data[c.id]);
          if (photos.length === 0) return;
          const critSafe = sanit(c.label);
          photos.forEach((p, i) => {
            if (!p.url) return;
            const num = String(i + 1).padStart(2, '0');
            const ext = (p.url.match(/\.(jpe?g|png|webp|heic)(?:\?|$)/i)?.[1] || 'jpg').toLowerCase();
            photoJobs.push({ zipPath: `${gareSafe}/${secSafe}/${critSafe}_${num}.${ext}`, url: p.url, storagePath: p.path });
          });
        });
      });
    });
    const totalPhotos = photoJobs.length;
    if (totalPhotos === 0) { showToast('Aucune photo à exporter', 'error'); return; }

    setSyncing(true);
    setPdfStatus({ stage: 'Préparation…', current: 0, total: totalPhotos });
    const t0 = Date.now();
    const zip = new window.JSZip();
    let fetched = 0, errors = 0;
    const manifest = [`PHOTOTHEQUE SERM HAUTS-DE-FRANCE`,
      `Export du ${new Date().toLocaleString('fr-FR')}`,
      `Auteur : ${auteur}`,
      '',
      'STRUCTURE : Gare / Section / Question_NN.jpg',
      '',
      '--- DETAIL ---'];

    // ⚡ Téléchargement FIABLE : SDK Supabase (download direct par chemin) avec
    // RETRY + backoff. C'est l'absence de reprise sur échec qui causait les
    // centaines d'échecs (Supabase rate-limite à ~429 au-delà de quelques
    // centaines de requêtes rapides, et chaque coupure réseau = échec définitif).
    // Ici : 4 tentatives espacées (0.5s/1s/2s) -> le taux d'échec tombe ~à zéro.
    const fetchOnePhoto = async (job) => {
      // data: URL -> conversion directe, aucun réseau
      if (job.url && job.url.startsWith('data:')) {
        try { return await (await fetch(job.url)).blob(); } catch (e) { return null; }
      }
      for (let attempt = 0; attempt < 4; attempt++) {
        try {
          if (job.storagePath && supa) {
            const { data, error } = await supa.storage.from('photos').download(job.storagePath);
            if (error) throw error;
            if (data) return data;
          }
          if (job.url) {
            const resp = await fetch(job.url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return await resp.blob();
          }
          return null;
        } catch (e) {
          if (attempt === 3) { console.warn('Photo échec définitif:', job.storagePath || job.url, e); return null; }
          await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt))); // 0.5s, 1s, 2s
        }
      }
      return null;
    };

    // Lots parallèles (10) : sature mieux la bande passante. Le retry absorbe
    // les éventuels 429 dus à la concurrence plus élevée.
    const BATCH = 10;
    for (let i = 0; i < photoJobs.length; i += BATCH) {
      const batch = photoJobs.slice(i, i + BATCH);
      const results = await Promise.all(batch.map(async (job) => {
        const blob = await fetchOnePhoto(job);
        return { job, blob, ok: !!blob };
      }));
      results.forEach(r => {
        if (r.ok) {
          zip.file(r.job.zipPath, r.blob);
          manifest.push(`✓ ${r.job.zipPath}`);
          fetched++;
        } else {
          manifest.push(`✗ ${r.job.zipPath}  [ÉCHEC]`);
          errors++;
        }
      });
      // Progression live + estimation du temps restant
      const done = fetched + errors;
      let eta = '';
      if (done >= 12) {
        const rate = done / Math.max(0.001, (Date.now() - t0) / 1000); // photos/s
        const remain = Math.max(0, Math.round((totalPhotos - done) / rate));
        eta = remain > 90 ? ` · ~${Math.ceil(remain / 60)} min restantes` : ` · ~${remain}s restantes`;
      }
      setPdfStatus({ stage: `Téléchargement des photos…${eta}`, current: done, total: totalPhotos });
    }

    if (fetched === 0) {
      showToast('Échec téléchargement des photos', 'error');
      setPdfStatus(null);
      setSyncing(false);
      return;
    }

    manifest.push('', `--- RECAP ---`, `${fetched} photo(s) téléchargée(s)`, errors > 0 ? `${errors} échec(s)` : '');
    zip.file('_README.txt', manifest.join('\n'));

    setPdfStatus({ stage: 'Compression du ZIP…', current: totalPhotos, total: totalPhotos });
    // ⚡ FIX : compression STORE (pas DEFLATE). Les JPEG sont DÉJÀ compressés,
    // donc DEFLATE niveau 6 ne gagne ~rien mais coûte un temps CPU énorme
    // (cause principale du freeze sur ~700 photos). STORE = quasi instantané.
    const blob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
    const today = new Date().toISOString().slice(0, 10);
    downloadBlob(blob, `photos_SERM_HDF_${today}.zip`);
    showToast(`Photothèque ZIP : ${fetched} photo${fetched > 1 ? 's' : ''}${errors > 0 ? ` (${errors} échec)` : ''} ✓`, 'success');
    setPdfStatus(null);
    setSyncing(false);
  };

  /* ===== GÉNÉRATION PDF NATIF (jsPDF) - A4 calibré, téléchargement direct ===== */

  // Convertit une URL (publique ou data:) en data URL JPEG.
  // Fiable : SDK Supabase (download par chemin) + retry/backoff comme la photothèque.
  const urlToBase64 = async (url, storagePath) => {
    if (url && url.startsWith('data:')) return url;
    const toDataUrl = (blob) => new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        if (storagePath && supa) {
          const { data, error } = await supa.storage.from('photos').download(storagePath);
          if (error) throw error;
          if (data) return await toDataUrl(data);
        }
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await toDataUrl(await resp.blob());
      } catch (e) {
        if (attempt === 3) throw e;
        await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt))); // 0.5s, 1s, 2s
      }
    }
  };

  // Redimensionne pour le PDF (max 600px, JPEG 75%)
  const resizeForPDF = async (url, maxDim = 600, storagePath) => {
    const dataUrl = await urlToBase64(url, storagePath);
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve({ dataUrl: canvas.toDataURL('image/jpeg', 0.75), w, h });
      };
      img.onerror = () => reject(new Error('img load failed'));
      img.src = dataUrl;
    });
  };

  // Formate la valeur d'un critère pour le PDF (texte court, sans caractères spéciaux)
  const formatValForPDF = (c, raw) => {
    if (raw && typeof raw === 'object' && raw.na === true) return 'N/A';
    const v = getVal(raw);
    if (v == null || v === '') return '-';
    if (Array.isArray(v)) return v.join(', ');
    if (typeof v === 'object') {
      const parts = [];
      if (v.presence === 'yes') parts.push('Présent');
      if (v.presence === 'no') parts.push('Absent');
      if (v.nb != null && v.nb !== '') parts.push(`nombre : ${v.nb}`);
      if (v.etat != null) {
        const labels = ['mauvais', 'moyen', 'bon', 'très bon'];
        parts.push(`état ${labels[Math.round(v.etat*3)] || ''}`);
      }
      return parts.join(' / ') || '-';
    }
    // Traductions français pour les valeurs simples stockées en 'yes'/'no'
    if (c.type === 'yesno') return v === 'yes' ? 'Oui' : v === 'no' ? 'Non' : String(v);
    if (c.type === 'presence') return v === 'yes' ? 'Présent' : v === 'no' ? 'Absent' : String(v);
    if ((c.type === 'pn' || c.type === 'pne') && (v === 'yes' || v === 'no')) return v === 'yes' ? 'Présent' : 'Absent';
    if (c.type === 'rating' && c.labels && typeof v === 'number') { const idx = Math.round(v * (c.labels.length - 1)); return c.labels[idx] || `Note ${v}`; }
    return String(v);
  };

  // Couleur sémantique d'une réponse de synthèse (encadré sur la fiche A4) :
  // vert = bon, vert clair = plutôt bon, orange = vigilance, rouge = problème.
  // Convention de la grille : pour tout rating, label[0] = le pire, dernier = le meilleur.
  const synthAnswerColor = (c, raw) => {
    if (raw && typeof raw === 'object' && raw.na === true) return null;
    const v = getVal(raw);
    if (v == null || v === '') return null;
    if (c.type === 'rating' && c.labels && typeof v === 'number') {
      const n = c.labels.length;
      const idx = Math.round(v * (n - 1));
      const t = n > 1 ? idx / (n - 1) : 1; // 0 = pire, 1 = meilleur
      if (t <= 0.001) return { bg: [192, 57, 43], fg: [255, 255, 255] };   // rouge
      if (t < 0.4)    return { bg: [211, 84, 0],  fg: [255, 255, 255] };   // orange foncé
      if (t < 0.75)   return { bg: [168, 209, 158], fg: [30, 30, 30] };    // vert clair
      return { bg: [39, 174, 96], fg: [255, 255, 255] };                   // vert
    }
    if (c.type === 'yesno' && (v === 'yes' || v === 'no')) {
      // Questions "négatives" (alerte, manque, danger…) : Oui = problème = rouge.
      const negative = /alerte|manque|danger|risqu|satur|vétust|probl/i.test(c.label || '');
      const RED = { bg: [192, 57, 43], fg: [255, 255, 255] };
      const GREEN = { bg: [39, 174, 96], fg: [255, 255, 255] };
      if (negative) return v === 'yes' ? RED : GREEN;
      return v === 'yes' ? GREEN : RED;
    }
    return null;
  };

    const PAGE_W = 210, PAGE_H = 297, MARGIN = 10;

    doc.setFillColor(200, 16, 46);

    doc.text('AREP - SERM HAUTS-DE-FRANCE', MARGIN, 7);
    doc.setFontSize(16);
    doc.text(gare.nom, MARGIN, 15);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text(`${gare.cat_pro} - ${gare.cat_sgp} - ${gare.secteur}`, MARGIN, 20);
    // Compteur droite
    const stats = visiteStats(gare, visite.data);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text(`${stats.pct}%`, PAGE_W - MARGIN, 14, { align: 'right' });
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.text(`${stats.filled}/${stats.total} critères`, PAGE_W - MARGIN, 19, { align: 'right' });
    doc.setTextColor(0, 0, 0);

    let y = 28;

    // ── META ──
    doc.setFillColor(245, 242, 235);
    doc.rect(MARGIN, y, CONTENT_W, 10, 'F');
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    const auteurStr = visite.auteur || '';
    const isMultipleAuteurs = auteurStr.includes(',');
    doc.text('DATE VISITE', MARGIN + 2, y + 3.5);
    doc.text(isMultipleAuteurs ? 'ENQUÊTEURS' : 'ENQUÊTEUR', MARGIN + 70, y + 3.5);
    doc.text('UIC', MARGIN + 150, y + 3.5);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text(visite.data?.visite_date || '-', MARGIN + 2, y + 8);
    doc.text(auteurStr || '-', MARGIN + 70, y + 8);
    doc.text(String(gare.uic), MARGIN + 150, y + 8);
    y += 14;

    // ════════════════════════════════════════════════════════════════
    //  STRUCTURE DE LA FICHE (lisible par quelqu'un qui n'a pas visité) :
    //   1. SYNTHÈSE en tête - par question : réponse + commentaire + photo.
    //      C'est le cœur : on capte direct les problématiques de la gare.
    //   2. DÉTAIL par catégorie - données de la section PUIS ses photos
    //      légendées, enchaînées (chaque catégorie est auto-portante).
    // ════════════════════════════════════════════════════════════════
    const sections = SECTIONS.filter(s => !s.skipIf || !s.skipIf(gare, visite.data));
    const synthSection = sections.find(s => s.synth);
    const detailSections = sections.filter(s => !s.synth);

    // ── Helper : bloc de commentaires (label gras + note lisible). MAJ + renvoie y. ──
    const drawComments = (notes, big) => {
      if (!notes || notes.length === 0) return;
      if (y + 8 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
      doc.setFontSize(big ? 8 : 6.5);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(200, 16, 46);
      doc.text('COMMENTAIRES', MARGIN + 2, y + 3);
      doc.setTextColor(0);
      doc.setFont('helvetica', 'normal');
      y += 5;
      for (const { label, note } of notes) {
        const labelSize = big ? 8 : 7;
        const noteSize = big ? 9.5 : 7.5;
        doc.setFontSize(labelSize);
        const labelLines = doc.splitTextToSize(label, CONTENT_W - 7);
        doc.setFontSize(noteSize);
        const noteLines = doc.splitTextToSize(String(note), CONTENT_W - 7);
        const blockH = labelLines.length * (labelSize * 0.42) + noteLines.length * (noteSize * 0.46) + 3.5;
        if (y + blockH > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
        doc.setFillColor(248, 246, 240);
        doc.rect(MARGIN, y, CONTENT_W, blockH, 'F');
        doc.setFillColor(200, 16, 46);
        doc.rect(MARGIN, y, 1, blockH, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(labelSize);
        doc.setTextColor(60);
        doc.text(labelLines, MARGIN + 3.5, y + 3);
        let yy = y + 3 + labelLines.length * (labelSize * 0.42);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(noteSize);
        doc.setTextColor(0);
        doc.text(noteLines, MARGIN + 3.5, yy + 0.5);
        y += blockH + 1.5;
      }
      doc.setTextColor(0);
      doc.setFont('helvetica', 'normal');
      y += 1;
    };

    // ── Helpers photos (utilisés par la SYNTHÈSE et par le DÉTAIL) ──
    const countPhotos = (s) => (s.criteria || []).reduce((n, c) => n + ((visite.data?.[c.id]?.photos || []).length), 0);
    const grandTotalPhotos = sections.reduce((n, s) => n + countPhotos(s), 0);
    let resizeDone = 0;
    if (grandTotalPhotos > 0) setPdfStatus({ stage: 'Téléchargement des photos…', current: 0, total: grandTotalPhotos });

    const resizePhotos = async (list, maxDim) => {
      const out = [];
      const BATCH = 4;
      for (let i = 0; i < list.length; i += BATCH) {
        const batch = list.slice(i, i + BATCH);
        const results = await Promise.all(batch.map(async (ph) => {
          try { const r = await resizeForPDF(ph.p.url, maxDim, ph.p.path); return { ...ph, dataUrl: r.dataUrl, w: r.w, h: r.h }; }
          catch (e) { return { ...ph, dataUrl: null }; }
        }));
        out.push(...results);
        resizeDone += results.length;
        setPdfStatus({ stage: 'Téléchargement des photos…', current: resizeDone, total: grandTotalPhotos });
      }
      return out;
    };

    const collectPhotos = (s) => {
      const arr = [];
      (s.criteria || []).forEach(c => {
        (visite.data?.[c.id]?.photos || []).forEach((p, i) => arr.push({ p, label: c.label, num: i + 1 }));
      });
      return arr;
    };

    const drawGrid = (photos, cols, borderColor) => {
      const GAP = 3;
      const cellW = (CONTENT_W - (cols - 1) * GAP) / cols;
      const cellH = cellW * 0.72;
      const captionH = 5.5;
      let col = 0;
      for (let k = 0; k < photos.length; k++) {
        const ph = photos[k];
        if (col === 0 && y + cellH + captionH > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
        const x = MARGIN + col * (cellW + GAP);
        doc.setFillColor(240, 235, 224);
        doc.rect(x, y, cellW, cellH, 'F');
        if (ph.dataUrl && ph.w && ph.h) {
          const pr = ph.w / ph.h, cr = cellW / cellH;
          let dW, dH;
          if (pr > cr) { dW = cellW; dH = cellW / pr; } else { dH = cellH; dW = cellH * pr; }
          try { doc.addImage(ph.dataUrl, 'JPEG', x + (cellW - dW) / 2, y + (cellH - dH) / 2, dW, dH, undefined, 'FAST'); } catch (e) { console.warn('addImage', e); }
        } else if (ph.dataUrl) {
          try { doc.addImage(ph.dataUrl, 'JPEG', x, y, cellW, cellH, undefined, 'FAST'); } catch (e) {}
        } else {
          doc.setFontSize(6); doc.setTextColor(150);
          doc.text('Image non dispo', x + cellW / 2, y + cellH / 2, { align: 'center' });
          doc.setTextColor(0);
        }
        if (borderColor) { doc.setDrawColor(borderColor[0], borderColor[1], borderColor[2]); doc.setLineWidth(0.8); doc.rect(x, y, cellW, cellH, 'S'); doc.setLineWidth(0.1); doc.setDrawColor(0); }
        doc.setFontSize(5.5); doc.setTextColor(90);
        const cap = `${ph.label} #${ph.num}`;
        const maxLen = cols === 2 ? 60 : 40;
        const t = cap.length > maxLen ? cap.slice(0, maxLen - 2) + '…' : cap;
        doc.text(t, x, y + cellH + 3);
        doc.setTextColor(0);
        col++;
        if (col === cols) { col = 0; y += cellH + captionH; }
      }
      if (col !== 0) { y += cellH + captionH; }
    };
    // Teinte pâle d'une couleur (pour fond de commentaire lisible)
    const pale = (rgb) => [Math.round(rgb[0] + (255 - rgb[0]) * 0.84), Math.round(rgb[1] + (255 - rgb[1]) * 0.84), Math.round(rgb[2] + (255 - rgb[2]) * 0.84)];

    // ───────────────────────────────────────────────────────────────
    // 1. SYNTHÈSE — le cœur : par question -> réponse + commentaire + photo
    //    (compréhensible par quelqu'un qui n'a pas fait la visite)
    // ───────────────────────────────────────────────────────────────
    if (synthSection) {
      const synthItems = (synthSection.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');
      doc.setFillColor(200, 16, 46);
      doc.rect(MARGIN, y, CONTENT_W, 9, 'F');
      doc.setTextColor(255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text("SYNTHÈSE — CE QU'IL FAUT RETENIR", MARGIN + 3, y + 6);
      doc.setTextColor(0);
      doc.setFont('helvetica', 'normal');
      y += 12;

      // Photos de la synthèse téléchargées d'avance (par question)
      const synthPhotosByCrit = {};
      for (const c of synthItems) {
        const ph = (visite.data?.[c.id]?.photos || []).map((p, i) => ({ p, label: c.label, num: i + 1 }));
        if (ph.length) synthPhotosByCrit[c.id] = await resizePhotos(ph, 1400);
      }

      // En-tête de groupe (Verdict global, Ressenti sensible, Alertes…) : n'apparaît
      // que s'il y a au moins une question renseignée dans le groupe.
      const drawSubhead = (title) => {
        if (y + 11 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
        y += 2;
        doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(120);
        doc.text(title.toUpperCase(), MARGIN + 2, y + 3);
        doc.setDrawColor(210, 205, 195); doc.setLineWidth(0.3);
        doc.line(MARGIN + 2, y + 4.6, PAGE_W - MARGIN, y + 4.6);
        doc.setDrawColor(0); doc.setLineWidth(0.1); doc.setTextColor(0);
        y += 7.5;
      };

      let anySynth = false;
      let pendingSubhead = null;
      const renderList = (synthSection.criteria || []).filter(c => c.type !== 'text');
      for (const c of renderList) {
        if (c.type === 'subhead') { pendingSubhead = c.label; continue; }
        const raw = visite.data?.[c.id];
        const val = formatValForPDF(c, raw);
        const note = raw?.note ? String(raw.note) : '';
        const photos = synthPhotosByCrit[c.id] || [];
        const hasVal = raw != null && val !== '-';
        if (!hasVal && !note && photos.length === 0) continue; // question vide -> ignorée
        if (pendingSubhead) { drawSubhead(pendingSubhead); pendingSubhead = null; }
        anySynth = true;
        // Couleur sémantique de la question (sert au badge, au commentaire et aux photos)
        const col = hasVal ? synthAnswerColor(c, raw) : null;
        const accent = col ? col.bg : [150, 150, 150];

        if (y + 20 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }

        // Question : pastille de couleur + libellé bien lisible (c'est LA question posée)
        doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5); doc.setTextColor(26, 26, 26);
        const labelLines = doc.splitTextToSize(c.label, CONTENT_W - 8);
        doc.setFillColor(accent[0], accent[1], accent[2]);
        doc.rect(MARGIN + 2, y + 0.7, 2.6, 2.6, 'F');
        doc.text(labelLines, MARGIN + 6.5, y + 3);
        y += labelLines.length * 4.7 + 2;

        // Réponse : encadré coloré selon le sens (vert=bon … rouge=problème)
        if (hasVal) {
          if (col) {
            doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5);
            const padX = 3, badgeH = 6.4;
            const tw = doc.getTextWidth(val);
            const badgeW = Math.min(CONTENT_W, tw + padX * 2);
            if (y + badgeH > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
            doc.setFillColor(col.bg[0], col.bg[1], col.bg[2]);
            doc.roundedRect(MARGIN + 2, y, badgeW, badgeH, 1.2, 1.2, 'F');
            doc.setTextColor(col.fg[0], col.fg[1], col.fg[2]);
            doc.text(val, MARGIN + 2 + padX, y + badgeH / 2 + 1.4);
            doc.setTextColor(0);
            y += badgeH + 1.5;
          } else {
            doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(200, 16, 46);
            const vLines = doc.splitTextToSize('Réponse : ' + val, CONTENT_W - 4);
            if (y + vLines.length * 4.2 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
            doc.text(vLines, MARGIN + 2, y + 3);
            y += vLines.length * 4.2 + 0.5;
            doc.setTextColor(0);
          }
        }

        // Commentaire : fond pâle teinté de la couleur de la réponse + filet assorti
        if (note) {
          doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
          const nLines = doc.splitTextToSize(note, CONTENT_W - 7);
          const blockH = nLines.length * 4 + 3;
          if (y + blockH > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
          const bg = col ? pale(col.bg) : [248, 246, 240];
          doc.setFillColor(bg[0], bg[1], bg[2]); doc.rect(MARGIN, y, CONTENT_W, blockH, 'F');
          doc.setFillColor(accent[0], accent[1], accent[2]); doc.rect(MARGIN, y, 1.5, blockH, 'F');
          doc.setTextColor(40);
          doc.text(nLines, MARGIN + 4, y + 3.5);
          y += blockH + 1.5;
          doc.setTextColor(0);
        }

        // Photo(s) de la question : bordure de la couleur de la réponse
        if (photos.length) { y += 0.5; drawGrid(photos, 2, col ? col.bg : [205, 198, 185]); }

        // Séparateur entre questions
        doc.setDrawColor(225, 215, 200); doc.setLineWidth(0.2);
        doc.line(MARGIN, y + 1.2, PAGE_W - MARGIN, y + 1.2);
        doc.setDrawColor(0); doc.setLineWidth(0.1);
        y += 5.5;
      }
      if (!anySynth) {
        doc.setFontSize(8.5); doc.setTextColor(120); doc.setFont('helvetica', 'italic');
        doc.text('Synthèse non renseignée pour cette gare.', MARGIN + 2, y + 3);
        doc.setTextColor(0); doc.setFont('helvetica', 'normal');
        y += 7;
      }
      y += 2;
    }

    // ── RESSENTI À L'ARRIVÉE - remonté en page 1 (1re impression collective) ──
    {
      const ress = visite.data?.['carac_ressenti_arrivee'];
      const ressNote = ress?.note ? String(ress.note) : '';
      if (ressNote.trim()) {
        if (y + 16 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
        else { y += 1; }
        doc.setFillColor(60, 60, 60);
        doc.rect(MARGIN, y, CONTENT_W, 7, 'F');
        doc.setTextColor(255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.text("RESSENTI À L'ARRIVÉE (1re impression)", MARGIN + 3, y + 5);
        doc.setTextColor(0);
        doc.setFont('helvetica', 'normal');
        y += 9;
        doc.setFontSize(9);
        const lines = doc.splitTextToSize(ressNote, CONTENT_W - 7);
        const blockH = lines.length * 4.3 + 4;
        if (y + blockH > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
        doc.setFillColor(248, 246, 240);
        doc.rect(MARGIN, y, CONTENT_W, blockH, 'F');
        doc.setFillColor(60, 60, 60);
        doc.rect(MARGIN, y, 1, blockH, 'F');
        doc.setTextColor(20);
        doc.text(lines, MARGIN + 3.5, y + 4);
        doc.setTextColor(0);
        y += blockH + 3;
      }
    }

    // ───────────────────────────────────────────────────────────────
    // 2. DÉTAIL DU RELEVÉ - tableaux compacts par section
    // ───────────────────────────────────────────────────────────────
    if (y > PAGE_H - 30) { doc.addPage(); y = MARGIN; } else { y += 1; }
    doc.setFillColor(26, 26, 26);
    doc.rect(MARGIN, y, CONTENT_W, 7, 'F');
    doc.setTextColor(255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text('DÉTAIL DU RELEVÉ', MARGIN + 3, y + 5);
    doc.setTextColor(0);
    doc.setFont('helvetica', 'normal');
    y += 10;

    for (const s of detailSections) {
      let items = (s.criteria || []).filter(c => c.type !== 'subhead' && c.type !== 'text');
      // Section repliée (élément absent) : on ne garde que le déclencheur
      const collapsed = s.collapseBodyIf && s.collapseBodyIf(gare, visite.data);
      if (collapsed) items = items.filter(c => c.trigger);
      if (items.length === 0) continue;
      const sStats = sectionStats(s, visite.data);
      // Le tableau de données n'affiche PAS les note_photo (qui n'ont pas de valeur) ;
      // leur contenu apparaît dans le bloc commentaires juste en dessous.
      const tableItems = items.filter(c => c.type !== 'note_photo');

      doc.autoTable({
        startY: y,
        head: [[
          { content: `${String(Math.floor(s.n)).padStart(2,'0')} - ${s.title}`, styles: { halign: 'left' } },
          { content: `${sStats.filled}/${sStats.total}`, styles: { halign: 'right' } }
        ]],
        body: tableItems.map(c => {
          const raw = visite.data?.[c.id];
          const val = formatValForPDF(c, raw);
          const tags = [];
          if (raw?.photos?.length) tags.push(`[${raw.photos.length}ph]`);
          if (raw?.note) tags.push('[note]');
          return [
            { content: c.label, styles: { halign: 'left' } },
            { content: val + (tags.length ? '  ' + tags.join(' ') : ''), styles: { halign: 'left', fontStyle: 'bold' } }
          ];
        }),
        styles: { fontSize: 7, cellPadding: { top: 0.5, right: 2, bottom: 0.5, left: 2 }, lineColor: [235,235,235], lineWidth: 0.1 },
        headStyles: { fillColor: [70,70,70], textColor: 255, fontStyle: 'bold', fontSize: 8, cellPadding: { top: 1.1, right: 2, bottom: 1.1, left: 2 } },
        columnStyles: { 0: { cellWidth: 118 }, 1: { cellWidth: 72 } },
        margin: { left: MARGIN, right: MARGIN },
        theme: 'plain'
      });
      y = doc.lastAutoTable.finalY + 1;

      // Commentaires de la section (inclut les note_photo : ressenti, autres éléments…)
      const secNotes = items
        .filter(c => visite.data?.[c.id]?.note)
        .map(c => ({ label: c.label, note: visite.data[c.id].note }));
      drawComments(secNotes, false);

      // Photos de la section, juste après ses données (catégorie auto-portante)
      const secPhotos = collectPhotos(s);
      if (secPhotos.length) {
        const processed = await resizePhotos(secPhotos, 1000);
        if (y + 9 > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; }
        doc.setFillColor(232, 232, 232); doc.setTextColor(40);
        doc.rect(MARGIN, y, CONTENT_W, 5.5, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(7);
        doc.text(`PHOTOS — ${String(Math.floor(s.n)).padStart(2, '0')} - ${s.title}`, MARGIN + 2.5, y + 3.8);
        doc.setTextColor(0); doc.setFont('helvetica', 'normal');
        y += 7.5;
        drawGrid(processed, 3, false);
      }

      y += 2;
      if (y > PAGE_H - 20) { doc.addPage(); y = MARGIN; }
    }

    // (Les photos sont désormais intégrées par catégorie ci-dessus, juste après
    //  les données de chaque section, et par question dans la synthèse — il n'y a
    //  plus de page « photos » séparée en fin de document.)

    // ── FOOTER sur toutes les pages ──
    const totalPages = doc.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFontSize(6.5);
      doc.setTextColor(150);
      doc.text(
        `SERM HDF · ${gare.nom} · généré le ${new Date().toLocaleDateString('fr-FR')} · page ${p}/${totalPages}`,
        PAGE_W/2, PAGE_H - 5, { align: 'center' }
      );
    }

    // ── SAVE ──
    const safeName = gare.nom.replace(/[^a-zA-Z0-9-]/g, '_');
    const today = new Date().toISOString().slice(0, 10);
    if (returnBlob) {
      // Mode ZIP : on renvoie le blob + un nom de fichier, sans télécharger ni toast
      return { blob: doc.output('blob'), filename: `SERM_${safeName}_${today}.pdf` };
    }
    doc.save(`SERM_${safeName}_${today}.pdf`);
    setPdfStatus(null);
    showToast(`PDF généré : ${gare.nom} ✓`, 'success');
  };

  /* ===== EXPORT MULTI-PDF EN ZIP (un PDF A4 par gare) ===== */
  const exportPDFsZip = async (visites) => {
    if (!window.jspdf || !window.jspdf.jsPDF) { showToast('Bibliothèque PDF non chargée - recharge la page', 'error'); return; }
    if (!window.JSZip) { showToast('Bibliothèque ZIP non chargée - recharge la page', 'error'); return; }
    const list = (visites || []).filter(v => v && v.data);
    if (list.length === 0) { showToast('Aucune visite à exporter', 'error'); return; }

    setSyncing(true);
    const zip = new window.JSZip();
    let done = 0, errors = 0;
    for (const v of list) {
      const g = GARES.find(x => x.nom === v.gare);
      if (!g) { errors++; continue; }
      setPdfStatus({ stage: `Fiche ${done + 1}/${list.length} - ${v.gare}`, current: done, total: list.length });
      try {
        const res = await buildPDFForGare(g, v, true); // returnBlob = true
        if (res && res.blob) {
          zip.file(res.filename, res.blob);
          done++;
        } else { errors++; }
      } catch (e) {
        console.warn('PDF gare failed:', v.gare, e);
        errors++;
      }
    }

    if (done === 0) { showToast('Échec génération des PDF', 'error'); setPdfStatus(null); setSyncing(false); return; }

    setPdfStatus({ stage: 'Compression du ZIP…', current: list.length, total: list.length });
    // STORE : les PDF contiennent déjà des JPEG compressés, pas besoin de re-compresser
    const blob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
    const today = new Date().toISOString().slice(0, 10);
    downloadBlob(blob, `fiches_A4_SERM_HDF_${today}.zip`);
    setPdfStatus(null);
    showToast(`ZIP fiches A4 : ${done} fiche${done > 1 ? 's' : ''}${errors > 0 ? ` (${errors} échec)` : ''} ✓`, 'success');
    setSyncing(false);
  };

  // ===== ÉCRAN DE VERROUILLAGE - rendu après tous les hooks =====
  // Doit être ICI (et pas en haut de App) pour respecter les règles
  // des hooks React (ordre stable à chaque render).
  if (!isUnlocked) {
    return (
      <div style={{
        minHeight: '100dvh', background: 'var(--ink)', position: 'relative', overflow: 'hidden',
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20
      }}>
        <div style={{
          position: 'fixed', bottom: 8, right: 10, zIndex: 50,
          fontSize: 11, fontFamily: 'monospace', letterSpacing: '0.02em',
          color: 'rgba(245,242,235,0.55)', userSelect: 'all'
        }}>{APP_VERSION}</div>
        {/* Fond technique discret : halo accent + trame ferroviaire + grille de gares */}
        <div aria-hidden style={{
          position: 'absolute', inset: 0, pointerEvents: 'none', opacity: 0.55,
          backgroundImage:
            'radial-gradient(circle at 50% 15%, rgba(200,16,46,0.20), transparent 52%),' +
            'repeating-linear-gradient(90deg, rgba(245,242,235,0.045) 0 1px, transparent 1px 48px),' +
            'radial-gradient(rgba(245,242,235,0.06) 1.2px, transparent 1.6px)',
          backgroundSize: 'auto, auto, 26px 26px'
        }} />
        <div style={{
          background: 'var(--paper-light)', borderRadius: 6, position: 'relative',
          borderTop: '3px solid var(--red)',
          padding: '30px 28px', maxWidth: 380, width: '100%',
          boxShadow: '0 24px 70px rgba(0,0,0,0.5)'
        }}>
          <div style={{ marginBottom: 18, display: 'flex', justifyContent: 'center' }}>
            <GareoSplash size={50} theme="light" />
          </div>
          <div style={{
            fontSize: 10, fontWeight: 700, letterSpacing: '0.16em',
            textTransform: 'uppercase', color: 'var(--red)', marginBottom: 14
          }}>Relevé terrain · SERM Hauts-de-France</div>
          <h1 style={{
            fontSize: 21, fontWeight: 700, letterSpacing: '-0.025em',
            marginBottom: 6, lineHeight: 1.15
          }}>Bienvenue sur GARÉo</h1>
          <p style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 24, lineHeight: 1.45 }}>
            Outil de relevé terrain par AREP — accès réservé à l'équipe projet.
          </p>
          <label style={{ display: 'block', fontSize: 10, fontWeight: 700, letterSpacing: '0.1em',
            textTransform: 'uppercase', color: 'var(--taupe)', marginBottom: 5 }}>Prénom ou initiales</label>
          <input
            type="text"
            value={nameInput}
            onChange={(e) => setNameInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') tryUnlock(); }}
            autoFocus
            placeholder="ex : Tony"
            style={{
              width: '100%', padding: '12px 14px', fontSize: 15, fontFamily: 'inherit',
              border: '1.5px solid var(--border)',
              borderRadius: 2, background: 'var(--white)',
              outline: 'none', marginBottom: 12
            }}
          />
          <label style={{ display: 'block', fontSize: 10, fontWeight: 700, letterSpacing: '0.1em',
            textTransform: 'uppercase', color: 'var(--taupe)', marginBottom: 5 }}>Mot de passe</label>
          <input
            type="password"
            value={pwdInput}
            onChange={(e) => { setPwdInput(e.target.value); setPwdError(false); }}
            onKeyDown={(e) => { if (e.key === 'Enter') tryUnlock(); }}
            placeholder="Mot de passe"
            style={{
              width: '100%', padding: '12px 14px', fontSize: 15, fontFamily: 'inherit',
              border: `1.5px solid ${pwdError ? 'var(--red)' : 'var(--border)'}`,
              borderRadius: 2, background: 'var(--white)',
              outline: 'none', marginBottom: 4
            }}
          />
          {pwdError &&
          <div style={{ fontSize: 11.5, color: 'var(--red)', marginTop: 4, marginBottom: 8 }}>
            Mot de passe incorrect.
          </div>
          }
          <button onClick={tryUnlock} style={{
            marginTop: 14, width: '100%', padding: '13px',
            background: 'var(--red)', color: 'var(--paper-light)',
            fontWeight: 600, fontSize: 13.5, letterSpacing: '0.04em', textTransform: 'uppercase',
            borderRadius: 2
          }}>
            Déverrouiller
          </button>
          <div style={{ marginTop: 18, paddingTop: 14, borderTop: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
            <span style={{ fontSize: 10, letterSpacing: '0.06em', textTransform: 'uppercase',
              color: 'var(--taupe)', fontWeight: 600 }}>98 gares à relever</span>
            <span aria-hidden style={{ display: 'flex', gap: 3 }}>
              {[0,1,2,3,4,5,6,7].map((i) => (
                <span key={i} style={{ width: 5, height: 5, borderRadius: '50%',
                  background: i < 3 ? 'var(--red)' : 'var(--border)' }} />
              ))}
            </span>
          </div>
        </div>
      </div>
    );
  }

  if (route.name === 'home') {
    return <>
      <HomeScreen all={all} auteur={auteur} syncing={syncing}
        onPick={() => setRoute({ name: 'picker' })}
        onOpen={(g) => setRoute({ name: 'form', gareName: g })}
        onChangeAuteur={changeAuteur}
        onExportAll={() => setRoute({ name: 'export' })}
        onSynthese={() => setRoute({ name: 'synthese' })}
        readOnly={readOnly}
        isOnline={isOnline}
        pendingCount={pendingCount}
        retryingPhotos={retryingPhotos}
        onDeleteVisite={readOnly ? null : ((n) => deleteVisite(n, { stay: true }))}
        gridRev={gridRev} />
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
      <div style={{
        position: 'fixed', bottom: 6, right: 8, zIndex: 50,
        fontSize: 11, fontFamily: 'monospace', letterSpacing: '0.02em',
        color: 'rgba(26,26,26,0.40)', pointerEvents: 'none'
      }}>{APP_VERSION}</div>
    </>;
  }
  if (route.name === 'picker') {
    return <PickerScreen all={all} onBack={() => setRoute({ name: 'home' })} onPick={startVisite} />;
  }
  if (route.name === 'synthese') {
    return <SynthScreen all={all} onBack={() => setRoute({ name: 'home' })} />;
  }
  if (route.name === 'export') {
    return <>
      <ExportScreen all={all}
        onBack={() => setRoute({ name: 'home' })}
        onExport={(visites, format, name) => exportData(visites, format, name)}
        onExportPhotos={exportPhotosZip}
        onExportPDFsZip={exportPDFsZip}
        onExportSynth={() => {
          const visites = Object.values(all);
          if (!visites.length) { showToast('Aucune gare à synthétiser', 'error'); return; }
          const today = new Date().toISOString().slice(0, 10);
          buildSynthExcel(visites, today)
            .then(() => showToast('Synthèse comparative exportée ✓', 'success'))
            .catch((e) => { console.error('Synth export:', e); showToast('Erreur export synthèse', 'error'); });
        }}
        onExportSynthPDF={() => {
          const visites = Object.values(all);
          if (!visites.length) { showToast('Aucune gare à synthétiser', 'error'); return; }
          try { buildSynthPDF(visites); showToast('Synthèse PDF générée ✓', 'success'); }
          catch (e) { console.error('Synth PDF:', e); showToast('Erreur export synthèse PDF', 'error'); }
        }}
        onPrintPDF={(gareName) => {
          const g = GARES.find(x => x.nom === gareName);
          const v = all[gareName];
          if (g && v) buildPDFForGare(g, v);
        }}
        onDeleteVisite={readOnly ? null : ((n) => deleteVisite(n, { stay: true }))}
        pdfStatus={pdfStatus}
        syncing={syncing} />
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  if (route.name === 'form') {
    const g = GARES.find((x) => x.nom === route.gareName);
    const v = all[route.gareName];
    if (!g || !v) { setTimeout(() => setRoute({ name: 'home' })); return null; }
    return <>
      <FormScreen gare={g} visite={v} onUpdate={updateVisite}
        onBack={() => setRoute({ name: 'home' })}
        onOverview={() => setRoute({ name: 'overview', gareName: g.nom })}
        onToast={showToast}
        onRefresh={manualRefresh}
        syncing={syncing}
        readOnly={readOnly}
        gridRev={gridRev} />
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  if (route.name === 'overview') {
    const g = GARES.find((x) => x.nom === route.gareName);
    const v = all[route.gareName];
    if (!g || !v) { setTimeout(() => setRoute({ name: 'home' })); return null; }
    return <>
      <OverviewScreen gare={g} visite={v}
        onBack={() => setRoute({ name: 'form', gareName: g.nom })}
        onZone={(id) => setRoute({ name: 'form', gareName: g.nom, jumpTo: id })}
        onExport={() => exportData([v], 'xlsx', `releve_${g.nom}`)}
        onPrintPDF={() => buildPDFForGare(g, v)}
        onDelete={readOnly ? null : (() => deleteVisite(g.nom))}
        gridRev={gridRev} />
      <Toast toast={toast} />
      <PDFProgressOverlay status={pdfStatus} />
    </>;
  }
  return null;
}

function PDFProgressOverlay({ status }) {
  if (!status) return null;
  const pct = status.total > 0 ? Math.round((status.current / status.total) * 100) : 0;
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 999,
      background: 'rgba(26,26,26,0.85)', backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
      <div style={{ background: 'var(--white)', padding: '24px 28px', borderRadius: 4,
        maxWidth: 360, width: '90%', textAlign: 'center' }}>
        <div style={{ fontSize: 28, marginBottom: 10 }}>📄</div>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>{status.stage}</div>
        <div style={{ background: 'var(--paper-deep)', height: 6, borderRadius: 99, overflow: 'hidden' }}>
          <div style={{ background: 'var(--red)', height: '100%', width: `${pct}%`,
            transition: 'width 0.2s' }} />
        </div>
        <div style={{ fontSize: 11, color: 'var(--taupe)', marginTop: 8 }}>
          {status.current} / {status.total} · {pct}%
        </div>
      </div>
    </div>
  );
}

function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 30, left: '50%', transform: 'translateX(-50%)',
      background: toast.type === 'success' ? 'var(--green)' : toast.type === 'error' ? 'var(--red)' : 'var(--ink)',
      color: 'var(--paper-light)', padding: '10px 18px',
      fontSize: 13, fontWeight: 500, borderRadius: 2, boxShadow: 'var(--shadow-lg)',
      zIndex: 1000, letterSpacing: '0.02em', maxWidth: '80vw'
    }}>{toast.msg}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
